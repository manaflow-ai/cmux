version: 1

dns:
  refresh_interval: 300
  resolver: "auto"  # Auto-detect from /etc/resolv.conf (supports Docker DNS and VM-based runtimes)
  retry_count: 3
  retry_backoff_base: 2

fetch_meta:
  github: true  # Fetch IP ranges from https://api.github.com/meta

global_allow:
  - port: 53
    destination: "auto (from /etc/resolv.conf)"
    protocol: udp
    comment: "System DNS resolver"
  - port: 53
    destination: "auto (from /etc/resolv.conf)"
    protocol: tcp
    comment: "System DNS resolver (TCP fallback)"

global_deny:
  - port: 53
    comment: "Block DNS to all other resolvers (anti-tunneling, see threat-model.md)"

modes:
  lockdown:
    description: "Minimal access - Claude API, GitHub, and 1Password"
    domains:
      - api.anthropic.com
      - api.github.com
      - github.com
      # 1Password CLI (op run) — required for secrets resolution
      - my.1password.com
      - my.1password.eu
      - my.1password.ca
    ssh:
      enabled: true
      source: github_meta  # Restrict to GitHub IP ranges from /meta
    notes: "Consider not forwarding GITHUB_TOKEN in this mode"

  standard:
    inherit: lockdown
    description: "Common development domains"
    domains:
      # GitHub CDN (raw file content, release assets, archive downloads)
      - raw.githubusercontent.com
      - objects.githubusercontent.com
      # Package registries
      - pypi.org
      - files.pythonhosted.org
      - registry.npmjs.org
      - crates.io
      - static.crates.io
      - index.crates.io
      - rubygems.org
      - pkg.go.dev
      - proxy.golang.org
      - sum.golang.org
      # Container registries (specific, no wildcards)
      - registry-1.docker.io
      - auth.docker.io
      - production.cloudflare.docker.com
      # Documentation
      - docs.python.org
      - nodejs.org
      - doc.rust-lang.org
      # OpenRouter (codex external review via claw-wrap proxy)
      - openrouter.ai
      # OpenAI Codex (direct auth — env-direct mode only, real credentials in container)
      - api.openai.com
      - auth.openai.com
      - platform.openai.com
      - platform.api.openai.org
      # Swift toolchain (for pure-Swift unit tests in container)
      - swift.org
      - download.swift.org
      # Other common dev
      - stackoverflow.com
      - cdn.stackoverflow.com

  open:
    description: "No network restrictions - process isolation only"
    unrestricted: true
    notes: "WARNING: Zero exfiltration protection. Use only for trusted workloads."
