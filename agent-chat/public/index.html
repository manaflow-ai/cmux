<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cmux agent</title>
<style>
  /* Base palette; the server overrides --bg/--fg/--bg-body/--bg-html/--accent
     and the status colors from the resolved Ghostty theme (see __THEME__). */
  :root {
    --bg: #101014;
    --fg: #e8e8ec;
    --bg-body: var(--bg);
    --bg-html: var(--bg);
    --accent: #7aa2f7;
    --green: #6fbf82;
    --red: #e06c75;
    --amber: #d8a657;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  /* Everything else derives from bg/fg so any terminal theme works. */
  :root {
    --text: var(--fg);
    --text-dim: color-mix(in srgb, var(--fg) 60%, var(--bg));
    --text-faint: color-mix(in srgb, var(--fg) 40%, var(--bg));
    --border: color-mix(in srgb, var(--fg) 15%, var(--bg));
    --border-strong: color-mix(in srgb, var(--fg) 26%, var(--bg));
    --bg-raised: color-mix(in srgb, var(--fg) 5%, var(--bg));
    --bg-input: color-mix(in srgb, var(--fg) 8%, var(--bg));
    --bg-hover: color-mix(in srgb, var(--fg) 12%, var(--bg));
    --bg-code: color-mix(in srgb, var(--fg) 9%, var(--bg));
    --accent-wash: color-mix(in srgb, var(--accent) 15%, transparent);
    --accent-fg: color-mix(in srgb, var(--accent) 88%, white 12%);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  /* html gets the SAME background as body so nothing behind the webview
     (a terminal surface) can composite through a transparent root. In
     transparent mode the server sets --bg-html to transparent on purpose. */
  html { background: var(--bg-html); }
  body { background: var(--bg-body); color: var(--text); font: 14px/1.55 var(--sans); }
  #main { height: 100%; display: flex; flex-direction: column; min-width: 0; }

  /* ---------- composer ---------- */
  #composer-view {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; gap: 16px;
  }
  #composer-view h1 { font-size: 21px; font-weight: 600; margin: 0; letter-spacing: -.01em; }
  #composer-card {
    position: relative; width: min(660px, 100%);
    background: var(--bg-input); border: 1px solid var(--border); border-radius: 16px;
    padding: 6px; display: flex; flex-direction: column;
    box-shadow: 0 1px 3px rgba(0,0,0,.18);
  }
  #composer-card:focus-within { border-color: var(--border-strong); }
  #prompt-input {
    width: 100%; background: transparent; border: 0; outline: none; resize: none;
    color: var(--text); font: 15px/1.5 var(--sans); padding: 12px 12px 6px;
    min-height: 76px; max-height: 300px;
  }
  #prompt-input::placeholder { color: var(--text-faint); }

  .toolbar { display: flex; align-items: center; gap: 6px; padding: 4px; }
  .tb-group { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .tb-spacer { flex: 1; }

  .chip {
    display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 10px;
    border-radius: 8px; border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); font: 500 12.5px var(--sans); cursor: pointer; white-space: nowrap;
    max-width: 260px; user-select: none;
  }
  .chip:hover { background: var(--bg-hover); color: var(--text); }
  .chip .chev { opacity: .7; margin-left: 1px; }
  .chip #cwd-label { overflow: hidden; text-overflow: ellipsis; font-family: var(--mono); font-size: 11.5px; }
  .cwd-edit {
    height: 30px; width: 320px; max-width: 46vw; padding: 0 10px; border-radius: 8px;
    border: 1px solid var(--border-strong); background: var(--bg); color: var(--text);
    font: 11.5px var(--mono); outline: none;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; background: var(--text-faint); box-shadow: 0 0 0 2px color-mix(in srgb, currentColor 12%, transparent); }

  .chip.toggle .chk { opacity: 0; transition: opacity .1s; }
  .chip.toggle.on { color: var(--text); border-color: color-mix(in srgb, var(--green) 55%, var(--border)); }
  .chip.toggle.on .chk { opacity: 1; color: var(--green); }

  .send {
    flex: none; width: 32px; height: 32px; border-radius: 9px; border: 0; cursor: pointer;
    background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center;
  }
  .send:hover { background: var(--accent-fg); }
  .send:disabled { background: var(--bg-hover); color: var(--text-faint); cursor: default; }

  /* provider dropdown */
  .menu {
    position: absolute; bottom: calc(100% + 8px); left: 0; z-index: 20; min-width: 220px;
    background: var(--bg-raised); border: 1px solid var(--border-strong); border-radius: 12px;
    padding: 6px; box-shadow: 0 12px 32px rgba(0,0,0,.4); display: flex; flex-direction: column; gap: 1px;
  }
  #composer-card .menu { bottom: auto; top: calc(100% + 8px); }
  .menu-item {
    display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 8px; cursor: pointer;
    color: var(--text-dim); font: 500 13px var(--sans);
  }
  .menu-item:hover { background: var(--bg-hover); color: var(--text); }
  .menu-item.selected { color: var(--text); }
  .menu-item .mi-check { margin-left: auto; opacity: 0; color: var(--accent); }
  .menu-item.selected .mi-check { opacity: 1; }

  #composer-hint { color: var(--text-faint); font-size: 12px; }

  /* ---------- chat ---------- */
  #chat-view { flex: 1; display: none; flex-direction: column; min-height: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 22px 0 10px; }
  .msg { max-width: 760px; margin: 0 auto; padding: 0 24px 16px; }
  .msg.user { display: flex; justify-content: flex-end; }
  .msg.user .body {
    background: var(--bg-input); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px;
    white-space: pre-wrap; overflow-wrap: break-word; max-width: 85%;
  }
  .msg.assistant .body { overflow-wrap: break-word; }
  .msg.assistant .body > :first-child { margin-top: 0; }
  .msg.assistant .body > :last-child { margin-bottom: 0; }
  .msg .body pre {
    background: var(--bg-code); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    overflow-x: auto; font: 12px/1.5 var(--mono);
  }
  .msg .body code { font: .92em var(--mono); background: var(--bg-code); padding: 1px 5px; border-radius: 4px; }
  .msg .body pre code { padding: 0; background: none; }
  .msg .body a { color: var(--accent); }

  details.thinking { margin: 0 auto 12px; max-width: 760px; padding: 0 24px; color: var(--text-faint); }
  details.thinking summary { cursor: pointer; font-size: 12px; user-select: none; }
  details.thinking .t-body { white-space: pre-wrap; font-size: 12.5px; font-style: italic; padding: 6px 0 0; overflow-wrap: break-word; }

  .tool { max-width: 760px; margin: 0 auto 10px; padding: 0 24px; }
  .tool details { border: 1px solid var(--border); border-radius: 8px; background: var(--bg-raised); overflow: hidden; }
  .tool summary {
    display: flex; align-items: center; gap: 8px; padding: 7px 11px; cursor: pointer; user-select: none;
    font: 12px var(--mono); color: var(--text-dim); list-style: none;
  }
  .tool summary::-webkit-details-marker { display: none; }
  .tool .spinner {
    width: 10px; height: 10px; border: 1.5px solid var(--text-faint); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; flex: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool .mark { flex: none; font-size: 11px; }
  .tool .mark.ok { color: var(--green); } .tool .mark.fail { color: var(--red); }
  .tool .name { color: var(--text); font-weight: 600; flex: none; }
  .tool .detail { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tool .out { padding: 8px 11px; border-top: 1px solid var(--border); font: 11.5px/1.5 var(--mono); white-space: pre-wrap; color: var(--text-dim); max-height: 240px; overflow-y: auto; overflow-wrap: break-word; }

  .turn-footer { max-width: 760px; margin: 0 auto 18px; padding: 0 24px; font-size: 11px; color: var(--text-faint); font-family: var(--mono); }
  .error-block { padding: 8px 14px; color: var(--red); font-size: 12.5px; border-left: 2px solid var(--red); }
  .error-block-wrap { max-width: 760px; margin: 0 auto 14px; padding: 0 24px; }
  .status-line { max-width: 760px; margin: 0 auto 10px; padding: 0 24px; font-size: 11.5px; color: var(--text-faint); }

  #chat-input-row { flex: none; padding: 10px 24px 18px; max-width: 808px; width: 100%; margin: 0 auto; }
  #chat-card {
    display: flex; align-items: flex-end; gap: 8px; padding: 6px 6px 6px 6px;
    background: var(--bg-input); border: 1px solid var(--border); border-radius: 14px;
  }
  #chat-card:focus-within { border-color: var(--border-strong); }
  #chat-input {
    flex: 1; background: transparent; border: 0; outline: none; resize: none;
    color: var(--text); font: 14px/1.5 var(--sans); padding: 9px 8px; min-height: 24px; max-height: 200px;
  }
  #chat-input::placeholder { color: var(--text-faint); }
  .chat-actions { display: flex; align-items: center; gap: 6px; padding-bottom: 1px; }
  #stop-btn {
    height: 32px; padding: 0 12px; border-radius: 9px; border: 1px solid var(--border); background: transparent;
    color: var(--red); font: 500 12.5px var(--sans); cursor: pointer; display: none;
  }
  #stop-btn:hover { background: var(--bg-hover); }
</style>
<style id="theme">/*__THEME__*/</style>
</head>
<body>
  <main id="main">
    <section id="composer-view">
      <h1>What should the agent do?</h1>
      <div id="composer-card">
        <textarea id="prompt-input" placeholder="Describe a task or ask a question…" autofocus></textarea>
        <div class="toolbar">
          <div class="tb-group">
            <button id="provider-btn" class="chip" type="button" aria-haspopup="listbox">
              <span class="dot" id="provider-dot"></span>
              <span id="provider-name">Claude Code</span>
              <svg class="chev" viewBox="0 0 10 6" width="10" height="6"><path d="M1 1l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="cwd-chip" class="chip" type="button" title="working directory">
              <svg viewBox="0 0 14 12" width="13" height="11" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1 3.4c0-.7.5-1.3 1.2-1.3h2.5l1.2 1.4h5.7c.7 0 1.2.6 1.2 1.3v4.9c0 .7-.5 1.3-1.2 1.3H2.2C1.5 11 1 10.4 1 9.7z"/></svg>
              <span id="cwd-label"></span>
            </button>
            <input id="cwd-input" class="cwd-edit" spellcheck="false" hidden>
          </div>
          <div class="tb-spacer"></div>
          <button id="approve-chip" class="chip toggle on" type="button" aria-pressed="true">
            <svg class="chk" viewBox="0 0 12 12" width="12" height="12"><path d="M2.5 6.2l2.3 2.3L9.5 3.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            auto-approve
          </button>
          <button id="send-btn" class="send" type="button" aria-label="Start" disabled>
            <svg viewBox="0 0 16 16" width="16" height="16"><path d="M8 13V3.5M4 7l4-4 4 4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div id="provider-menu" class="menu" hidden role="listbox"></div>
      </div>
      <div id="composer-hint">Enter to start · Shift+Enter for newline</div>
    </section>

    <section id="chat-view">
      <div id="messages"></div>
      <div id="chat-input-row">
        <div id="chat-card">
          <textarea id="chat-input" placeholder="Reply…"></textarea>
          <div class="chat-actions">
            <button id="stop-btn" type="button">Stop</button>
            <button id="chat-send" class="send" type="button" aria-label="Send" disabled>
              <svg viewBox="0 0 16 16" width="16" height="16"><path d="M8 13V3.5M4 7l4-4 4 4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

<script>
"use strict";
const $ = (id) => document.getElementById(id);

// Per-provider accent dot. Unknown providers get a stable hashed hue.
const PROVIDER_COLOR = {
  claude: "#d97757", codex: "#10a37f", opencode: "#f2a600", pi: "#8b7cff", gemini: "#4285f4",
};
function colorFor(id) {
  if (PROVIDER_COLOR[id]) return PROVIDER_COLOR[id];
  let h = 0;
  for (const c of id) h = (h * 31 + c.charCodeAt(0)) % 360;
  return `hsl(${h} 60% 60%)`;
}
function basename(p) {
  const t = String(p || "").replace(/\/+$/, "");
  return t.split("/").pop() || t || "~";
}

// ---------- tiny markdown ----------
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function inlineMd(s) {
  return s
    .replace(/`([^`]+)`/g, (_, c) => "<code>" + c + "</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|\s)\*([^*\s][^*]*)\*/g, "$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMd(text) {
  const parts = text.split(/```/);
  let html = "";
  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 1) { // code fence
      const nl = parts[i].indexOf("\n");
      const body = nl >= 0 ? parts[i].slice(nl + 1) : parts[i];
      html += "<pre><code>" + escapeHtml(body.replace(/\n$/, "")) + "</code></pre>";
      continue;
    }
    const lines = escapeHtml(parts[i]).split("\n");
    let para = [], inList = false;
    const flushPara = () => {
      if (para.length) { html += "<p>" + inlineMd(para.join("<br>")) + "</p>"; para = []; }
    };
    const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };
    for (const raw of lines) {
      const line = raw.trimEnd();
      const h = line.match(/^(#{1,4})\s+(.*)/);
      const li = line.match(/^\s*[-*]\s+(.*)/);
      if (!line.trim()) { flushPara(); closeList(); }
      else if (h) { flushPara(); closeList(); const lvl = Math.min(h[1].length + 2, 5); html += `<h${lvl}>` + inlineMd(h[2]) + `</h${lvl}>`; }
      else if (li) { flushPara(); if (!inList) { html += "<ul>"; inList = true; } html += "<li>" + inlineMd(li[1]) + "</li>"; }
      else { closeList(); para.push(line); }
    }
    flushPara(); closeList();
  }
  return html;
}

// ---------- state ----------
// One page = one session. `/` is the composer; `/s/<id>` is that session's chat.
let ws = null;
let providers = [];
let selectedProvider = localStorage.getItem("agentui.provider") || "claude";
let currentSession = null;
const routedSessionId = (location.pathname.match(/^\/s\/([\w-]+)/) || [])[1] || null;

// streaming render state
let curAssistant = null;   // { el, text }
let curThinking = null;    // { el, bodyEl, text }
const toolEls = new Map(); // toolId -> element refs

// ---------- websocket ----------
function connect() {
  ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
  ws.onmessage = (e) => handle(JSON.parse(e.data));
  ws.onopen = () => {
    const sid = currentSession ? currentSession.id : routedSessionId;
    if (sid) ws.onceOpenSubscribe = sid;
  };
  ws.onclose = () => setTimeout(connect, 800);
}
function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

function handle(msg) {
  switch (msg.kind) {
    case "hello":
      providers = msg.providers;
      if (!$("cwd-input").value) setCwd(localStorage.getItem("agentui.cwd") || msg.defaultCwd);
      if (!providers.some((p) => p.id === selectedProvider)) selectedProvider = providers[0]?.id || selectedProvider;
      buildProviderMenu();
      setProvider(selectedProvider);
      if (ws.onceOpenSubscribe) {
        send({ op: "subscribe", sessionId: ws.onceOpenSubscribe });
        ws.onceOpenSubscribe = null;
      }
      break;
    case "session-created":
      history.replaceState(null, "", "/s/" + msg.session.id);
      openChat(msg.session, []);
      break;
    case "history":
      openChat(msg.session, msg.events);
      break;
    case "no-session":
      history.replaceState(null, "", "/");
      showComposer();
      break;
    case "session-status":
      if (currentSession && currentSession.id === msg.sessionId) setChatStatus(msg.status);
      break;
    case "event":
      if (currentSession && currentSession.id === msg.sessionId) renderEvent(msg.evt);
      break;
  }
}

// ---------- composer: provider dropdown ----------
function buildProviderMenu() {
  const menu = $("provider-menu");
  menu.innerHTML = "";
  for (const p of providers) {
    const row = document.createElement("div");
    row.className = "menu-item" + (p.id === selectedProvider ? " selected" : "");
    row.setAttribute("role", "option");
    row.innerHTML =
      `<span class="dot" style="background:${colorFor(p.id)};color:${colorFor(p.id)}"></span>` +
      `<span class="mi-name">${escapeHtml(p.label)}</span>` +
      `<svg class="mi-check" viewBox="0 0 12 12" width="12" height="12"><path d="M2.5 6.2l2.3 2.3L9.5 3.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    row.onclick = () => { setProvider(p.id); closeMenu(); };
    menu.appendChild(row);
  }
}
function setProvider(id) {
  selectedProvider = id;
  localStorage.setItem("agentui.provider", id);
  const p = providers.find((x) => x.id === id);
  const dot = $("provider-dot");
  dot.style.background = colorFor(id);
  dot.style.color = colorFor(id);
  $("provider-name").textContent = p ? p.label : id;
  for (const row of $("provider-menu").children) row.classList.remove("selected");
  const idx = providers.findIndex((x) => x.id === id);
  if (idx >= 0) $("provider-menu").children[idx]?.classList.add("selected");
}
function openMenu() { $("provider-menu").hidden = false; }
function closeMenu() { $("provider-menu").hidden = true; }
$("provider-btn").onclick = (e) => {
  e.stopPropagation();
  $("provider-menu").hidden ? openMenu() : closeMenu();
};
document.addEventListener("click", (e) => {
  if (!$("provider-menu").hidden && !e.target.closest("#provider-menu") && !e.target.closest("#provider-btn")) closeMenu();
});

// ---------- composer: cwd chip ----------
function setCwd(path) {
  $("cwd-input").value = path || "";
  $("cwd-label").textContent = basename(path);
  $("cwd-chip").title = path || "working directory";
}
$("cwd-chip").onclick = () => {
  $("cwd-chip").hidden = true;
  const input = $("cwd-input");
  input.hidden = false;
  input.focus();
  input.select();
};
function commitCwd() {
  const input = $("cwd-input");
  if (input.hidden) return;
  setCwd(input.value.trim());
  localStorage.setItem("agentui.cwd", input.value.trim());
  input.hidden = true;
  $("cwd-chip").hidden = false;
}
$("cwd-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); commitCwd(); }
  else if (e.key === "Escape") { $("cwd-input").hidden = true; $("cwd-chip").hidden = false; }
});
$("cwd-input").addEventListener("blur", commitCwd);

// ---------- composer: auto-approve + send ----------
$("approve-chip").onclick = () => {
  const on = $("approve-chip").classList.toggle("on");
  $("approve-chip").setAttribute("aria-pressed", String(on));
};
function autoApprove() { return $("approve-chip").classList.contains("on"); }

function autoGrow(el, max) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, max) + "px";
}
$("prompt-input").addEventListener("input", () => {
  $("send-btn").disabled = !$("prompt-input").value.trim();
  autoGrow($("prompt-input"), 300);
});

function showComposer() {
  currentSession = null;
  document.title = "cmux agent";
  $("composer-view").style.display = "flex";
  $("chat-view").style.display = "none";
  $("send-btn").disabled = !$("prompt-input").value.trim();
  $("prompt-input").focus();
}
function startSession() {
  const prompt = $("prompt-input").value.trim();
  if (!prompt) return;
  const cwd = $("cwd-input").value.trim();
  localStorage.setItem("agentui.cwd", cwd);
  send({ op: "start", provider: selectedProvider, cwd, prompt, autoApprove: autoApprove() });
  $("prompt-input").value = "";
  $("send-btn").disabled = true;
  autoGrow($("prompt-input"), 300);
}
$("send-btn").onclick = startSession;
$("prompt-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); startSession(); }
});

// ---------- chat ----------
function openChat(session, events) {
  currentSession = session;
  document.title = session.title || "cmux agent";
  $("composer-view").style.display = "none";
  $("chat-view").style.display = "flex";
  $("messages").innerHTML = "";
  curAssistant = null; curThinking = null; toolEls.clear();
  setChatStatus(session.status);
  for (const evt of events) renderEvent(evt, true);
  scrollBottom(true);
  $("chat-input").focus();
}
function setChatStatus(status) {
  currentSession.status = status;
  $("stop-btn").style.display = status === "running" ? "block" : "none";
}
function nearBottom() {
  const m = $("messages");
  return m.scrollHeight - m.scrollTop - m.clientHeight < 80;
}
function scrollBottom(force) {
  const m = $("messages");
  if (force || nearBottom()) m.scrollTop = m.scrollHeight;
}

function renderEvent(evt, replay) {
  const m = $("messages");
  const stick = nearBottom();
  switch (evt.kind) {
    case "user": {
      finalizeStreaming();
      const el = document.createElement("div");
      el.className = "msg user";
      el.innerHTML = `<div class="body"></div>`;
      el.querySelector(".body").textContent = evt.text;
      m.appendChild(el);
      break;
    }
    case "delta": appendAssistant(evt.text); break;
    case "assistant": appendAssistant(evt.text); finalizeStreaming(); break;
    case "thinking": appendThinking(evt.text); break;
    case "tool-start": {
      curThinking = null;
      finalizeStreaming();
      const wrap = document.createElement("div");
      wrap.className = "tool";
      wrap.innerHTML = `<details><summary><span class="spinner"></span><span class="name"></span><span class="detail"></span></summary><div class="out" style="display:none"></div></details>`;
      wrap.querySelector(".name").textContent = evt.name || "tool";
      wrap.querySelector(".detail").textContent = evt.detail || "";
      m.appendChild(wrap);
      toolEls.set(evt.toolId, wrap);
      break;
    }
    case "tool-end": {
      const wrap = toolEls.get(evt.toolId);
      if (wrap) {
        const spin = wrap.querySelector(".spinner");
        if (spin) {
          const mark = document.createElement("span");
          mark.className = "mark " + (evt.ok === false ? "fail" : "ok");
          mark.textContent = evt.ok === false ? "✗" : "✓";
          spin.replaceWith(mark);
        }
        if (evt.detail) {
          const out = wrap.querySelector(".out");
          out.textContent = evt.detail;
          out.style.display = "";
        }
      }
      break;
    }
    case "done": {
      finalizeStreaming();
      curThinking = null;
      if (evt.stats) {
        const el = document.createElement("div");
        el.className = "turn-footer";
        el.textContent = evt.stats;
        m.appendChild(el);
      }
      break;
    }
    case "error": {
      finalizeStreaming();
      const wrap = document.createElement("div");
      wrap.className = "error-block-wrap";
      const el = document.createElement("div");
      el.className = "error-block";
      el.textContent = evt.message;
      wrap.appendChild(el);
      m.appendChild(wrap);
      break;
    }
    case "status": {
      const el = document.createElement("div");
      el.className = "status-line";
      el.textContent = evt.text;
      m.appendChild(el);
      break;
    }
    case "meta":
      break;
  }
  scrollBottom(replay ? false : stick);
}

function appendAssistant(text) {
  curThinking = null;
  if (!curAssistant) {
    const el = document.createElement("div");
    el.className = "msg assistant";
    el.innerHTML = `<div class="body"></div>`;
    $("messages").appendChild(el);
    curAssistant = { el: el.querySelector(".body"), text: "" };
  }
  curAssistant.text += text;
  curAssistant.el.innerHTML = renderMd(curAssistant.text);
}
function finalizeStreaming() { curAssistant = null; }
function appendThinking(text) {
  if (!curThinking) {
    const el = document.createElement("details");
    el.className = "thinking";
    el.innerHTML = `<summary>thinking</summary><div class="t-body"></div>`;
    $("messages").appendChild(el);
    curThinking = { el, bodyEl: el.querySelector(".t-body"), text: "" };
  }
  curThinking.text += text;
  curThinking.bodyEl.textContent = curThinking.text;
}

// ---------- chat input wiring ----------
function sendReply() {
  const text = $("chat-input").value.trim();
  if (!text || !currentSession) return;
  send({ op: "send", sessionId: currentSession.id, prompt: text });
  $("chat-input").value = "";
  $("chat-send").disabled = true;
  autoGrow($("chat-input"), 200);
}
$("chat-input").addEventListener("input", () => {
  $("chat-send").disabled = !$("chat-input").value.trim();
  autoGrow($("chat-input"), 200);
});
$("chat-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendReply(); }
});
$("chat-send").onclick = sendReply;
$("stop-btn").onclick = () => { if (currentSession) send({ op: "stop", sessionId: currentSession.id }); };

if (!routedSessionId) showComposer();
connect();
</script>
</body>
