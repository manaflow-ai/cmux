<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws:; img-src 'self' data: https: file:; frame-src http: https:; child-src http: https:;">
    <title>cmux</title>
    <link rel="stylesheet" href="/vendor/xterm.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell sidebar-footer-workspace" id="shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">cm</div>
          <div>
            <div class="brand-title">cmux</div>
            <div class="brand-subtitle">Windows</div>
          </div>
        </div>
        <div class="sidebar-tools">
          <button type="button" class="rail-button is-active" id="workspacesRailButton" title="Workspaces" aria-label="Workspaces"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><rect x="4" y="5" width="6" height="6" rx="1"></rect><rect x="14" y="5" width="6" height="6" rx="1"></rect><rect x="4" y="15" width="6" height="4" rx="1"></rect><rect x="14" y="15" width="6" height="4" rx="1"></rect></svg></button>
          <button type="button" class="rail-button" id="notificationsRailButton" title="Notifications" aria-label="Notifications"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M18 10a6 6 0 1 0-12 0c0 7-2 7-2 7h16s-2 0-2-7"></path><path d="M10 21h4"></path></svg></button>
          <button type="button" class="rail-button" id="sessionsRailButton" title="Session tools" aria-label="Session tools"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="m8 10 3 3-3 3"></path><path d="M13 16h4"></path></svg></button>
          <button type="button" class="rail-button" id="settingsRailButton" title="Settings" aria-label="Settings"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="3"></circle><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"></path></svg></button>
        </div>
        <div class="workspace-list" id="workspaceList"></div>
        <div class="sidebar-footer">
          <button type="button" class="sidebar-action" id="newWorkspaceButton" title="New workspace" aria-label="New workspace">+ Workspace</button>
          <button type="button" class="sidebar-action danger" id="resetSessionButton" title="Reset session" aria-label="Reset session">Reset</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="window-actions">
            <button type="button" class="icon-button" id="toggleSidebarButton" title="Toggle sidebar" aria-label="Toggle sidebar"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M9 5v14"></path></svg></button>
            <button type="button" class="icon-button" id="paletteButton" title="Command palette" aria-label="Command palette"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="6"></circle><path d="m16 16 4 4"></path></svg></button>
          </div>
          <div class="workspace-title-block">
            <div class="workspace-heading" id="workspaceHeading">Workspace</div>
            <div class="workspace-subheading" id="workspaceSubheading">Ready</div>
          </div>
          <div class="topbar-spacer"></div>
          <div class="command-strip">
            <button type="button" class="tool-button add-tool" id="newTerminalButton" title="Add terminal pane. Right-click for shell profiles." aria-label="Add terminal pane"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="m8 10 3 3-3 3"></path><path d="M13 16h3"></path></svg></span><span class="tool-label">Terminal</span><span class="tool-add-mark" aria-hidden="true">+</span></button>
            <button type="button" class="tool-button" id="splitRightButton" title="Split terminal" aria-label="Split terminal"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M12 5v14"></path></svg></span><span class="tool-label">Split</span></button>
            <button type="button" class="tool-button add-tool" id="newBrowserButton" title="Add browser pane. Right-click for profiles." aria-label="Add browser pane"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><circle cx="12" cy="12" r="8"></circle><path d="M4 12h16M12 4c2.2 2.3 2.2 13.7 0 16M12 4c-2.2 2.3-2.2 13.7 0 16"></path></svg></span><span class="tool-label">Browser</span><span class="tool-add-mark" aria-hidden="true">+</span></button>
            <button type="button" class="tool-button" id="toolsMenuButton" title="Workspace tools" aria-label="Workspace tools"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><circle cx="6" cy="12" r="1.5"></circle><circle cx="12" cy="12" r="1.5"></circle><circle cx="18" cy="12" r="1.5"></circle></svg></span><span class="tool-label">Tools</span></button>
            <button type="button" class="tool-button" id="settingsButton" title="Settings" aria-label="Settings"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><circle cx="12" cy="12" r="3"></circle><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"></path></svg></span><span class="tool-label">Settings</span></button>
            <button type="button" class="tool-button advanced-tool" id="splitDownButton" title="Split down" aria-label="Split down"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M4 12h16"></path></svg></span><span class="tool-label">Down</span></button>
            <button type="button" class="tool-button advanced-tool" id="renameWorkspaceButton" title="Rename workspace" aria-label="Rename workspace"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M6 5h12M12 5v14M9 19h6"></path></svg></span><span class="tool-label">Name</span></button>
            <button type="button" class="tool-button advanced-tool" id="colorWorkspaceButton" title="Change workspace color" aria-label="Change workspace color"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M12 4c4 0 8 3 8 7 0 3-2 5-5 5h-1.5a1.5 1.5 0 0 0 0 3H12a8 8 0 1 1 0-16Z"></path><circle cx="8.5" cy="10" r="1"></circle><circle cx="12" cy="8" r="1"></circle><circle cx="15.5" cy="10" r="1"></circle></svg></span><span class="tool-label">Color</span></button>
          </div>
          <div class="native-window-controls" id="nativeWindowControls">
            <button type="button" class="window-control" id="minimizeWindowButton" title="Minimize" aria-label="Minimize window"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M7 12h10"></path></svg></button>
            <button type="button" class="window-control" id="maximizeWindowButton" title="Maximize" aria-label="Maximize window" data-window-icon="maximize"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><rect x="7" y="7" width="10" height="10" rx="1"></rect></svg></button>
            <button type="button" class="window-control close" id="closeWindowButton" title="Close" aria-label="Close window"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="m7 7 10 10M17 7 7 17"></path></svg></button>
          </div>
        </header>

        <nav class="surface-tabs" id="surfaceTabs"></nav>
        <section class="pane-grid" id="paneGrid">
          <div class="empty-workspace">
            <div class="empty-workspace-inner">
              <div class="empty-workspace-logo" role="img" aria-label="cmux Windows"><img src="./assets/cmux-empty.svg" alt=""></div>
              <div class="empty-workspace-title">cmux</div>
              <div class="empty-workspace-body">Starting cmux Windows...</div>
              <div class="empty-workspace-launchers"></div>
            </div>
          </div>
        </section>
        <footer class="statusbar">
          <span id="statusSummary">cmux Windows</span>
          <span id="statusPipe">pipe</span>
          <span id="statusPty">terminal</span>
        </footer>
      </main>

      <aside class="inspector" id="inspector">
        <div class="inspector-head">
          <div>
            <div class="inspector-title" id="inspectorTitle">Notifications</div>
            <div class="inspector-subtitle" id="inspectorSubtitle">Attention across workspaces</div>
          </div>
          <button type="button" class="icon-button" id="closeInspectorButton" title="Close" aria-label="Close inspector"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="m7 7 10 10M17 7 7 17"></path></svg></button>
        </div>
        <div class="inspector-body" id="inspectorBody"></div>
      </aside>

      <div class="window-resize-edge window-resize-edge-top" data-window-resize-edge="top" aria-hidden="true"></div>
      <div class="window-resize-edge window-resize-edge-right" data-window-resize-edge="right" aria-hidden="true"></div>
      <div class="window-resize-edge window-resize-edge-bottom" data-window-resize-edge="bottom" aria-hidden="true"></div>
      <div class="window-resize-edge window-resize-edge-left" data-window-resize-edge="left" aria-hidden="true"></div>
      <div class="window-resize-edge window-resize-corner-top-left" data-window-resize-edge="top-left" aria-hidden="true"></div>
      <div class="window-resize-edge window-resize-corner-top-right" data-window-resize-edge="top-right" aria-hidden="true"></div>
      <div class="window-resize-edge window-resize-corner-bottom-right" data-window-resize-edge="bottom-right" aria-hidden="true"></div>
      <div class="window-resize-edge window-resize-corner-bottom-left" data-window-resize-edge="bottom-left" aria-hidden="true"></div>
    </div>

    <div class="palette" id="palette" aria-hidden="true">
      <div class="palette-dialog">
        <input id="paletteInput" class="palette-input" autocomplete="off" spellcheck="false" placeholder="Search commands, panes, settings..." aria-label="Command palette search">
        <div class="palette-list" id="paletteList"></div>
      </div>
    </div>

    <div class="workspace-switch-hud" id="workspaceSwitchHud" aria-hidden="true" aria-live="polite">
      <span class="workspace-switch-index"></span>
      <span class="workspace-switch-copy">
        <span class="workspace-switch-title"></span>
        <span class="workspace-switch-meta"></span>
      </span>
    </div>

    <div class="pane-switch-hud" id="paneSwitchHud" aria-hidden="true" aria-live="polite">
      <span class="workspace-switch-index"></span>
      <span class="workspace-switch-copy">
        <span class="workspace-switch-title"></span>
        <span class="workspace-switch-meta"></span>
      </span>
    </div>

    <div class="toast-region" id="toastRegion"></div>

    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/vendor/addon-web-links.js"></script>
    <script src="/vendor/addon-search.js"></script>
    <script src="/dist/settings-ui.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
