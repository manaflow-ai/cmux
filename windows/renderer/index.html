<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws:; img-src 'self' data: https: file:; frame-src http: https:; child-src http: https:;">
    <title>cmux</title>
    <link rel="stylesheet" href="/vendor/xterm.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell sidebar-footer-workspace" id="shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">cm</div>
          <div>
            <div class="brand-title">cmux</div>
            <div class="brand-subtitle">Windows</div>
          </div>
        </div>
        <div class="sidebar-tools">
          <button type="button" class="rail-button is-active" id="workspacesRailButton" title="Workspaces" aria-label="Workspaces">▦</button>
          <button type="button" class="rail-button" id="notificationsRailButton" title="Notifications" aria-label="Notifications">◦</button>
          <button type="button" class="rail-button" id="sessionsRailButton" title="Session tools" aria-label="Session tools">›</button>
          <button type="button" class="rail-button" id="settingsRailButton" title="Settings" aria-label="Settings">⚙</button>
        </div>
        <div class="workspace-list" id="workspaceList"></div>
        <div class="sidebar-footer">
          <button type="button" class="sidebar-action" id="newWorkspaceButton" title="New workspace" aria-label="New workspace">+ Workspace</button>
          <button type="button" class="sidebar-action danger" id="resetSessionButton" title="Reset session" aria-label="Reset session">Reset</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="window-actions">
            <button type="button" class="icon-button" id="toggleSidebarButton" title="Toggle sidebar">▦</button>
            <button type="button" class="icon-button" id="paletteButton" title="Command palette">⌕</button>
          </div>
          <div class="workspace-title-block">
            <div class="workspace-heading" id="workspaceHeading">Workspace</div>
            <div class="workspace-subheading" id="workspaceSubheading">Ready</div>
          </div>
          <div class="topbar-spacer"></div>
          <div class="command-strip">
            <button type="button" class="tool-button primary" id="newTerminalButton" title="New terminal" aria-label="New terminal"><span class="tool-icon" aria-hidden="true">+</span><span class="tool-label">Term</span></button>
            <button type="button" class="tool-button" id="splitRightButton" title="Split terminal" aria-label="Split terminal"><span class="tool-icon" aria-hidden="true">◫</span><span class="tool-label">Split</span></button>
            <button type="button" class="tool-button" id="newBrowserButton" title="Open browser. Right-click for profiles." aria-label="Open browser"><span class="tool-icon" aria-hidden="true">○</span><span class="tool-label">Web</span></button>
            <button type="button" class="tool-button" id="toolsMenuButton" title="Workspace tools" aria-label="Workspace tools"><span class="tool-icon" aria-hidden="true">⋯</span><span class="tool-label">Tools</span></button>
            <button type="button" class="tool-button" id="settingsButton" title="Settings" aria-label="Settings"><span class="tool-icon" aria-hidden="true">⚙</span><span class="tool-label">Settings</span></button>
            <button type="button" class="tool-button advanced-tool" id="splitDownButton" title="Split down" aria-label="Split down"><span class="tool-icon" aria-hidden="true">⇣</span><span class="tool-label">Down</span></button>
            <button type="button" class="tool-button advanced-tool" id="renameWorkspaceButton" title="Rename workspace" aria-label="Rename workspace"><span class="tool-icon" aria-hidden="true">T</span><span class="tool-label">Name</span></button>
            <button type="button" class="tool-button advanced-tool" id="colorWorkspaceButton" title="Change workspace color" aria-label="Change workspace color"><span class="tool-icon" aria-hidden="true">◆</span><span class="tool-label">Color</span></button>
            <button type="button" class="tool-button advanced-tool" id="notifyButton" title="Simulate notification" aria-label="Simulate notification"><span class="tool-icon" aria-hidden="true">◦</span><span class="tool-label">Notify</span></button>
          </div>
          <div class="native-window-controls" id="nativeWindowControls">
            <button type="button" class="window-control" id="minimizeWindowButton" title="Minimize" aria-label="Minimize window">─</button>
            <button type="button" class="window-control" id="maximizeWindowButton" title="Maximize" aria-label="Maximize window">□</button>
            <button type="button" class="window-control close" id="closeWindowButton" title="Close" aria-label="Close window">×</button>
          </div>
        </header>

        <nav class="surface-tabs" id="surfaceTabs"></nav>
        <section class="pane-grid" id="paneGrid">
          <div class="empty-workspace">
            <div class="empty-workspace-inner">
              <div class="empty-workspace-logo" role="img" aria-label="cmux Windows"><img src="./assets/cmux-empty.svg" alt=""></div>
              <div class="empty-workspace-title">cmux</div>
              <div class="empty-workspace-body">Starting cmux Windows...</div>
              <div class="empty-workspace-launchers"></div>
            </div>
          </div>
        </section>
        <footer class="statusbar">
          <span id="statusSummary">cmux Windows</span>
          <span id="statusPipe">pipe</span>
          <span id="statusPty">terminal</span>
        </footer>
      </main>

      <aside class="inspector" id="inspector">
        <div class="inspector-head">
          <div>
            <div class="inspector-title" id="inspectorTitle">Notifications</div>
            <div class="inspector-subtitle" id="inspectorSubtitle">Attention across workspaces</div>
          </div>
          <button type="button" class="icon-button" id="closeInspectorButton" title="Close">×</button>
        </div>
        <div class="inspector-body" id="inspectorBody"></div>
      </aside>
    </div>

    <div class="palette" id="palette" aria-hidden="true">
      <div class="palette-dialog">
        <input id="paletteInput" class="palette-input" autocomplete="off" spellcheck="false" placeholder="Command" aria-label="Command palette search">
        <div class="palette-list" id="paletteList"></div>
      </div>
    </div>

    <div class="workspace-switch-hud" id="workspaceSwitchHud" aria-hidden="true" aria-live="polite">
      <span class="workspace-switch-index"></span>
      <span class="workspace-switch-copy">
        <span class="workspace-switch-title"></span>
        <span class="workspace-switch-meta"></span>
      </span>
    </div>

    <div class="pane-switch-hud" id="paneSwitchHud" aria-hidden="true" aria-live="polite">
      <span class="workspace-switch-index"></span>
      <span class="workspace-switch-copy">
        <span class="workspace-switch-title"></span>
        <span class="workspace-switch-meta"></span>
      </span>
    </div>

    <div class="toast-region" id="toastRegion"></div>

    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/vendor/addon-web-links.js"></script>
    <script src="/vendor/addon-search.js"></script>
    <script src="/dist/settings-ui.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
