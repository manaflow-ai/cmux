<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: http: https:; img-src 'self' data: https:; frame-src http: https:; child-src http: https:;">
    <title>cmux Windows</title>
    <link rel="stylesheet" href="/vendor/xterm.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell" id="shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">cm</div>
          <div>
            <div class="brand-title">cmux</div>
            <div class="brand-subtitle">Windows</div>
          </div>
        </div>
        <div class="sidebar-tools">
          <button class="rail-button is-active" id="workspacesRailButton" title="Workspaces" aria-label="Workspaces">▦</button>
          <button class="rail-button" id="notificationsRailButton" title="Notifications" aria-label="Notifications">!</button>
          <button class="rail-button" id="sessionsRailButton" title="Session tools" aria-label="Session tools">&gt;</button>
          <button class="rail-button" id="settingsRailButton" title="Settings" aria-label="Settings">⚙</button>
        </div>
        <div class="workspace-list" id="workspaceList"></div>
        <div class="sidebar-footer">
          <button class="sidebar-action" id="newWorkspaceButton" title="New workspace">+ Workspace</button>
          <button class="sidebar-action danger" id="resetSessionButton" title="Reset session">Reset</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="window-actions">
            <button class="icon-button" id="toggleSidebarButton" title="Toggle sidebar">▦</button>
            <button class="icon-button" id="paletteButton" title="Command palette">⌕</button>
          </div>
          <div class="workspace-title-block">
            <div class="workspace-heading" id="workspaceHeading">Workspace</div>
            <div class="workspace-subheading" id="workspaceSubheading">Ready</div>
          </div>
          <div class="topbar-spacer"></div>
          <div class="command-strip">
            <button class="tool-button primary" id="newTerminalButton" title="New terminal">+ Term</button>
            <button class="tool-button" id="splitRightButton" title="Split terminal">Split</button>
            <button class="tool-button" id="newBrowserButton" title="Open browser">Web</button>
            <button class="tool-button" id="toolsMenuButton" title="Workspace tools">Tools</button>
            <button class="tool-button" id="settingsButton" title="Settings">Settings</button>
            <button class="tool-button advanced-tool" id="splitDownButton" title="Split down">Down</button>
            <button class="tool-button advanced-tool" id="renameWorkspaceButton" title="Rename workspace">Name</button>
            <button class="tool-button advanced-tool" id="colorWorkspaceButton" title="Change workspace color">Color</button>
            <button class="tool-button advanced-tool" id="notifyButton" title="Simulate notification">Notify</button>
          </div>
          <div class="native-window-controls" id="nativeWindowControls">
            <button class="window-control" id="minimizeWindowButton" title="Minimize">─</button>
            <button class="window-control" id="maximizeWindowButton" title="Maximize">□</button>
            <button class="window-control close" id="closeWindowButton" title="Close">×</button>
          </div>
        </header>

        <nav class="surface-tabs" id="surfaceTabs"></nav>
        <section class="pane-grid" id="paneGrid"></section>
        <footer class="statusbar">
          <span id="statusSummary">cmux Windows</span>
          <span id="statusPipe">pipe</span>
          <span id="statusPty">pty</span>
        </footer>
      </main>

      <aside class="inspector" id="inspector">
        <div class="inspector-head">
          <div>
            <div class="inspector-title" id="inspectorTitle">Notifications</div>
            <div class="inspector-subtitle" id="inspectorSubtitle">Attention across workspaces</div>
          </div>
          <button class="icon-button" id="closeInspectorButton" title="Close">×</button>
        </div>
        <div class="inspector-body" id="inspectorBody"></div>
      </aside>
    </div>

    <div class="palette" id="palette" aria-hidden="true">
      <div class="palette-dialog">
        <input id="paletteInput" class="palette-input" autocomplete="off" spellcheck="false" placeholder="Command">
        <div class="palette-list" id="paletteList"></div>
      </div>
    </div>

    <div class="toast-region" id="toastRegion"></div>

    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/vendor/addon-web-links.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
