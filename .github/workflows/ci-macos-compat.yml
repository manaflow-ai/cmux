name: macOS Compatibility

on:
  workflow_dispatch:

jobs:
  compat-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
            timeout: 30
            startup_smoke: true
            virtual_display: true
            skip_zig: false
            shard_index: 0
            shard_count: 4
            primary_shard: true
          - os: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
            timeout: 30
            startup_smoke: true
            virtual_display: true
            skip_zig: false
            shard_index: 1
            shard_count: 4
            primary_shard: false
          - os: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
            timeout: 30
            startup_smoke: true
            virtual_display: true
            skip_zig: false
            shard_index: 2
            shard_count: 4
            primary_shard: false
          - os: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
            timeout: 30
            startup_smoke: true
            virtual_display: true
            skip_zig: false
            shard_index: 3
            shard_count: 4
            primary_shard: false
          - os: ${{ vars.MACOS_RUNNER_26 || 'warp-macos-26-arm64-6x' }}
            timeout: 30
            startup_smoke: true
            virtual_display: false
            skip_zig: true  # zig 0.15.2 MachO linker can't resolve libSystem on macOS 26
            shard_index: 0
            shard_count: 4
            primary_shard: true
          - os: ${{ vars.MACOS_RUNNER_26 || 'warp-macos-26-arm64-6x' }}
            timeout: 30
            startup_smoke: true
            virtual_display: false
            skip_zig: true  # zig 0.15.2 MachO linker can't resolve libSystem on macOS 26
            shard_index: 1
            shard_count: 4
            primary_shard: false
          - os: ${{ vars.MACOS_RUNNER_26 || 'warp-macos-26-arm64-6x' }}
            timeout: 30
            startup_smoke: true
            virtual_display: false
            skip_zig: true  # zig 0.15.2 MachO linker can't resolve libSystem on macOS 26
            shard_index: 2
            shard_count: 4
            primary_shard: false
          - os: ${{ vars.MACOS_RUNNER_26 || 'warp-macos-26-arm64-6x' }}
            timeout: 30
            startup_smoke: true
            virtual_display: false
            skip_zig: true  # zig 0.15.2 MachO linker can't resolve libSystem on macOS 26
            shard_index: 3
            shard_count: 4
            primary_shard: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
    steps:
      - name: Prepare self-hosted workspace
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            sudo -n chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          fi
          chmod -R u+rwX "$GITHUB_WORKSPACE" || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Pick the latest Xcode installed on the runner. GitHub-hosted macos-14
          # defaults to Xcode 15.4, but the project needs Xcode 16+ (Swift tools
          # version 6.0 required by sentry-cocoa).
          XCODE_APP="$(
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print 2>/dev/null \
              | sort \
              | tail -n 1 \
              || true
          )"
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP="/Applications/Xcode.app"
          fi
          XCODE_DIR="$XCODE_APP/Contents/Developer"
          if [ ! -d "$XCODE_DIR" ]; then
            echo "No Xcode found under /Applications" >&2
            exit 1
          fi
          echo "Selected: $XCODE_APP"
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          XCODE_VERSION_OUTPUT="$(xcodebuild -version)"
          XCODE_VER="${XCODE_VERSION_OUTPUT%%$'\n'*}"
          echo "XCODE_VER=$XCODE_VER" >> "$GITHUB_ENV"
          echo "$XCODE_VERSION_OUTPUT"
          xcrun --sdk macosx --show-sdk-path
          sw_vers

      - name: Capture Ghostty revision
        id: ghostty-revision
        run: |
          echo "sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ steps.ghostty-revision.outputs.sha }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        if: ${{ !matrix.skip_zig }}
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Developer/Xcode/DerivedData/cmux-*
          key: deriveddata-${{ matrix.os }}-${{ env.XCODE_VER }}-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-${{ hashFiles('cmux.xcodeproj/project.pbxproj') }}-${{ steps.ghostty-revision.outputs.sha }}

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-${{ matrix.os }}-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ matrix.os }}-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run unit tests
        env:
          CMUX_SKIP_ZIG_BUILD: ${{ matrix.skip_zig && '1' || '0' }}
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/compat-tests"
          run_unit_tests() {
            SOURCE_PACKAGES_DIR="$SOURCE_PACKAGES_DIR" \
              DERIVED_DATA_PATH="$DERIVED_DATA_PATH" \
              CMUX_UNIT_TEST_SHARD_INDEX="${{ matrix.shard_index }}" \
              CMUX_UNIT_TEST_SHARD_COUNT="${{ matrix.shard_count }}" \
              scripts/ci/run-cmux-unit-tests-isolated.sh
          }

          set +e
          run_unit_tests | tee /tmp/test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          OUTPUT=$(cat /tmp/test-output.txt)
          set -e

          # SwiftPM binary artifact resolution can occasionally fail on ephemeral
          # runners. Retry once after clearing caches.
          if [ "$EXIT_CODE" -ne 0 ] && grep -q "Could not resolve package dependencies" <<<"$OUTPUT"; then
            echo "SwiftPM package resolution failed, clearing caches and retrying once"
            rm -rf ~/Library/Caches/org.swift.swiftpm
            mkdir -p ~/Library/Caches/org.swift.swiftpm
            rm -rf "$DERIVED_DATA_PATH"
            set +e
            run_unit_tests | tee /tmp/test-output.txt
            EXIT_CODE=${PIPESTATUS[0]}
            OUTPUT=$(cat /tmp/test-output.txt)
            set -e
          fi

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Unit tests failed"
            exit "$EXIT_CODE"
          fi

          if ! grep -Eq 'All [1-9][0-9]* selected cmuxTests XCTestCase classes and Swift Testing suites passed in shard-.* batches' <<<"$OUTPUT"; then
            echo "Compatibility unit tests completed without executing any tests" >&2
            exit 1
          fi

      - name: Create virtual display
        if: matrix.primary_shard && matrix.virtual_display
        run: |
          set -euo pipefail
          echo "=== Display before ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(no display info)"
          echo ""
          clang -framework Foundation -framework CoreGraphics \
            -framework AppKit \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          VDISPLAY_READY="${RUNNER_TEMP:-/tmp}/cmux-compat-virtual-display.ready"
          VDISPLAY_ID_PATH="${RUNNER_TEMP:-/tmp}/cmux-compat-virtual-display.id"
          VDISPLAY_LOG="${RUNNER_TEMP:-/tmp}/cmux-compat-virtual-display.log"
          rm -f "$VDISPLAY_READY" "$VDISPLAY_ID_PATH" "$VDISPLAY_LOG"

          /tmp/create-virtual-display \
            --ready-path "$VDISPLAY_READY" \
            --display-id-path "$VDISPLAY_ID_PATH" \
            >"$VDISPLAY_LOG" 2>&1 &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"

          for _ in $(seq 1 900); do
            if [ -s "$VDISPLAY_READY" ] && [ -s "$VDISPLAY_ID_PATH" ]; then
              break
            fi
            if ! kill -0 "$VDISPLAY_PID" 2>/dev/null; then
              echo "Virtual display helper exited before readiness" >&2
              cat "$VDISPLAY_LOG" >&2 || true
              exit 1
            fi
            sleep 0.1
          done
          if [ ! -s "$VDISPLAY_READY" ] || [ ! -s "$VDISPLAY_ID_PATH" ]; then
            echo "Timed out waiting for virtual display readiness after 90s" >&2
            cat "$VDISPLAY_LOG" >&2 || true
            exit 1
          fi
          echo "Virtual display ready: $(tr -d '\n' < "$VDISPLAY_ID_PATH")"
          cat "$VDISPLAY_LOG"
          echo "=== Display after ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(no display info)"

      - name: Build app for smoke test
        if: matrix.primary_shard && matrix.startup_smoke
        env:
          CMUX_SKIP_ZIG_BUILD: ${{ matrix.skip_zig && '1' || '0' }}
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" build

      - name: Smoke test
        if: matrix.primary_shard && matrix.startup_smoke
        run: |
          set -euo pipefail
          chmod +x scripts/smoke-test-ci.sh
          scripts/smoke-test-ci.sh
