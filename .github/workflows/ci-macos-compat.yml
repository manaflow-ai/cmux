name: macOS Compatibility

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  classify-pr-scope:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      run_heavy_macos: ${{ steps.classify.outputs.run_heavy_macos }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify pull request scope
        id: classify
        run: |
          set -euo pipefail
          OUTPUT=$(python3 scripts/ci/classify_pr_scope.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --event-name "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha || '' }}" \
            --head "${{ github.event.pull_request.head.sha || github.sha }}")
          echo "$OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"

  prepare-ghosttykit:
    needs: classify-pr-scope
    if: needs.classify-pr-scope.outputs.run_heavy_macos == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP="/Applications/Xcode.app"
          fi
          XCODE_DIR="$XCODE_APP/Contents/Developer"
          if [ ! -d "$XCODE_DIR" ]; then
            echo "No Xcode found under /Applications" >&2
            exit 1
          fi
          echo "Selected: $XCODE_APP"
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          sw_vers

      - name: Ensure GhosttyKit.xcframework
        run: bash scripts/ci/ensure_ghosttykit.sh

      - name: Package GhosttyKit.xcframework artifact
        run: |
          set -euo pipefail
          rm -f GhosttyKit.xcframework.tar.gz
          tar czf GhosttyKit.xcframework.tar.gz GhosttyKit.xcframework

      - name: Upload GhosttyKit.xcframework artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ghosttykit-xcframework
          path: GhosttyKit.xcframework.tar.gz
          compression-level: 0
          if-no-files-found: error

  compat-tests:
    needs: [classify-pr-scope, prepare-ghosttykit]
    if: needs.classify-pr-scope.outputs.run_heavy_macos == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Download GhosttyKit.xcframework artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ghosttykit-xcframework

      - name: Extract GhosttyKit.xcframework artifact
        run: |
          set -euo pipefail
          rm -rf GhosttyKit.xcframework
          tar xzf GhosttyKit.xcframework.tar.gz
          rm -f GhosttyKit.xcframework.tar.gz

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Pick the latest Xcode installed on the runner. GitHub-hosted macos-14
          # defaults to Xcode 15.4, but the project needs Xcode 16+ (Swift tools
          # version 6.0 required by sentry-cocoa).
          XCODE_APP="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP="/Applications/Xcode.app"
          fi
          XCODE_DIR="$XCODE_APP/Contents/Developer"
          if [ ! -d "$XCODE_DIR" ]; then
            echo "No Xcode found under /Applications" >&2
            exit 1
          fi
          echo "Selected: $XCODE_APP"
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          sw_vers

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/GhosttyTabs-*

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          rm -rf "$SOURCE_PACKAGES_DIR"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run issue #952 regression guard
        run: python3 tests/test_issue_952_socket_listener_recovery.py

      - name: Run unit tests
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          run_unit_tests() {
            xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" test 2>&1
          }

          set +e
          OUTPUT=$(run_unit_tests)
          EXIT_CODE=$?
          set -e

          # SwiftPM binary artifact resolution can occasionally fail on ephemeral
          # runners. Retry once after clearing caches.
          if [ "$EXIT_CODE" -ne 0 ] && echo "$OUTPUT" | grep -q "Could not resolve package dependencies"; then
            echo "SwiftPM package resolution failed, clearing caches and retrying once"
            rm -rf ~/Library/Caches/org.swift.swiftpm
            mkdir -p ~/Library/Caches/org.swift.swiftpm
            rm -rf ~/Library/Developer/Xcode/DerivedData/GhosttyTabs-*
            set +e
            OUTPUT=$(run_unit_tests)
            EXIT_CODE=$?
            set -e
          fi

          echo "$OUTPUT"
          if [ "$EXIT_CODE" -ne 0 ]; then
            SUMMARY=$(echo "$OUTPUT" | grep "Executed.*tests.*with.*failures" | tail -1)
            if echo "$SUMMARY" | grep -q "(0 unexpected)"; then
              echo "All failures are expected, treating as pass"
            else
              echo "Unexpected test failures detected"
              exit 1
            fi
          fi

      - name: Create virtual display
        run: |
          set -euo pipefail
          echo "=== Display before ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(no display info)"
          echo ""
          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          /tmp/create-virtual-display &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"
          sleep 3
          echo "=== Display after ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(no display info)"

      - name: Build app for smoke test
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" build

      - name: Smoke test
        run: |
          set -euo pipefail
          chmod +x scripts/smoke-test-ci.sh
          scripts/smoke-test-ci.sh
