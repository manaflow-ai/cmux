name: iOS simulator tests

on:
  pull_request:
    paths:
      - "ios/**"
      - "Packages/CMUXAuthCore/**"
      - "Packages/CMUXMobileCore/**"
      - "Packages/CmuxAuthRuntime/**"
      - "Packages/CmuxMobile*/**"
      - "Packages/CMUXMobile*/**"
      - "Sources/Mobile/**"
      - "vendor/stack-auth-swift-sdk-prerelease/**"
      - "scripts/lint-ios-package-conventions.sh"
      - ".github/workflows/test-ios.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      test_filter:
        description: "UI test class or class/method, for example cmuxUITests/testSignInPairingAndWorkspaceShell"
        required: false
        default: ""
      device_family:
        description: "Simulator family"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - iphone
          - ipad

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-ios-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Detect iOS changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_MERGE_BASE="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"
          git diff --name-only "$BASE_MERGE_BASE" "$HEAD_SHA" > /tmp/changed-files.txt
          if grep -Eq '^(ios/|Packages/CMUXAuthCore/|Packages/CMUXMobileCore/|Packages/CmuxAuthRuntime/|Packages/CmuxMobile[^/]*/|Packages/CMUXMobile[^/]*/|Sources/Mobile/|vendor/stack-auth-swift-sdk-prerelease/|scripts/lint-ios-package-conventions\.sh$|\.github/workflows/test-ios\.yml$)' /tmp/changed-files.txt; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No iOS-owned files changed; skipping iOS tests."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  package-conventions-lint:
    needs: detect-ios-changes
    if: ${{ needs.detect-ios-changes.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Lint iOS package conventions
        run: |
          # Mechanical enforcement of the modular-refactor conventions over the
          # iOS line (no singletons / Combine / locks / timer hacks / KVO /
          # namespace-enums). Exits non-zero on any unjustified ERROR; sanctioned
          # exceptions carry a lint:allow / TRANSITIONAL / carve-out marker.
          ./scripts/lint-ios-package-conventions.sh

  mobile-core-package:
    needs: detect-ios-changes
    if: ${{ needs.detect-ios-changes.outputs.should_run == 'true' }}
    runs-on: ${{ vars.MACOS_RUNNER_26 || 'warp-macos-26-arm64-6x' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' -print 2>/dev/null | sort | tail -n 1 || true)"
            if [ -z "$XCODE_APP" ]; then
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
            XCODE_DIR="$XCODE_APP/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Run mobile Swift package tests
        run: |
          set -euo pipefail
          # The iOS workspace build does not execute standalone SwiftPM package
          # tests. Run mobile package tests here so shared mobile reducers,
          # route decoders, transport shims, and pairing stores are a real gate.
          PACKAGES=(
            CMUXMobileCore
            CmuxMobileCamera
            CmuxMobileDiagnostics
            CmuxMobilePairedMac
            CmuxMobileRPC
            CmuxMobileShell
            CmuxMobileShellModel
            CmuxMobileSupport
            CmuxMobileTerminalKit
            CmuxMobileTransport
            CmuxMobileWorkspace
          )
          for pkg in "${PACKAGES[@]}"; do
            echo "::group::swift test Packages/$pkg"
            output_file="$(mktemp)"
            swift test --package-path "Packages/$pkg" 2>&1 | tee "$output_file"
            if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' "$output_file"; then
              echo "swift test Packages/$pkg completed without executing any tests" >&2
              exit 1
            fi
            echo "::endgroup::"
          done

  ios-simulator:
    needs: detect-ios-changes
    if: ${{ needs.detect-ios-changes.outputs.should_run == 'true' }}
    runs-on: ${{ vars.MACOS_RUNNER_26 || 'warp-macos-26-arm64-6x' }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        family: [iphone, ipad]
    steps:
      - name: Skip unrequested family
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family }}
        run: |
          echo "Skipping ${{ matrix.family }}"

      - name: Checkout
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
          submodules: false

      - name: Initialize submodules with retry
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Capture Ghostty revision
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        id: ghostty-revision
        run: echo "sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' -print 2>/dev/null | sort | tail -n 1 || true)"
            if [ -z "$XCODE_APP" ]; then
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
            XCODE_DIR="$XCODE_APP/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache GhosttyKit.xcframework
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-ios-${{ steps.ghostty-revision.outputs.sha }}

      - name: Provision GhosttyKit
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: |
          # Downloads the prebuilt GhosttyKit.xcframework pinned in
          # scripts/ghosttykit-checksums.txt for the current ghostty SHA. The
          # iOS app links GhosttyKit via a local-path binaryTarget, so it must
          # exist before package resolve. Do not fall back to a local Zig build
          # here: the iOS lane runs on macOS 26, where the Ghostty Zig helper
          # source build is intentionally not supported.
          if [ ! -d GhosttyKit.xcframework ]; then
            ./scripts/download-prebuilt-ghosttykit.sh
          fi

      - name: Pick simulator
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        env:
          DEVICE_FAMILY: ${{ matrix.family }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/simulator.env
          import json
          import os
          import subprocess

          family = os.environ["DEVICE_FAMILY"]
          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))
          devices = [
              device
              for runtimes in data.get("devices", {}).values()
              for device in runtimes
              if device.get("isAvailable", True)
          ]
          prefix = "iPad" if family == "ipad" else "iPhone"
          preferred = ["iPad Pro 13-inch (M4)", "iPad Air 13-inch (M3)"] if family == "ipad" else ["iPhone 17", "iPhone 16"]
          selected = next((d for name in preferred for d in devices if d.get("name") == name), None)
          selected = selected or next(d for d in devices if d.get("name", "").startswith(prefix))
          print(f"SIMULATOR_ID={selected['udid']}")
          print(f"SIMULATOR_NAME={selected['name']}")
          PY
          cat /tmp/simulator.env
          cat /tmp/simulator.env >> "$GITHUB_ENV"

      - name: Resolve packages
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        run: |
          xcodebuild -workspace ios/cmux.xcworkspace \
            -scheme cmux-ios \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -derivedDataPath /tmp/cmux-ios-${{ matrix.family }} \
            -resolvePackageDependencies

      - name: Run iOS simulator tests
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.device_family != 'both' && inputs.device_family != matrix.family) }}
        env:
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          set -euo pipefail
          XCODEBUILD_ARGS=(
            -workspace ios/cmux.xcworkspace
            -scheme cmux-ios
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID"
            -derivedDataPath /tmp/cmux-ios-${{ matrix.family }}
          )
          if [ -n "${TEST_FILTER:-}" ]; then
            XCODEBUILD_ARGS+=(-only-testing:"$TEST_FILTER")
          fi
          XCODEBUILD_ARGS+=(test)
          require_executed_tests() {
            local log_path="$1"
            if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' "$log_path"; then
              echo "iOS simulator test workflow completed without executing any tests" >&2
              return 1
            fi
          }
          xctest_started() {
            local log_path="$1"
            grep -Eq 'Test Suite .* started|Testing started|Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' "$log_path"
          }
          for attempt in 1 2; do
            LOG_PATH="/tmp/cmux-ios-${{ matrix.family }}-attempt-${attempt}.log"
            echo "Preparing $SIMULATOR_NAME ($SIMULATOR_ID), attempt $attempt"
            xcrun simctl shutdown "$SIMULATOR_ID" >/dev/null 2>&1 || true
            xcrun simctl erase "$SIMULATOR_ID"
            xcrun simctl boot "$SIMULATOR_ID" >/dev/null 2>&1 || true
            xcrun simctl bootstatus "$SIMULATOR_ID" -b
            if xcodebuild "${XCODEBUILD_ARGS[@]}" 2>&1 | tee "$LOG_PATH"; then
              require_executed_tests "$LOG_PATH"
              exit 0
            fi
            status="${PIPESTATUS[0]}"
            if [ "$attempt" -lt 2 ] && ! xctest_started "$LOG_PATH" && grep -Eq "Timed out while launching application via Xcode|Failed to send signal 19|DTXMessage" "$LOG_PATH"; then
              echo "Detected Xcode simulator launch failure, retrying on a clean simulator."
              continue
            fi
            echo "iOS simulator xcodebuild failed; failing instead of treating post-XCTest cleanup as success" >&2
            exit "$status"
          done
