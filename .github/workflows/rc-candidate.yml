name: RC candidate macOS build

# Cuts a release-candidate (RC) build from a frozen commit SHA. Unlike the
# nightly lane (which tracks main HEAD), this is always a manual, explicit cut
# of a chosen candidate at a chosen version, so it has no HEAD-drift guards.
#
# Produces the `cmux RC` variant:
#   - bundle ID   com.cmuxterm.app.rc
#   - URL scheme  cmux-rc
#   - icon        AppIcon-RC
#   - Sparkle feed https://files.cmux.com/rc/appcast.xml
#   - GitHub release tag `rc` (force-updated per candidate)
#
# Requires the same signing/notarization secrets as nightly plus a Developer ID
# provisioning profile for com.cmuxterm.app.rc carrying the WebAuthn browser
# entitlement, stored as APPLE_RC_PROVISIONING_PROFILE_BASE64.

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Commit SHA to build as the RC candidate
        required: true
        type: string
      version:
        description: RC marketing version (X.Y.Z)
        required: true
        type: string

concurrency:
  group: rc-build
  # Queue concurrent runs instead of canceling them so no candidate is lost.
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CREATE_DMG_VERSION: 8.0.0

jobs:
  build-sign-notarize-rc:
    # Run on the macOS 15 host that carries the signing/notarization secrets.
    # The Swift app still selects an Xcode with the macOS 26 SDK so it adopts
    # Liquid Glass on Tahoe. The Ghostty CLI helper is built separately and
    # injected before signing, mirroring the nightly lane.
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    timeout-minutes: 30
    steps:
      - name: Resolve candidate inputs
        id: inputs
        run: |
          set -euo pipefail
          CANDIDATE_SHA="${{ github.event.inputs.candidate_sha }}"
          VERSION="${{ github.event.inputs.version }}"
          # Strip an optional leading "v" so both "0.49.0" and "v0.49.0" work.
          VERSION="${VERSION#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must look like X.Y.Z, got: $VERSION" >&2
            exit 1
          fi
          echo "candidate_sha=${CANDIDATE_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${CANDIDATE_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout candidate ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.inputs.outputs.candidate_sha }}
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          ./scripts/select-nightly-xcodes.sh

      - name: Install build deps
        run: |
          ./scripts/install-rust-ci.sh
          ./scripts/install-zig-ci.sh
          npm install --global "create-dmg@${CREATE_DMG_VERSION}"

      - name: Build universal Ghostty CLI helper
        env:
          DEVELOPER_DIR: ${{ env.HELPER_DEVELOPER_DIR }}
        run: |
          set -euo pipefail
          ./scripts/build-ghostty-cli-helper.sh --universal --output /tmp/cmux-ghostty-helper-universal
          ARCHS_OUT="$(lipo -archs /tmp/cmux-ghostty-helper-universal)"
          echo "Universal Ghostty CLI helper architectures: $ARCHS_OUT"
          case " $ARCHS_OUT " in *" arm64 "*) ;; *) echo "helper missing arm64 slice" >&2; exit 1 ;; esac
          case " $ARCHS_OUT " in *" x86_64 "*) ;; *) echo "helper missing x86_64 slice" >&2; exit 1 ;; esac

      - name: Download pre-built GhosttyKit.xcframework
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .spm-cache
          key: spm-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: daemon/remote/go.mod
          cache-dependency-path: daemon/remote/go.sum

      - name: Derive Sparkle public key from private key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Missing SPARKLE_PRIVATE_KEY secret" >&2
            exit 1
          fi
          DERIVED_PUBLIC_KEY=$(swift scripts/derive_sparkle_public_key.swift "$SPARKLE_PRIVATE_KEY")
          echo "Derived Sparkle public key: $DERIVED_PUBLIC_KEY"
          echo "SPARKLE_PUBLIC_KEY=$DERIVED_PUBLIC_KEY" >> "$GITHUB_ENV"

      - name: Build universal RC app (Release)
        env:
          # Skip the in-Xcode zig helper build; it would fail to cross-link
          # x86_64 against the macOS 26 SDK. The real universal helper is built
          # by the "Build universal Ghostty CLI helper" step and injected below.
          CMUX_SKIP_ZIG_BUILD: "1"
        run: |
          xcodebuild -scheme cmux -configuration Release -derivedDataPath build-universal \
            -destination 'generic/platform=macOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-RC build

      - name: Inject universal Ghostty CLI helper
        run: |
          set -euo pipefail
          APP_DIR="build-universal/Build/Products/Release/cmux.app"
          if [ ! -d "$APP_DIR" ]; then
            echo "Built app not found at $APP_DIR" >&2
            exit 1
          fi
          DEST="$APP_DIR/Contents/Resources/bin/ghostty"
          mkdir -p "$(dirname "$DEST")"
          install -m 755 /tmp/cmux-ghostty-helper-universal "$DEST"
          echo "Injected Ghostty CLI helper architectures: $(lipo -archs "$DEST")"

      - name: Run bundled Ghostty theme picker helper regression
        run: |
          set -euo pipefail
          CMUX_APP_PATH="build-universal/Build/Products/Release/cmux.app" \
            ./tests/test_bundled_ghostty_theme_picker_helper.sh

      - name: Verify RC binary architectures
        run: |
          set -euo pipefail
          APP_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/MacOS/cmux"
          CLI_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/cmux"
          HELPER_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/ghostty"
          APP_ARCHS="$(lipo -archs "$APP_BINARY")"
          CLI_ARCHS="$(lipo -archs "$CLI_BINARY")"
          HELPER_ARCHS="$(lipo -archs "$HELPER_BINARY")"
          echo "App binary architectures: $APP_ARCHS"
          echo "CLI binary architectures: $CLI_ARCHS"
          echo "Ghostty helper architectures: $HELPER_ARCHS"
          [[ "$APP_ARCHS" == *arm64* && "$APP_ARCHS" == *x86_64* ]]
          [[ "$CLI_ARCHS" == *arm64* && "$CLI_ARCHS" == *x86_64* ]]
          [[ "$HELPER_ARCHS" == *arm64* && "$HELPER_ARCHS" == *x86_64* ]]

      - name: Run CLI version memory guard regression
        run: |
          set -euo pipefail
          CLI_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/cmux"
          [ -x "$CLI_BINARY" ] || { echo "cmux CLI binary not found at $CLI_BINARY" >&2; exit 1; }
          CMUX_CLI_BIN="$CLI_BINARY" python3 tests/test_cli_version_memory_guard.py

      - name: Inject RC identities and metadata
        run: |
          set -euo pipefail
          SHORT_SHA="${{ steps.inputs.outputs.short_sha }}"
          VERSION="${{ steps.inputs.outputs.version }}"
          APP_DIR="build-universal/Build/Products/Release"

          # Build number: unique/monotonic per workflow run attempt so reruns and
          # successive candidates still compare as newer in Sparkle.
          if [ -n "${GITHUB_RUN_ID:-}" ]; then
            RUN_ATTEMPT="$(printf '%02d' "${GITHUB_RUN_ATTEMPT:-1}")"
            RC_BUILD="${GITHUB_RUN_ID}${RUN_ATTEMPT}"
          else
            RC_BUILD="$(date -u +%Y%m%d000000)"
          fi
          RC_MARKETING_VERSION="${VERSION}-rc.${RC_BUILD}"

          RC_DMG_IMMUTABLE="cmux-rc-macos-${RC_BUILD}.dmg"
          {
            echo "RC_BUILD=${RC_BUILD}"
            echo "RC_MARKETING_VERSION=${RC_MARKETING_VERSION}"
            echo "RC_REMOTE_DAEMON_VERSION=${RC_MARKETING_VERSION}"
            echo "RC_DMG_IMMUTABLE=${RC_DMG_IMMUTABLE}"
          } >> "$GITHUB_ENV"

          prepare_variant() {
            local app_dir="$1"
            local bundle_id="$2"
            local feed_url="$3"
            local app_plist="$app_dir/cmux.app/Contents/Info.plist"

            /usr/libexec/PlistBuddy -c "Set :CFBundleName cmux RC" "$app_plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName cmux RC" "$app_plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${bundle_id}" "$app_plist"
            local url_type_name
            url_type_name="$(/usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes:1:CFBundleURLName" "$app_plist")"
            if [[ "$url_type_name" != *.auth ]]; then
              echo "Expected CFBundleURLTypes[1] to be the auth URL type, found: $url_type_name" >&2
              exit 1
            fi
            /usr/libexec/PlistBuddy -c "Set :CFBundleURLTypes:1:CFBundleURLSchemes:0 cmux-rc" "$app_plist"
            /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "$app_plist" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Delete :SUFeedURL" "$app_plist" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Add :SUPublicEDKey string ${SPARKLE_PUBLIC_KEY}" "$app_plist"
            /usr/libexec/PlistBuddy -c "Add :SUFeedURL string ${feed_url}" "$app_plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${RC_MARKETING_VERSION}" "$app_plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${RC_BUILD}" "$app_plist"
            /usr/libexec/PlistBuddy -c "Delete :CMUXCommit" "$app_plist" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Add :CMUXCommit string ${SHORT_SHA}" "$app_plist"
            mv "$app_dir/cmux.app" "$app_dir/cmux RC.app"
          }

          prepare_variant \
            "$APP_DIR" \
            "com.cmuxterm.app.rc" \
            "https://files.cmux.com/rc/appcast.xml"

          echo "RC app name: cmux RC"
          echo "RC bundle ID: com.cmuxterm.app.rc"
          echo "RC marketing version: ${RC_MARKETING_VERSION}"
          echo "RC build number: ${RC_BUILD}"
          echo "RC immutable DMG: ${RC_DMG_IMMUTABLE}"
          echo "Commit SHA: ${SHORT_SHA}"

      - name: Build remote daemon RC assets and inject manifest
        run: |
          set -euo pipefail
          # Build with --asset-suffix so manifest download URLs point to
          # immutable, build-specific asset names. This prevents checksum
          # mismatches when a newer RC overwrites the shared "latest" assets.
          ./scripts/build_remote_daemon_release_assets.sh \
            --version "$RC_REMOTE_DAEMON_VERSION" \
            --release-tag "rc" \
            --repo "manaflow-ai/cmux" \
            --output-dir "remote-daemon-assets" \
            --asset-suffix "$RC_BUILD"
          MANIFEST_JSON="$(python3 -c 'import json,sys; print(json.dumps(json.load(open(sys.argv[1], encoding="utf-8")), separators=(",",":")))' "remote-daemon-assets/cmuxd-remote-manifest-${RC_BUILD}.json")"
          APP_PLIST="build-universal/Build/Products/Release/cmux RC.app/Contents/Info.plist"
          if [ ! -f "$APP_PLIST" ]; then
            echo "Missing RC app Info.plist at $APP_PLIST" >&2
            exit 1
          fi
          plutil -remove CMUXRemoteDaemonManifestJSON "$APP_PLIST" >/dev/null 2>&1 || true
          plutil -insert CMUXRemoteDaemonManifestJSON -string "$MANIFEST_JSON" "$APP_PLIST"
          # Also create unsuffixed "latest" copies for the release page and any
          # tooling that fetches the generic asset names.
          for platform in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            cp "remote-daemon-assets/cmuxd-remote-${platform}-${RC_BUILD}" \
               "remote-daemon-assets/cmuxd-remote-${platform}"
          done
          (
            cd remote-daemon-assets
            shasum -a 256 \
              cmuxd-remote-darwin-arm64 \
              cmuxd-remote-darwin-amd64 \
              cmuxd-remote-linux-arm64 \
              cmuxd-remote-linux-amd64 \
              > cmuxd-remote-checksums.txt
          )
          cp "remote-daemon-assets/cmuxd-remote-manifest-${RC_BUILD}.json" \
             "remote-daemon-assets/cmuxd-remote-manifest.json"

      - name: Import signing cert
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "Missing APPLE_CERTIFICATE_BASE64 secret" >&2
            exit 1
          fi
          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "Missing APPLE_CERTIFICATE_PASSWORD secret" >&2
            exit 1
          fi
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Embed RC provisioning profile
        env:
          APPLE_RC_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_RC_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$APPLE_RC_PROVISIONING_PROFILE_BASE64" ]; then
            echo "Missing APPLE_RC_PROVISIONING_PROFILE_BASE64 secret" >&2
            exit 1
          fi

          APP_PATH="build-universal/Build/Products/Release/cmux RC.app"
          PROFILE_PATH="$APP_PATH/Contents/embedded.provisionprofile"
          TMP_PROFILE="$(mktemp /tmp/cmux-rc-profile.XXXXXX)"
          TMP_PLIST="$(mktemp /tmp/cmux-rc-profile.XXXXXX.plist)"
          trap 'rm -f "$TMP_PROFILE" "$TMP_PLIST"' EXIT

          echo "$APPLE_RC_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$TMP_PROFILE"
          security cms -D -i "$TMP_PROFILE" > "$TMP_PLIST"

          APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.application-identifier" "$TMP_PLIST")"
          if [ "$APP_ID" != "7WLXT3NR37.com.cmuxterm.app.rc" ]; then
            echo "RC provisioning profile targets unexpected app ID: $APP_ID" >&2
            exit 1
          fi

          WEBAUTHN_ENTITLEMENT="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.web-browser.public-key-credential" "$TMP_PLIST")"
          if [ "$WEBAUTHN_ENTITLEMENT" != "true" ]; then
            echo "RC provisioning profile is missing WebAuthn browser entitlement" >&2
            exit 1
          fi

          PROVISIONS_ALL_DEVICES="$(/usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" "$TMP_PLIST")"
          if [ "$PROVISIONS_ALL_DEVICES" != "true" ]; then
            echo "RC provisioning profile is not a Developer ID all-devices profile" >&2
            exit 1
          fi

          cp "$TMP_PROFILE" "$PROFILE_PATH"

      - name: Codesign apps
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Missing APPLE_SIGNING_IDENTITY secret" >&2
            exit 1
          fi
          for APP_PATH in \
            "build-universal/Build/Products/Release/cmux RC.app"
          do
            ./scripts/sign-cmux-bundle.sh \
              "$APP_PATH" \
              cmux.rc.entitlements \
              "$APPLE_SIGNING_IDENTITY"
          done

      - name: Notarize apps and dmgs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Missing notarization secrets (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID)" >&2
            exit 1
          fi
          notarize_and_package() {
            local app_path="$1"
            local dmg_release="$2"
            local dmg_immutable="$3"
            local zip_submit="${dmg_release%.dmg}-notary.zip"
            local dmg_tmp_dir
            local created_dmg

            ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_submit"
            APP_SUBMIT_JSON="$(xcrun notarytool submit "$zip_submit" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)"
            APP_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$APP_SUBMIT_JSON")"
            APP_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$APP_SUBMIT_JSON")"
            if [ "$APP_STATUS" != "Accepted" ]; then
              echo "App notarization failed for $app_path with status: $APP_STATUS" >&2
              xcrun notarytool log "$APP_SUBMIT_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi
            xcrun stapler staple "$app_path"
            xcrun stapler validate "$app_path"
            spctl -a -vv --type execute "$app_path"
            ./scripts/smoke-launch-macos-app.sh "$app_path"
            ./scripts/verify-app-bundle-channel-metadata.sh "$app_path" rc
            rm -f "$zip_submit"

            dmg_tmp_dir="$(mktemp -d)"
            create-dmg \
              --identity="$APPLE_SIGNING_IDENTITY" \
              "$app_path" \
              "$dmg_tmp_dir"
            created_dmg="$(find "$dmg_tmp_dir" -maxdepth 1 -name '*.dmg' | head -n 1)"
            if [ -z "$created_dmg" ]; then
              echo "Failed to locate created DMG for $app_path" >&2
              exit 1
            fi
            mv "$created_dmg" "$dmg_release"
            rm -rf "$dmg_tmp_dir"

            DMG_SUBMIT_JSON="$(xcrun notarytool submit "$dmg_release" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)"
            DMG_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$DMG_SUBMIT_JSON")"
            DMG_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$DMG_SUBMIT_JSON")"
            if [ "$DMG_STATUS" != "Accepted" ]; then
              echo "DMG notarization failed for $dmg_release with status: $DMG_STATUS" >&2
              xcrun notarytool log "$DMG_SUBMIT_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi
            xcrun stapler staple "$dmg_release"
            xcrun stapler validate "$dmg_release"
            cp "$dmg_release" "$dmg_immutable"
          }

          notarize_and_package \
            "build-universal/Build/Products/Release/cmux RC.app" \
            "cmux-rc-macos.dmg" \
            "$RC_DMG_IMMUTABLE"

      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: manaflow
          SENTRY_PROJECT: cmuxterm-macos
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set, skipping dSYM upload"
            exit 0
          fi
          brew install getsentry/tools/sentry-cli || true
          sentry-cli debug-files upload --include-sources \
            build-universal/Build/Products/Release/

      - name: Generate Sparkle appcast (rc)
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Missing SPARKLE_PRIVATE_KEY secret" >&2
            exit 1
          fi
          ./scripts/sparkle_generate_appcast.sh "$RC_DMG_IMMUTABLE" rc appcast.xml

      - name: Attest remote daemon RC assets
        id: attest-remote-daemon-rc-assets
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            remote-daemon-assets/cmuxd-remote-darwin-arm64-${{ env.RC_BUILD }}
            remote-daemon-assets/cmuxd-remote-darwin-amd64-${{ env.RC_BUILD }}
            remote-daemon-assets/cmuxd-remote-linux-arm64-${{ env.RC_BUILD }}
            remote-daemon-assets/cmuxd-remote-linux-amd64-${{ env.RC_BUILD }}
            remote-daemon-assets/cmuxd-remote-checksums-${{ env.RC_BUILD }}.txt
            remote-daemon-assets/cmuxd-remote-manifest-${{ env.RC_BUILD }}.json

      - name: Retry remote daemon RC asset attestation
        if: steps.attest-remote-daemon-rc-assets.outcome == 'failure'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            remote-daemon-assets/cmuxd-remote-darwin-arm64-${{ env.RC_BUILD }}
            remote-daemon-assets/cmuxd-remote-darwin-amd64-${{ env.RC_BUILD }}
            remote-daemon-assets/cmuxd-remote-linux-arm64-${{ env.RC_BUILD }}
            remote-daemon-assets/cmuxd-remote-linux-amd64-${{ env.RC_BUILD }}
            remote-daemon-assets/cmuxd-remote-checksums-${{ env.RC_BUILD }}.txt
            remote-daemon-assets/cmuxd-remote-manifest-${{ env.RC_BUILD }}.json

      - name: Publish RC release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: rc
          target_commitish: ${{ steps.inputs.outputs.candidate_sha }}
          name: Release Candidate
          prerelease: true
          make_latest: false
          body: |
            Release-candidate build for `${{ steps.inputs.outputs.short_sha }}` (version `${{ steps.inputs.outputs.version }}`).

            **cmux RC** is published as a universal app:
            - bundle ID `com.cmuxterm.app.rc`
            - feed `https://files.cmux.com/rc/appcast.xml`

            [Download cmux-rc-macos.dmg](https://github.com/manaflow-ai/cmux/releases/download/rc/cmux-rc-macos.dmg)
          files: |
            cmux-rc-macos-${{ github.run_id }}*.dmg
            cmux-rc-macos.dmg
            appcast.xml
            remote-daemon-assets/cmuxd-remote-*
          overwrite_files: true

      - name: Upload RC appcast to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: "https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          set -euo pipefail
          command -v aws >/dev/null 2>&1 || { echo "Installing AWS CLI..."; brew install awscli; }

          # Upload after GitHub Release publish so the appcast never references
          # a DMG that doesn't exist yet. R2 PutObject is atomic, so the appcast
          # is either the old version or the new one, never missing.
          aws s3 cp appcast.xml \
            "s3://cmux-binaries/rc/appcast.xml" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache, no-store, must-revalidate"

          echo "R2 appcast upload complete: https://files.cmux.com/rc/appcast.xml"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          rm -f /tmp/cert.p12
