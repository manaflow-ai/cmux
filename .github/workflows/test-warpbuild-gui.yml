name: Test WarpBuild GUI Activation

on:
  push:
    branches:
      - task-migrate-warpcloud-consolidated
    paths:
      - '.github/workflows/test-warpbuild-gui.yml'
  workflow_dispatch:

jobs:
  gui-probe:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create virtual display
        run: |
          set -euo pipefail
          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          /tmp/create-virtual-display &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"
          sleep 3

      - name: Build activation probe
        run: |
          set -euo pipefail
          cat > /tmp/activation_probe.swift << 'SWIFT'
          import AppKit
          import Foundation

          func checkActivation(label: String) {
              let ws = NSWorkspace.shared

              // Launch TextEdit
              let proc = Process()
              proc.executableURL = URL(fileURLWithPath: "/usr/bin/open")
              proc.arguments = ["-a", "TextEdit"]
              try! proc.run()
              proc.waitUntilExit()
              Thread.sleep(forTimeInterval: 3)

              var textEdit: NSRunningApplication?
              for app in ws.runningApplications {
                  if app.localizedName == "TextEdit" {
                      textEdit = app
                      break
                  }
              }

              guard let te = textEdit else {
                  print("[\(label)] ERROR: TextEdit not found")
                  return
              }

              let activateResult = te.activate(options: .activateIgnoringOtherApps)
              Thread.sleep(forTimeInterval: 2)

              let front = ws.frontmostApplication
              print("[\(label)] activate()=\(activateResult) isActive=\(te.isActive) frontmost=\(front?.localizedName ?? "nil")")

              // Quartz session
              if let session = CGSessionCopyCurrentDictionary() as? [String: Any] {
                  let locked = session["CGSSessionScreenIsLocked"] as? Int ?? -1
                  print("[\(label)] CGSSessionScreenIsLocked=\(locked)")
              }

              te.terminate()
              Thread.sleep(forTimeInterval: 1)
          }

          // Run check with a label from argv
          let label = CommandLine.arguments.count > 1 ? CommandLine.arguments[1] : "check"
          checkActivation(label: label)
          SWIFT

          swiftc -o /tmp/activation_probe /tmp/activation_probe.swift \
            -framework AppKit -framework CoreGraphics

      - name: "Baseline: activation before any fixes"
        run: /tmp/activation_probe "baseline"

      - name: "Fix 1: defaults write to disable screen lock"
        run: |
          set -euo pipefail
          echo "=== Disabling screen lock via defaults ==="

          # Disable screensaver password requirement
          defaults write com.apple.screensaver askForPassword -int 0
          defaults write com.apple.screensaver askForPasswordDelay -int 0
          defaults -currentHost write com.apple.screensaver askForPassword -int 0

          # Disable screen saver entirely
          defaults -currentHost write com.apple.screensaver idleTime -int 0

          # Try to disable login window screen lock
          sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUserScreenLocked -bool false 2>&1 || echo "(failed)"

          # Disable display sleep
          sudo pmset -a displaysleep 0 sleep 0 2>&1 || echo "(failed)"

          echo "=== Verify settings ==="
          defaults read com.apple.screensaver 2>&1 || true
          sudo defaults read /Library/Preferences/com.apple.loginwindow autoLoginUserScreenLocked 2>&1 || true

      - name: "Check after Fix 1"
        run: /tmp/activation_probe "after-defaults"

      - name: "Fix 2: automationmodetool"
        run: |
          set -euo pipefail
          echo "=== automationmodetool ==="
          which automationmodetool 2>&1 || echo "(not found)"
          automationmodetool enable-automationmode-without-authentication 2>&1 || echo "(automationmodetool failed)"
          automationmodetool 2>&1 || echo "(status check failed)"

      - name: "Check after Fix 2"
        run: /tmp/activation_probe "after-automationmode"

      - name: "Fix 3: CGSession unlock via loginwindow notification"
        run: |
          set -euo pipefail

          # Compile an ObjC tool that tries to unlock the screen
          cat > /tmp/unlock_screen.m << 'OBJC'
          #import <Foundation/Foundation.h>
          #import <CoreGraphics/CoreGraphics.h>
          #import <objc/runtime.h>
          #import <dlfcn.h>

          // Try multiple approaches to unlock the screen

          // Approach A: Send unlock notification to loginwindow
          void tryNotification(void) {
              NSLog(@"Approach A: DistributedNotification to loginwindow");
              [[NSDistributedNotificationCenter defaultCenter]
                  postNotificationName:@"com.apple.screenIsUnlocked"
                  object:nil
                  userInfo:nil
                  deliverImmediately:YES];

              // Also try the CGSession unlock path
              [[NSDistributedNotificationCenter defaultCenter]
                  postNotificationName:@"com.apple.sessionDidUnlock"
                  object:nil
                  userInfo:nil
                  deliverImmediately:YES];
          }

          // Approach B: Use CGSSessionSetScreenLocked private API
          void tryPrivateAPI(void) {
              NSLog(@"Approach B: CGSSessionSetScreenLocked private API");
              typedef int CGSConnectionID;
              typedef CGSConnectionID (*CGSMainConnectionIDFunc)(void);
              typedef CGError (*CGSSessionSetScreenLockedFunc)(CGSConnectionID, bool);

              void *handle = dlopen("/System/Library/Frameworks/CoreGraphics.framework/CoreGraphics", RTLD_LAZY);
              if (!handle) {
                  NSLog(@"Failed to load CoreGraphics");
                  return;
              }

              CGSMainConnectionIDFunc mainConn = (CGSMainConnectionIDFunc)dlsym(handle, "CGSMainConnectionID");
              CGSSessionSetScreenLockedFunc setLocked = (CGSSessionSetScreenLockedFunc)dlsym(handle, "CGSSessionSetScreenLocked");

              if (!mainConn || !setLocked) {
                  NSLog(@"Private API symbols not found (mainConn=%p, setLocked=%p)", mainConn, setLocked);
                  dlclose(handle);
                  return;
              }

              CGSConnectionID conn = mainConn();
              NSLog(@"CGS connection ID: %d", conn);
              CGError err = setLocked(conn, false);
              NSLog(@"CGSSessionSetScreenLocked(false) returned: %d", err);
              dlclose(handle);
          }

          // Approach C: Dismiss loginwindow via AppleScript System Events
          void trySystemEvents(void) {
              NSLog(@"Approach C: System Events keystroke to dismiss lock screen");
              NSTask *task = [[NSTask alloc] init];
              task.executableURL = [NSURL fileURLWithPath:@"/usr/bin/osascript"];
              task.arguments = @[
                  @"-e", @"tell application \"System Events\" to keystroke return"
              ];
              NSPipe *pipe = [NSPipe pipe];
              task.standardOutput = pipe;
              task.standardError = pipe;
              [task launch];
              [task waitUntilExit];
              NSData *data = [[pipe fileHandleForReading] readDataToEndOfFile];
              NSString *output = [[NSString alloc] initWithData:data encoding:NSUTF8StringEncoding];
              NSLog(@"osascript exit=%d output=%@", task.terminationStatus, output);
          }

          // Approach D: Use CGSSessionSetScreenLocked with _CGSDefaultConnection
          void tryDefaultConnection(void) {
              NSLog(@"Approach D: _CGSDefaultConnection + CGSSessionSetScreenLocked");
              void *handle = dlopen("/System/Library/Frameworks/CoreGraphics.framework/CoreGraphics", RTLD_LAZY);
              if (!handle) return;

              typedef int (*DefaultConnectionFunc)(void);
              typedef CGError (*SetLockedFunc)(int, bool);

              DefaultConnectionFunc defConn = (DefaultConnectionFunc)dlsym(handle, "_CGSDefaultConnection");
              SetLockedFunc setLocked = (SetLockedFunc)dlsym(handle, "CGSSessionSetScreenLocked");

              if (!defConn || !setLocked) {
                  NSLog(@"Symbols not found (defConn=%p, setLocked=%p)", defConn, setLocked);
                  dlclose(handle);
                  return;
              }

              int conn = defConn();
              NSLog(@"_CGSDefaultConnection: %d", conn);
              CGError err = setLocked(conn, false);
              NSLog(@"CGSSessionSetScreenLocked(false) returned: %d", err);
              dlclose(handle);
          }

          int main(int argc, const char *argv[]) {
              @autoreleasepool {
                  // Check current state
                  NSDictionary *session = CFBridgingRelease(CGSessionCopyCurrentDictionary());
                  NSLog(@"BEFORE: CGSSessionScreenIsLocked=%@", session[@"CGSSessionScreenIsLocked"]);

                  tryNotification();
                  [NSThread sleepForTimeInterval:1];
                  tryPrivateAPI();
                  [NSThread sleepForTimeInterval:1];
                  tryDefaultConnection();
                  [NSThread sleepForTimeInterval:1];
                  trySystemEvents();
                  [NSThread sleepForTimeInterval:2];

                  session = CFBridgingRelease(CGSessionCopyCurrentDictionary());
                  NSLog(@"AFTER: CGSSessionScreenIsLocked=%@", session[@"CGSSessionScreenIsLocked"]);
              }
              return 0;
          }
          OBJC

          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/unlock_screen /tmp/unlock_screen.m
          /tmp/unlock_screen 2>&1

      - name: "Check after Fix 3"
        run: /tmp/activation_probe "after-unlock-attempts"

      - name: "Fix 4: sysadminctl + security unlock-keychain"
        run: |
          set -euo pipefail

          echo "=== Try sysadminctl ==="
          # The runner user likely has no password or a known one
          sudo sysadminctl -screenLock off 2>&1 || echo "(sysadminctl failed)"

          echo ""
          echo "=== Try security unlock-keychain ==="
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db 2>&1 || echo "(unlock empty pw failed)"
          security unlock-keychain -p "runner" ~/Library/Keychains/login.keychain-db 2>&1 || echo "(unlock 'runner' pw failed)"

          echo ""
          echo "=== Try killall loginwindow (forces re-login) ==="
          # This is aggressive but might force a fresh login without lock
          echo "Skipping killall loginwindow (too risky, may kill session)"

          echo ""
          echo "=== Try caffeinate to prevent sleep ==="
          caffeinate -u -t 5 &
          sleep 2

      - name: "Check after Fix 4"
        run: /tmp/activation_probe "after-sysadminctl"

      - name: "Fix 5: Use Quartz Event to simulate user activity"
        run: |
          set -euo pipefail
          cat > /tmp/simulate_activity.swift << 'SWIFT'
          import CoreGraphics
          import Foundation

          // Simulate mouse move to wake display / dismiss lock
          print("Simulating mouse activity...")
          let point = CGPoint(x: 100, y: 100)
          if let event = CGEvent(mouseEventSource: nil, mouseType: .mouseMoved, mouseCursorPosition: point, mouseButton: .left) {
              event.post(tap: .cghidEventTap)
              print("Posted mouse move event")
          } else {
              print("Failed to create mouse event")
          }

          // Simulate keypress (Return key to dismiss lock screen)
          Thread.sleep(forTimeInterval: 1)
          print("Simulating Return keypress...")
          if let keyDown = CGEvent(keyboardEventSource: nil, virtualKey: 0x24, keyDown: true),
             let keyUp = CGEvent(keyboardEventSource: nil, virtualKey: 0x24, keyDown: false) {
              keyDown.post(tap: .cghidEventTap)
              Thread.sleep(forTimeInterval: 0.1)
              keyUp.post(tap: .cghidEventTap)
              print("Posted Return key event")
          } else {
              print("Failed to create keyboard event")
          }

          Thread.sleep(forTimeInterval: 3)

          // Check if screen is still locked
          if let session = CGSessionCopyCurrentDictionary() as? [String: Any] {
              let locked = session["CGSSessionScreenIsLocked"] as? Int ?? -1
              print("CGSSessionScreenIsLocked after activity: \(locked)")
          }
          SWIFT

          swiftc -o /tmp/simulate_activity /tmp/simulate_activity.swift -framework CoreGraphics
          /tmp/simulate_activity

      - name: "Check after Fix 5"
        run: /tmp/activation_probe "after-simulate-activity"

      - name: Summary
        if: always()
        run: |
          echo "================================================================"
          echo "WarpBuild GUI Activation Experiments v3"
          echo ""
          echo "Tested 5 approaches to unlock screen / enable activation:"
          echo "1. defaults write (screensaver, loginwindow, pmset)"
          echo "2. automationmodetool enable-automationmode-without-authentication"
          echo "3. CGSSessionSetScreenLocked private API + System Events"
          echo "4. sysadminctl -screenLock off + keychain unlock"
          echo "5. CGEvent simulation (mouse move + Return key)"
          echo "================================================================"
