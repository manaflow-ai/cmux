name: Test WarpBuild GUI Activation

on:
  push:
    branches:
      - task-migrate-warpcloud-consolidated
    paths:
      - '.github/workflows/test-warpbuild-gui.yml'
  workflow_dispatch:

jobs:
  gui-probe:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: System info
        run: |
          set -euo pipefail
          echo "=== loginwindow config ==="
          defaults read /Library/Preferences/com.apple.loginwindow 2>&1 || echo "(failed)"

          echo ""
          echo "=== WindowServer / loginwindow ==="
          pgrep -lf WindowServer || echo "WindowServer not running"
          pgrep -lf loginwindow || echo "loginwindow not running"

          echo ""
          echo "=== Console user ==="
          stat -f '%Su' /dev/console 2>/dev/null || echo "(failed)"

          echo ""
          echo "=== GUI session ==="
          launchctl print gui/$(id -u) 2>&1 | head -5 || echo "(failed)"

          echo ""
          echo "=== Hardware ==="
          sysctl machdep.cpu.brand_string hw.model 2>/dev/null || true
          system_profiler SPHardwareDataType 2>/dev/null | grep -E 'Model|Chip|Memory' || true

          echo ""
          echo "=== system_profiler displays (before virtual display) ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(no display info)"

      - name: Create virtual display
        run: |
          set -euo pipefail
          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          /tmp/create-virtual-display &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"
          sleep 3

          echo "=== system_profiler displays (after virtual display) ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(no display info)"

      - name: Build activation probe (Swift)
        run: |
          set -euo pipefail
          cat > /tmp/activation_probe.swift << 'SWIFT'
          import AppKit
          import Foundation

          func probe() {
              let ws = NSWorkspace.shared

              // Check current state
              if let front = ws.frontmostApplication {
                  print("BEFORE: frontmost=\(front.localizedName ?? "nil") pid=\(front.processIdentifier) active=\(front.isActive)")
              } else {
                  print("BEFORE: no frontmost application")
              }

              // Launch TextEdit
              print("\n=== Launching TextEdit via open -a ===")
              let proc = Process()
              proc.executableURL = URL(fileURLWithPath: "/usr/bin/open")
              proc.arguments = ["-a", "TextEdit"]
              try! proc.run()
              proc.waitUntilExit()
              Thread.sleep(forTimeInterval: 3)

              // Find TextEdit in running apps
              var textEdit: NSRunningApplication?
              for app in ws.runningApplications {
                  if app.localizedName == "TextEdit" {
                      textEdit = app
                      break
                  }
              }

              guard let te = textEdit else {
                  print("ERROR: TextEdit not found in running applications")
                  return
              }

              print("TextEdit: pid=\(te.processIdentifier) active=\(te.isActive) hidden=\(te.isHidden) terminated=\(te.isTerminated)")
              print("TextEdit activation policy: \(te.activationPolicy.rawValue) (0=regular, 1=accessory, 2=prohibited)")

              if let front = ws.frontmostApplication {
                  print("Frontmost: \(front.localizedName ?? "nil") pid=\(front.processIdentifier)")
              }

              // Try activateWithOptions
              print("\n=== Calling activateWithOptions_(NSApplication.ActivationOptions.activateIgnoringOtherApps) ===")
              let activateResult = te.activate(options: .activateIgnoringOtherApps)
              print("activateWithOptions returned: \(activateResult)")
              Thread.sleep(forTimeInterval: 2)

              print("TextEdit after activate: active=\(te.isActive) hidden=\(te.isHidden)")
              if let front = ws.frontmostApplication {
                  print("Frontmost after activate: \(front.localizedName ?? "nil") pid=\(front.processIdentifier) active=\(front.isActive)")
              }

              // Try osascript
              print("\n=== Trying osascript activation ===")
              let osa = Process()
              osa.executableURL = URL(fileURLWithPath: "/usr/bin/osascript")
              osa.arguments = ["-e", "tell application \"TextEdit\" to activate"]
              let pipe = Pipe()
              osa.standardOutput = pipe
              osa.standardError = pipe
              try! osa.run()
              osa.waitUntilExit()
              let osaOutput = String(data: pipe.fileHandleForReading.readDataToEndOfFile(), encoding: .utf8) ?? ""
              print("osascript exit=\(osa.terminationStatus) output=\(osaOutput)")
              Thread.sleep(forTimeInterval: 2)

              print("TextEdit after osascript: active=\(te.isActive) hidden=\(te.isHidden)")
              if let front = ws.frontmostApplication {
                  print("Frontmost after osascript: \(front.localizedName ?? "nil") pid=\(front.processIdentifier) active=\(front.isActive)")
              }

              // Check Quartz session
              print("\n=== Quartz session ===")
              if let session = CGSessionCopyCurrentDictionary() as? [String: Any] {
                  for (key, value) in session.sorted(by: { $0.key < $1.key }) {
                      print("  \(key): \(value)")
                  }
              } else {
                  print("No Quartz session dictionary")
              }

              // Check display info
              print("\n=== Display info ===")
              var displayCount: UInt32 = 0
              CGGetActiveDisplayList(0, nil, &displayCount)
              print("Active display count: \(displayCount)")
              if displayCount > 0 {
                  var displays = [CGDirectDisplayID](repeating: 0, count: Int(displayCount))
                  CGGetActiveDisplayList(displayCount, &displays, nil)
                  for d in displays {
                      let bounds = CGDisplayBounds(d)
                      print("  Display \(d): \(Int(bounds.width))x\(Int(bounds.height))")
                  }
              }
              let mainDisplay = CGMainDisplayID()
              print("Main display ID: \(mainDisplay)")

              // Check AX trust
              print("\n=== Accessibility ===")
              let trusted = AXIsProcessTrusted()
              print("Current process AX trusted: \(trusted)")

              // Clean up
              te.terminate()

              print("\n=== VERDICT ===")
              // The key question: can NSRunningApplication.activate() make an app foreground?
              // XCUIApplication.activate() depends on this + AX APIs.
              print("activate() returned: \(activateResult)")
              print("App became active: \(te.isActive)")
              if activateResult && te.isActive {
                  print("RESULT: GUI activation WORKS on this VM")
              } else {
                  print("RESULT: GUI activation DOES NOT WORK on this VM")
                  print("XCUITest will fail with 'Running Background' timeout")
              }
          }

          probe()
          SWIFT

          swiftc -o /tmp/activation_probe /tmp/activation_probe.swift \
            -framework AppKit -framework CoreGraphics

      - name: Run activation probe
        run: |
          set -euo pipefail
          echo "Running activation probe..."
          /tmp/activation_probe

      - name: Test actual XCUITest activation
        run: |
          set -euo pipefail

          # Create a minimal Xcode project to test XCUIApplication.activate()
          mkdir -p /tmp/ActivationTest
          cat > /tmp/ActivationTest/Package.swift << 'PKG'
          // swift-tools-version:5.9
          import PackageDescription
          let package = Package(name: "ActivationTest")
          PKG

          cat > /tmp/test_xcui.swift << 'SWIFT'
          import XCTest

          final class ActivationTest: XCTestCase {
              func testActivateTextEdit() {
                  let app = XCUIApplication(bundleIdentifier: "com.apple.TextEdit")
                  print("PRE-ACTIVATE: state=\(app.state.rawValue)")

                  let start = Date()
                  app.activate()
                  let activateTime = Date().timeIntervalSince(start)
                  print("POST-ACTIVATE: state=\(app.state.rawValue) elapsed=\(String(format: "%.1f", activateTime))s")

                  let foreground = app.wait(for: .runningForeground, timeout: 15)
                  let totalTime = Date().timeIntervalSince(start)
                  print("WAIT-RESULT: foreground=\(foreground) state=\(app.state.rawValue) elapsed=\(String(format: "%.1f", totalTime))s")

                  if foreground {
                      print("SUCCESS: XCUIApplication activation works on WarpBuild!")
                  } else {
                      print("FAILURE: XCUIApplication stuck in state \(app.state.rawValue) after \(String(format: "%.1f", totalTime))s")
                  }

                  // Don't assert - we want to see the output either way
                  app.terminate()
              }
          }
          SWIFT

          # We can't easily run a standalone XCUITest without a full Xcode project,
          # but we can use xctest directly with the right framework path
          echo "Note: XCUITest requires xcodebuild with a test target."
          echo "The Swift activation probe above tests the same underlying APIs."
          echo "If activate() returns true and isActive becomes true, XCUITest should work."

      - name: Check TCC and DevTools
        run: |
          set -euo pipefail
          echo "=== DevToolsSecurity ==="
          DevToolsSecurity -status 2>&1 || echo "(failed)"

          echo ""
          echo "=== System TCC (Accessibility + DeveloperTool) ==="
          sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "SELECT client, service, auth_value FROM access WHERE service IN ('kTCCServiceAccessibility', 'kTCCServiceDeveloperTool');" 2>&1 \
            || echo "(permission denied)"

          echo ""
          echo "=== User TCC ==="
          sqlite3 "$HOME/Library/Application Support/com.apple.TCC/TCC.db" \
            "SELECT client, service, auth_value FROM access WHERE service IN ('kTCCServiceAccessibility', 'kTCCServiceDeveloperTool');" 2>&1 \
            || echo "(permission denied or no DB)"

      - name: Summary
        if: always()
        run: |
          echo "================================================================"
          echo "WarpBuild GUI Activation Diagnostic v2"
          echo ""
          echo "Key questions answered:"
          echo "1. Does CGVirtualDisplay create a usable display?"
          echo "2. Can NSRunningApplication.activate() foreground an app?"
          echo "3. Does osascript activation work?"
          echo "4. Is the process AX-trusted?"
          echo "5. What does the Quartz session look like?"
          echo ""
          echo "If activate() works, XCUITest should work on WarpBuild."
          echo "================================================================"
