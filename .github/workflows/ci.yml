name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-guard-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Validate macOS runner guards
        run: ./tests/test_ci_self_hosted_guard.sh

      - name: Validate release SDK build lane
        run: ./tests/test_ci_release_sdk_lane.sh

      - name: Validate Python test harness syntax
        run: git ls-files 'tests/*.py' 'tests_v2/*.py' 'scripts/*.py' | xargs python3 -m py_compile

      - name: Validate create-dmg version pinning
        run: ./tests/test_ci_create_dmg_pinned.sh

      - name: Validate setup-bun version pinning
        run: ./tests/test_ci_setup_bun_pinned.sh

      - name: Validate tagged reload port isolation
        run: ./tests/test_reload_tagged_port.sh

      - name: Validate Ghostty helper zig environment
        run: ./tests/test_build_ghostty_cli_helper_env.sh

      - name: Validate unit-test SwiftPM retry guard
        run: ./tests/test_ci_unit_test_spm_retry.sh

      - name: Validate xcodebuild noninteractive crash prompt guard
        run: python3 tests/test_ci_xcodebuild_noninteractive_helper.py

      - name: Validate cmux scheme test configuration
        run: ./tests/test_ci_scheme_testaction_debug.sh

      - name: Validate GhosttyKit checksum verification
        run: ./tests/test_ci_ghosttykit_checksum_verification.sh

      - name: Validate nightly tag push auth
        run: ./tests/test_ci_nightly_tag_push_auth.sh

      - name: Validate release asset guard
        run: node scripts/release_asset_guard.test.js

      - name: Validate current GhosttyKit checksum pin
        run: ./tests/test_ci_ghosttykit_checksum_present.sh

      - name: Validate Swift warning budget guard
        run: ./tests/test_ci_swift_warning_budget.sh

      - name: Validate Swift file length budget guard
        run: ./tests/test_ci_swift_file_length_budget.sh

      - name: Validate auxiliary window close shortcut lint
        run: ./tests/test_ci_auxiliary_window_close_shortcuts.sh

      - name: Validate pbxproj test-wiring lint
        run: ./tests/test_ci_pbxproj_test_wiring.sh

      - name: Validate pbxproj objectVersion pin and normalization
        run: ./scripts/check-pbxproj.sh

      - name: Validate bash shell integration job control
        run: python3 tests/test_bash_integration_no_done_notifications.py

      - name: Validate bash disabled git-watch PR clearing
        run: python3 tests/test_bash_disabled_git_watch_clears_pr.py

      - name: Validate bash prompt bootstrap composes with user PROMPT_COMMAND (starship)
        run: python3 tests/test_issue_5164_starship_prompt_composition.py

      - name: Validate Swift file length budget
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          ALLOW_SWIFT_BUDGET_INCREASES: ${{ contains(github.event.pull_request.labels.*.name, 'swift-budget-maintenance') && '1' || '' }}
        run: |
          set -euo pipefail
          baseline_ref=""
          if [ -n "$PR_BASE_SHA" ]; then
            git fetch --no-tags --depth=1 origin "$PR_BASE_SHA"
            baseline_ref="$PR_BASE_SHA"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            baseline_ref="HEAD^"
          fi

          args=(--budget .github/swift-file-length-budget.tsv)
          if [ -n "$baseline_ref" ]; then
            args+=(--baseline-ref "$baseline_ref")
            if [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ] && [ "${ALLOW_SWIFT_BUDGET_INCREASES:-}" != "1" ]; then
              args+=(--reject-budget-increases-from "$baseline_ref")
            elif [ "${ALLOW_SWIFT_BUDGET_INCREASES:-}" = "1" ]; then
              echo "Swift file length budget increases allowed by swift-budget-maintenance label"
            fi
          fi
          python3 scripts/swift_file_length_budget.py "${args[@]}"

  remote-daemon-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: daemon/remote/go.mod
          cache-dependency-path: daemon/remote/go.sum

      - name: Run remote daemon tests
        working-directory: daemon/remote
        run: go test ./...

      - name: Validate remote daemon release assets
        run: ./tests/test_remote_daemon_release_assets.sh

  web-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        run: ../scripts/ci/setup-bun-with-retry.sh 1.3.13

      - name: Install dependencies
        run: ../scripts/ci/bun-install-frozen.sh

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Web tests
        run: bun test

  # Checks for in-app React webviews (currently the diff viewer; more cmux React
  # surfaces will live alongside it).
  react-apps-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        run: ./scripts/ci/setup-bun-with-retry.sh 1.3.13

      - name: Verify generated webviews assets
        run: ./scripts/build-webviews-app.sh --check

      - name: Verify React Compiler for webviews
        run: ./scripts/check-webviews-react-compiler.mjs

      - name: Typecheck webviews
        working-directory: webviews
        run: bun run typecheck

      - name: Test webviews
        working-directory: webviews
        run: bun run test

      - name: Oxlint webviews
        working-directory: webviews
        run: bun run lint:ci

      - name: React Doctor
        working-directory: webviews
        run: bun run react-doctor:ci

  web-db-migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start Postgres
        run: |
          set -euo pipefail
          container="cmux-postgres-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          echo "CMUX_CI_POSTGRES_CONTAINER=$container" >> "$GITHUB_ENV"
          for attempt in 1 2 3; do
            docker rm -f "$container" >/dev/null 2>&1 || true
            if docker run -d \
              --name "$container" \
              -e POSTGRES_DB=cmux_test \
              -e POSTGRES_PASSWORD=cmux \
              -e POSTGRES_USER=cmux \
              -p 127.0.0.1:5432:5432 \
              postgres:16-alpine; then
              for _ in $(seq 1 60); do
                if docker exec "$container" pg_isready -U cmux -d cmux_test >/dev/null 2>&1; then
                  echo "Postgres is ready"
                  exit 0
                fi
                if ! docker inspect -f '{{.State.Running}}' "$container" 2>/dev/null | grep -q true; then
                  echo "Postgres container exited before readiness"
                  docker logs "$container" || true
                  break
                fi
                sleep 1
              done
              echo "Postgres did not become ready on attempt $attempt"
              docker logs "$container" || true
            else
              echo "Postgres docker run failed on attempt $attempt"
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Setup Bun
        run: ../scripts/ci/setup-bun-with-retry.sh 1.3.13

      - name: Install dependencies
        run: ../scripts/ci/bun-install-frozen.sh

      - name: Apply migrations
        env:
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: bunx drizzle-kit migrate --config drizzle.config.ts

      - name: Re-apply migrations
        env:
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: bunx drizzle-kit migrate --config drizzle.config.ts

      - name: Database behavior tests
        env:
          CMUX_DB_TEST: "1"
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: bun run test:db:behavior

      - name: Stop Postgres
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${CMUX_CI_POSTGRES_CONTAINER:-}" ]; then
            docker rm -f "$CMUX_CI_POSTGRES_CONTAINER" >/dev/null 2>&1 || true
          fi

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3]
        shard_count: [4]
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    timeout-minutes: 75
    env:
      CMUX_SKIP_ZIG_BUILD: "1"
      SWIFT_BACKTRACE: "interactive=no,timeout=0s,symbolicate=off,color=no"
    steps:
      - name: Prepare self-hosted workspace
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            sudo -n chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          fi
          chmod -R u+rwX "$GITHUB_WORKSPACE" || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(
              find /Applications -maxdepth 1 -name 'Xcode*.app' -print 2>/dev/null \
                | sort \
                | tail -n 1 \
                || true
            )"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Capture Ghostty revision
        id: ghostty-revision
        run: |
          echo "sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute DerivedData cache fingerprint
        id: deriveddata-fingerprint
        run: |
          echo "hash=$(./scripts/ci/deriveddata-cache-fingerprint.sh tests)" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ steps.ghostty-revision.outputs.sha }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache Cargo packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Native/CommandPaletteNucleoFFI/target
          key: cargo-nucleo-${{ runner.os }}-${{ hashFiles('Native/CommandPaletteNucleoFFI/Cargo.lock') }}
          restore-keys: cargo-nucleo-${{ runner.os }}-

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-derived-data/unit-tests
          key: deriveddata-unit-tests-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}
          restore-keys: |
            deriveddata-unit-tests-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}-

      - name: Prune restored Xcode module caches
        run: scripts/ci/prune-deriveddata-module-cache.sh .ci-derived-data/unit-tests

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run unit tests
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/unit-tests"
          run_unit_tests() {
            SOURCE_PACKAGES_DIR="$SOURCE_PACKAGES_DIR" \
              DERIVED_DATA_PATH="$DERIVED_DATA_PATH" \
              CMUX_UNIT_TEST_SHARD_INDEX="${{ matrix.shard_index }}" \
              CMUX_UNIT_TEST_SHARD_COUNT="${{ matrix.shard_count }}" \
              CMUX_CLI_NOTIFY_PROCESS_TIMEOUT_SECONDS=20 \
              scripts/ci/run-cmux-unit-tests-isolated.sh
          }

          set +e
          run_unit_tests | tee /tmp/test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          OUTPUT=$(cat /tmp/test-output.txt)
          set -e

          if [ "$EXIT_CODE" -ne 0 ] && grep -q "Could not resolve package dependencies" <<<"$OUTPUT"; then
            echo "SwiftPM package resolution failed, clearing caches and retrying once"
            rm -rf ~/Library/Caches/org.swift.swiftpm
            mkdir -p ~/Library/Caches/org.swift.swiftpm
            rm -rf "$DERIVED_DATA_PATH"
            set +e
            run_unit_tests | tee /tmp/test-output.txt
            EXIT_CODE=${PIPESTATUS[0]}
            OUTPUT=$(cat /tmp/test-output.txt)
            set -e
          fi

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Unit tests failed"
            exit "$EXIT_CODE"
          fi

          if ! grep -Eq 'All [1-9][0-9]* selected cmuxTests XCTestCase classes and Swift Testing suites passed in shard-.* batches' <<<"$OUTPUT"; then
            echo "Unit test workflow completed without executing any tests" >&2
            exit 1
          fi

      - name: Run bundled Ghostty theme picker helper regression
        if: ${{ matrix.shard_index == 0 }}
        timeout-minutes: 20
        run: |
          set -euo pipefail
          CMUX_SKIP_ZIG_BUILD=0 \
          CMUX_SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages" \
            ./tests/test_bundled_ghostty_theme_picker_helper.sh

      - name: Run Swift package unit tests
        if: ${{ matrix.shard_index == 0 }}
        run: |
          set -euo pipefail
          # The cmux-unit scheme only runs the cmuxTests app-host suite; it does
          # not execute the SPM package test targets. Run them here so package
          # tests (settings stores, secret-file migration, socket-control
          # convergence, etc.) are a real CI gate, not just compiled.
          # Scoped to packages that build headlessly via SwiftPM (no GhosttyKit /
          # app-target dependency). Add a package here once its `swift test`
          # is confirmed to resolve standalone.
          PACKAGES=(
            CMUXAuthCore
            CmuxAuthRuntime
            CmuxControlSocket
            CmuxFileWatch
            CmuxFoundation
            CmuxGit
            CmuxProcess
            CmuxSettings
            CmuxSettingsUI
            CmuxSocketControl
            CMUXAgentLaunch
          )
          for pkg in "${PACKAGES[@]}"; do
            echo "::group::swift test Packages/$pkg"
            output_file="/tmp/cmux-swift-package-${pkg}-test-output.txt"
            swift test --package-path "Packages/$pkg" 2>&1 | tee "$output_file"
            if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' "$output_file"; then
              echo "swift test Packages/$pkg completed without executing any tests" >&2
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Setup Bun
        if: ${{ matrix.shard_index == 0 }}
        run: ./scripts/ci/setup-bun-with-retry.sh 1.3.13

      - name: Run CLI no-socket regressions
        if: ${{ matrix.shard_index == 0 }}
        run: |
          set -euo pipefail

          DERIVED_DATA_PATH="$PWD/.ci-derived-data/unit-tests"
          CLI_BIN="$DERIVED_DATA_PATH/Build/Products/Debug/cmux"
          if [ -z "${CLI_BIN:-}" ] || [ ! -x "$CLI_BIN" ]; then
            echo "cmux CLI binary not found in DerivedData" >&2
            exit 1
          fi

  tests-core:
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    timeout-minutes: 75
    env:
      CMUX_SKIP_ZIG_BUILD: "1"
      # XCTest app-host crashes can leave xcodebuild waiting in Swift's crash
      # backtracer until the job timeout. Keep crash handling non-interactive
      # and cheap so xcodebuild can restart/finish the suite.
      SWIFT_BACKTRACE: "interactive=no,timeout=0s,symbolicate=off,color=no"
    steps:
      - name: Prepare self-hosted workspace
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            sudo -n chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          fi
          chmod -R u+rwX "$GITHUB_WORKSPACE" || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(
              find /Applications -maxdepth 1 -name 'Xcode*.app' -print 2>/dev/null \
                | sort \
                | tail -n 1 \
                || true
            )"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Capture Ghostty revision
        id: ghostty-revision
        run: |
          echo "sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute DerivedData cache fingerprint
        id: deriveddata-fingerprint
        run: |
          echo "hash=$(./scripts/ci/deriveddata-cache-fingerprint.sh tests)" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ steps.ghostty-revision.outputs.sha }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache Cargo packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Native/CommandPaletteNucleoFFI/target
          key: cargo-nucleo-${{ runner.os }}-${{ hashFiles('Native/CommandPaletteNucleoFFI/Cargo.lock') }}
          restore-keys: cargo-nucleo-${{ runner.os }}-

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-derived-data/tests
          key: deriveddata-tests-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}
          restore-keys: |
            deriveddata-tests-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}-

      - name: Prune restored Xcode module caches
        run: scripts/ci/prune-deriveddata-module-cache.sh .ci-derived-data/tests

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run command palette nucleo FFI tests
        run: |
          set -euo pipefail
          CMUX_NUCLEO_FFI_DERIVED_DATA="$PWD/.ci-derived-data/nucleo-ffi" \
          CMUX_NUCLEO_FFI_SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages" \
          ./scripts/test-command-palette-nucleo-ffi.sh

      - name: Run Ghostty split-theme appearance regression
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/tests"
          run_split_theme_tests() {
            # A merged main branch can force this narrow XCTest step to do the
            # full Debug compile before the four regression tests run. Keep it
            # bounded without using the shorter warm-build unit-test budget.
            scripts/ci/xcodebuild_noninteractive.py \
              xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" \
              CMUX_SKIP_ZIG_BUILD=1 \
              -only-testing:cmuxTests/AppearanceSettingsTests/testSplitGhosttyThemeUsesStoredDarkModeWhenAppAppearanceIsStaleLight \
              -only-testing:cmuxTests/AppearanceSettingsTests/testSplitGhosttyThemeUsesStoredLightModeWhenAppAppearanceIsStaleDark \
              -only-testing:cmuxTests/AppearanceSettingsTests/testSplitGhosttyThemeUsesSystemLightWhenAppAppearanceIsStaleDark \
              -only-testing:cmuxTests/AppearanceSettingsTests/testSplitGhosttyThemeUsesSystemDarkWhenAppAppearanceIsStaleLight \
              test 2>&1 &
            local xcodebuild_pid=$!
            local timeout_seconds="${CMUX_SPLIT_THEME_TEST_TIMEOUT_SECONDS:-2700}"
            local deadline=$((SECONDS + timeout_seconds))
            while kill -0 "$xcodebuild_pid" 2>/dev/null; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "xcodebuild split-theme regression timeout after ${timeout_seconds}s; terminating"
                kill -TERM "$xcodebuild_pid" 2>/dev/null || true
                sleep 5
                kill -KILL "$xcodebuild_pid" 2>/dev/null || true
                wait "$xcodebuild_pid" 2>/dev/null || true
                return 124
              fi
              sleep 5
            done
            wait "$xcodebuild_pid"
          }

          split_theme_output="/tmp/split-theme-output.txt"
          set +e
          run_split_theme_tests | tee "$split_theme_output"
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ] &&
             grep -Eq 'Could not resolve host: static\.crates\.io|failed to download from `https://static\.crates\.io|spurious network error.*static\.crates\.io' "$split_theme_output"; then
            echo "Cargo registry download failed during split-theme build, retrying once"
            set +e
            run_split_theme_tests | tee "$split_theme_output"
            EXIT_CODE=${PIPESTATUS[0]}
            set -e
          fi

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "xcodebuild split-theme regression timed out"
            exit 1
          fi

          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

          if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' "$split_theme_output"; then
            echo "Ghostty split-theme appearance regression completed without executing any tests" >&2
            exit 1
          fi

      - name: Run bundled Ghostty theme picker helper regression
        run: |
          set -euo pipefail
          CMUX_SKIP_ZIG_BUILD=0 \
          CMUX_SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages" \
            ./tests/test_bundled_ghostty_theme_picker_helper.sh

      - name: Run Swift package unit tests
        run: |
          set -euo pipefail
          # The cmux-unit scheme only runs the cmuxTests app-host suite; it does
          # not execute the SPM package test targets. Run them here so package
          # tests (settings stores, secret-file migration, socket-control
          # convergence, etc.) are a real CI gate, not just compiled.
          # Scoped to packages that build headlessly via SwiftPM (no GhosttyKit /
          # app-target dependency). Add a package here once its `swift test`
          # is confirmed to resolve standalone.
          PACKAGES=(
            CMUXAgentVault
            CMUXDebugLog
            CMUXPasteboardFidelity
            CMUXProjectModel
            CMUXWorkstream
            CmuxExtensionKit
            CmuxFoundation
            CmuxSettings
            CmuxSettingsUI
            CmuxSidebarInterpreterService
            CmuxSocketControl
            CmuxSwiftRender
            CmuxSwiftRenderUI
            CmuxTerminalCopyMode
            CmuxUpdater
            CmuxUpdaterUI
          )
          for pkg in "${PACKAGES[@]}"; do
            echo "::group::swift test Packages/$pkg"
            output_file="/tmp/cmux-swift-package-${pkg}-test-output.txt"
            swift test --package-path "Packages/$pkg" 2>&1 | tee "$output_file"
            if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' "$output_file"; then
              echo "swift test Packages/$pkg completed without executing any tests" >&2
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Setup Bun
        run: ./scripts/ci/setup-bun-with-retry.sh 1.3.13

      - name: Build and test Agent Session web resources
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run agent-session-web:build
          bun run agent-session-web:test
          git diff --exit-code -- Resources/agent-session-react Resources/agent-session-solid

      - name: Run CLI no-socket regressions
        run: |
          set -euo pipefail

          DERIVED_DATA_PATH="$PWD/.ci-derived-data/tests"
          CLI_BIN="$DERIVED_DATA_PATH/Build/Products/Debug/cmux"
          if [ ! -x "$CLI_BIN" ]; then
            echo "cmux CLI binary not found in DerivedData" >&2
            exit 1
          fi

          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_version_memory_guard.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_contract_help.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_layout_focus_contract.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_socket_operation_deadline.py
          python3 tests/test_stress_cli_socket_api.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_omo_openagent_plugin_migration.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_socket_autodiscovery.py
          python3 tests/test_claude_wrapper_hooks.py
          python3 tests/test_claude_wrapper_user_binary_resolution.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_claude_teams_fallback_path.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_omo_fallback_path.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_omx_fallback_path.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_omc_fallback_path.py
          python3 tests/test_issue_2448_shell_claude_wrapper_dispatch.py
          python3 tests/test_shell_git_branch_stale_cwd.py
          python3 tests/test_shell_git_config_remote_url_parsing.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_claude_hook_stop_last_assistant.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_claude_hook_clear_running_status.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_claude_hook_default_surface_resolution.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_pi_extension_install.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_omp_extension_install.py

  tests:
    needs:
      - tests-core
      - unit-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require macOS test jobs
        run: |
          set -euo pipefail
          if [ "${{ needs.tests-core.result }}" != "success" ]; then
            echo "tests-core finished with ${{ needs.tests-core.result }}" >&2
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "unit-tests finished with ${{ needs.unit-tests.result }}" >&2
            exit 1
          fi
          echo "tests-core and all unit-test shards passed"

  tests-build-and-lag:
    # Build the full cmux scheme and run the lag regression on macOS CI.
    # Keep lag validation separate from UI regressions so functional UI failures
    # and performance regressions stay isolated. Broader interactive UI suites
    # still run via test-e2e.yml on GitHub-hosted runners.
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    # A merged main branch can invalidate the exact DerivedData key and force a
    # full cmux build before the warning, startup, and lag regressions can run.
    # Extension project and package graph changes have also spent more than 35
    # minutes in the build step before the lag regression starts.
    # Keep this budget aligned with the full tests job so a cold build can still
    # finish and populate the next cache.
    timeout-minutes: 75
    steps:
      - name: Prepare self-hosted workspace
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            sudo -n chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          fi
          chmod -R u+rwX "$GITHUB_WORKSPACE" || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(
              find /Applications -maxdepth 1 -name 'Xcode*.app' -print 2>/dev/null \
                | sort \
                | tail -n 1 \
                || true
            )"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Prepare isolated DerivedData
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="$RUNNER_TEMP/cmux-deriveddata-tests-build-and-lag-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$DERIVED_DATA_PATH"
          echo "CMUX_DERIVED_DATA_PATH=$DERIVED_DATA_PATH" >> "$GITHUB_ENV"

      - name: Capture Ghostty revision
        id: ghostty-revision
        run: |
          echo "sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute DerivedData cache fingerprint
        id: deriveddata-fingerprint
        run: |
          echo "hash=$(./scripts/ci/deriveddata-cache-fingerprint.sh app)" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit-lag
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ steps.ghostty-revision.outputs.sha }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit-lag.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache Cargo packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Native/CommandPaletteNucleoFFI/target
          key: cargo-nucleo-${{ runner.os }}-${{ hashFiles('Native/CommandPaletteNucleoFFI/Cargo.lock') }}
          restore-keys: cargo-nucleo-${{ runner.os }}-

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-derived-data/build
          key: deriveddata-build-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}
          restore-keys: |
            deriveddata-build-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}-

      - name: Prune restored Xcode module caches
        run: scripts/ci/prune-deriveddata-module-cache.sh .ci-derived-data/build

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-build-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-build-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          rm -rf "$CMUX_DERIVED_DATA_PATH"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
              -derivedDataPath "$CMUX_DERIVED_DATA_PATH" \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Build app
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/build"
          xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" build 2>&1 | tee /tmp/cmux-build-output.txt

      - name: Validate Swift warning budget
        run: python3 scripts/swift_warning_budget.py --log /tmp/cmux-build-output.txt

      - name: Create virtual display
        run: |
          set -euo pipefail
          clang -framework Foundation -framework CoreGraphics \
            -framework AppKit \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          VDISPLAY_READY="${RUNNER_TEMP:-/tmp}/cmux-build-lag-virtual-display.ready"
          VDISPLAY_ID_PATH="${RUNNER_TEMP:-/tmp}/cmux-build-lag-virtual-display.id"
          VDISPLAY_LOG="${RUNNER_TEMP:-/tmp}/cmux-build-lag-virtual-display.log"
          for attempt in $(seq 1 3); do
            rm -f "$VDISPLAY_READY" "$VDISPLAY_ID_PATH" "$VDISPLAY_LOG"

            /tmp/create-virtual-display \
              --ready-path "$VDISPLAY_READY" \
              --display-id-path "$VDISPLAY_ID_PATH" \
              >"$VDISPLAY_LOG" 2>&1 &
            VDISPLAY_PID=$!
            echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"

            for _ in $(seq 1 900); do
              if [ -s "$VDISPLAY_READY" ] && [ -s "$VDISPLAY_ID_PATH" ]; then
                break 2
              fi
              if ! kill -0 "$VDISPLAY_PID" 2>/dev/null; then
                echo "Virtual display helper exited before readiness on attempt $attempt" >&2
                cat "$VDISPLAY_LOG" >&2 || true
                kill "$VDISPLAY_PID" >/dev/null 2>&1 || true
                if [ "$attempt" -eq 3 ]; then
                  exit 1
                fi
                continue 2
              fi
              sleep 0.1
            done

            if [ ! -s "$VDISPLAY_READY" ] || [ ! -s "$VDISPLAY_ID_PATH" ]; then
              echo "Timed out waiting for virtual display readiness after 90s on attempt $attempt" >&2
              cat "$VDISPLAY_LOG" >&2 || true
              kill "$VDISPLAY_PID" >/dev/null 2>&1 || true
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
            fi
          done
          if [ ! -s "$VDISPLAY_READY" ] || [ ! -s "$VDISPLAY_ID_PATH" ]; then
            echo "Timed out waiting for virtual display readiness after 90s" >&2
            cat "$VDISPLAY_LOG" >&2 || true
            exit 1
          fi
          echo "Virtual display ready: $(tr -d '\n' < "$VDISPLAY_ID_PATH")"
          cat "$VDISPLAY_LOG"

      - name: Run CoreAnimation main-thread startup regression
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/build"
          APP="$DERIVED_DATA_PATH/Build/Products/Debug/cmux DEV.app"
          if [ -z "${APP:-}" ] || [ ! -d "$APP" ]; then
            echo "cmux DEV.app not found in DerivedData" >&2
            exit 1
          fi

          CMUX_ALLOW_UNTAGGED_CA_REGRESSION=1 \
          CMUX_CA_ASSERT_HOLD_SECONDS=15 \
          CMUX_TAG="ci-ca-main-thread" \
          ./scripts/verify-main-thread-ca-transactions.sh "$APP"

      - name: Run workspace churn typing-lag regression
        run: |
          set -euo pipefail

          DERIVED_DATA_PATH="$PWD/.ci-derived-data/build"
          APP="$DERIVED_DATA_PATH/Build/Products/Debug/cmux DEV.app"
          if [ -z "${APP:-}" ] || [ ! -d "$APP" ]; then
            echo "cmux DEV.app not found in DerivedData" >&2
            exit 1
          fi

          TAG="ci-lag"
          SOCK="/tmp/cmux-debug-${TAG}.sock"
          BUNDLE_ID="$(
            /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Contents/Info.plist" 2>/dev/null \
              || echo 'com.cmuxterm.app.debug'
          )"

          pkill -x "cmux DEV" || true
          rm -f "$SOCK" "/tmp/cmux-${TAG}.sock" || true
          defaults write "$BUNDLE_ID" socketControlMode -string full >/dev/null 2>&1 || true

          CMUX_TAG="$TAG" CMUX_SOCKET_PATH="$SOCK" CMUX_UI_TEST_MODE=1 "$APP/Contents/MacOS/cmux DEV" >/tmp/cmux-ci-lag.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" >/dev/null 2>&1 || true' EXIT

          for _ in {1..240}; do
            [ -S "$SOCK" ] && break
            sleep 0.25
          done
          [ -S "$SOCK" ] || { echo "Socket not ready at $SOCK" >&2; exit 1; }

          CMUX_SOCKET_PATH="$SOCK" \
          CMUX_LAG_MAX_P95_RATIO=1.70 \
          CMUX_LAG_MAX_AVG_RATIO=1.70 \
          CMUX_LAG_MIN_BASELINE_P95_MS_FOR_RATIO=6.0 \
          CMUX_LAG_MIN_BASELINE_AVG_MS_FOR_RATIO=4.0 \
          CMUX_LAG_MAX_P95_DELTA_MS=20.0 \
          CMUX_LAG_MAX_AVG_DELTA_MS=12.0 \
          CMUX_LAG_MAX_CHURN_P95_MS=35 \
          CMUX_LAG_KEY_EVENTS=180 \
          python3 tests/test_workspace_churn_up_arrow_lag.py

      - name: Cleanup virtual display
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${VDISPLAY_PID:-}" ]; then
            kill "$VDISPLAY_PID" >/dev/null 2>&1 || true
          fi
          rm -f /tmp/create-virtual-display

