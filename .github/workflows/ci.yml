name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-guard-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate WarpBuild runner guards
        run: ./tests/test_ci_self_hosted_guard.sh

      - name: Validate create-dmg version pinning
        run: ./tests/test_ci_create_dmg_pinned.sh

      - name: Validate unit-test SwiftPM retry guard
        run: ./tests/test_ci_unit_test_spm_retry.sh

      - name: Validate output watchdog fatal crash handling
        run: bash ./tests/test_output_watchdog_runtime.sh

      - name: Validate cmux scheme test configuration
        run: ./tests/test_ci_scheme_testaction_debug.sh

      - name: Validate GhosttyKit checksum verification
        run: ./tests/test_ci_ghosttykit_checksum_verification.sh

      - name: Validate release asset guard
        run: node scripts/release_asset_guard.test.js

      - name: Validate current GhosttyKit checksum pin
        run: ./tests/test_ci_ghosttykit_checksum_present.sh

      - name: Validate Swift warning budget guard
        run: ./tests/test_ci_swift_warning_budget.sh

      - name: Validate Swift file length budget guard
        run: ./tests/test_ci_swift_file_length_budget.sh

      - name: Validate auxiliary window close shortcut lint
        run: ./tests/test_ci_auxiliary_window_close_shortcuts.sh

      # Paused: stale-base merge races (two PRs each fitting the budget can
      # overshoot when merged back-to-back without rebasing). CodeRabbit and
      # Greptile already flag large-file growth on PRs. Re-enable by uncommenting
      # this step (and refresh the budget tsv first):
      #   python3 scripts/swift_file_length_budget.py \
      #     --budget .github/swift-file-length-budget.tsv --write-budget
      # - name: Validate Swift file length budget
      #   run: python3 scripts/swift_file_length_budget.py --budget .github/swift-file-length-budget.tsv

  remote-daemon-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: daemon/remote/go.mod
          cache-dependency-path: daemon/remote/go.sum

      - name: Run remote daemon tests
        working-directory: daemon/remote
        run: go test ./...

      - name: Validate remote daemon release assets
        run: ./tests/test_remote_daemon_release_assets.sh

  web-typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Web tests
        run: bun test

  web-db-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cmux_test
          POSTGRES_PASSWORD: cmux
          POSTGRES_USER: cmux
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cmux -d cmux_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations
        env:
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: bunx drizzle-kit migrate --config drizzle.config.ts

      - name: Re-apply migrations
        env:
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: bunx drizzle-kit migrate --config drizzle.config.ts

      - name: Database behavior tests
        env:
          CMUX_DB_TEST: "1"
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: |
          bun test tests/db-schema.test.ts
          bun test tests/drizzle-effect.test.ts
          bun test tests/vm-db-read-model.test.ts

  tests-unit-shards:
    name: tests-unit-${{ matrix.shard }}/6
    runs-on: warp-macos-15-arm64-6x
    permissions:
      contents: read
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    env:
      CMUX_SKIP_ZIG_BUILD: "1"
      # XCTest app-host crashes can leave xcodebuild waiting at Swift's
      # interactive crash prompt. Disable the crash catcher entirely in CI.
      SWIFT_BACKTRACE: "enable=no"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty') }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Developer/Xcode/DerivedData/cmux-*
          key: deriveddata-tests-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-${{ hashFiles('cmux.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-tests-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-
            deriveddata-tests-

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if python3 .github/scripts/run-with-output-watchdog.py \
              --idle-timeout-seconds "${CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS:-300}" \
              --termination-grace-seconds 15 \
              --output "/tmp/cmux-unit-spm-resolve-${{ matrix.shard }}.txt" \
              -- \
              xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run unit tests
        env:
          CMUX_TEST_SHARD_INDEX: ${{ matrix.shard }}
          CMUX_TEST_SHARD_TOTAL: 6
          CMUX_TEST_CHUNK_SIZE: 48
          CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS: 180
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          COMBINED_OUTPUT=/tmp/test-output.txt
          CHUNK_DIR="$(mktemp -d)"
          trap 'rm -rf "$CHUNK_DIR"' EXIT

          ONLY_TESTING_ARGS=()
          while IFS= read -r arg; do
            ONLY_TESTING_ARGS+=("$arg")
          done < <(
            python3 .github/scripts/xcode-test-shard-args.py \
              --shard-index "$CMUX_TEST_SHARD_INDEX" \
              --shard-total "$CMUX_TEST_SHARD_TOTAL"
          )

          if [ "${CMUX_TEST_CHUNK_SIZE:-0}" -lt 1 ]; then
            echo "CMUX_TEST_CHUNK_SIZE must be at least 1" >&2
            exit 1
          fi

          CHUNK_COUNT=0
          CHUNK_ARG_COUNT=0
          CURRENT_CHUNK_FILE=""
          should_isolate_selector() {
            local selector_class="${1#-only-testing:cmuxTests/}"
            selector_class="${selector_class%%/*}"
            case "$selector_class" in
              AppDelegateShortcutRoutingTests|BrowserDeveloperToolsConfigurationTests|BrowserDeveloperToolsVisibilityPersistenceTests|BrowserPanelWebViewLifecycleTests|BrowserSessionHistoryRestoreTests|BrowserThemeSettingsTests|BundledCLILinkageTests|CLINotifyProcessIntegrationRegressionTests|CLINotifyProcessIntegrationTests|CMUXCLIErrorOutputRegressionTests|CMUXOpenCommandTests|CmuxWebViewKeyEquivalentTests|CommandPaletteShortcutCustomizationTests|GhosttyBackquoteRegressionTests|GhosttyKeyEquivalentRegressionTests|GlobalSearchShortcutSettingsTests|KeyboardShortcutSettingsFileStoreMigrationTests|KeyboardShortcutSettingsFileStoreStartupTests|KeyboardShortcutSettingsFileStoreTests|MarkdownPanelTests|TabManagerPullRequestProbeTests|TerminalNotificationDirectInteractionTests)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          for arg in "${ONLY_TESTING_ARGS[@]}"; do
            if should_isolate_selector "$arg"; then
              CHUNK_ARG_COUNT=0
              CHUNK_COUNT=$((CHUNK_COUNT + 1))
              CURRENT_CHUNK_FILE="$CHUNK_DIR/chunk-$(printf '%03d' "$CHUNK_COUNT").args"
              printf '%s\n' "$arg" > "$CURRENT_CHUNK_FILE"
              continue
            fi
            if [ "$CHUNK_ARG_COUNT" -eq 0 ]; then
              CHUNK_COUNT=$((CHUNK_COUNT + 1))
              CURRENT_CHUNK_FILE="$CHUNK_DIR/chunk-$(printf '%03d' "$CHUNK_COUNT").args"
              : > "$CURRENT_CHUNK_FILE"
            fi
            printf '%s\n' "$arg" >> "$CURRENT_CHUNK_FILE"
            CHUNK_ARG_COUNT=$((CHUNK_ARG_COUNT + 1))
            if [ "$CHUNK_ARG_COUNT" -ge "$CMUX_TEST_CHUNK_SIZE" ]; then
              CHUNK_ARG_COUNT=0
            fi
          done

          run_unit_tests() {
            local output_path="$1"
            shift
            python3 .github/scripts/run-with-output-watchdog.py \
              --idle-timeout-seconds "$CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS" \
              --termination-grace-seconds 15 \
              --output "$output_path" \
              -- \
              env CMUX_UNIT_TEST_MODE=1 \
              xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" \
              -parallel-testing-enabled NO \
              -maximum-test-execution-time-allowance 180 \
              CMUX_SKIP_ZIG_BUILD=1 \
              "$@" \
              -skip-testing:cmuxTests/AppDelegateShortcutRoutingTests/testCmdWClosesWindowWhenClosingLastSurfaceInLastWorkspace \
              test 2>&1
          }

          : > "$COMBINED_OUTPUT"
          for chunk_file in "$CHUNK_DIR"/chunk-*.args; do
            CHUNK_ARGS=()
            while IFS= read -r arg; do
              CHUNK_ARGS+=("$arg")
            done < "$chunk_file"
            CHUNK_NUMBER="${chunk_file##*/chunk-}"
            CHUNK_NUMBER="${CHUNK_NUMBER%.args}"
            CHUNK_OUTPUT="/tmp/test-output-${CMUX_TEST_SHARD_INDEX}-${CHUNK_NUMBER}.txt"

            echo "Running unit test chunk ${CHUNK_NUMBER}/${CHUNK_COUNT} for shard ${CMUX_TEST_SHARD_INDEX}/${CMUX_TEST_SHARD_TOTAL}: ${#CHUNK_ARGS[@]} selectors" | tee -a "$COMBINED_OUTPUT"

            # Stream output in real time, while also failing quickly if xcodebuild
            # stops producing logs and capturing output for failure classification.
            set +e
            run_unit_tests "$CHUNK_OUTPUT" "${CHUNK_ARGS[@]}"
            EXIT_CODE=$?
            set -e

            cat "$CHUNK_OUTPUT" >> "$COMBINED_OUTPUT"
            OUTPUT=$(cat "$CHUNK_OUTPUT")

            # SwiftPM binary artifact resolution can occasionally fail on ephemeral
            # runners with "Could not resolve package dependencies". Retry once after
            # clearing SwiftPM/DerivedData caches to recover from transient corruption.
            if [ "$EXIT_CODE" -ne 0 ] && grep -q "Could not resolve package dependencies" "$CHUNK_OUTPUT"; then
              echo "SwiftPM package resolution failed, clearing caches and retrying once" | tee -a "$COMBINED_OUTPUT"
              rm -rf ~/Library/Caches/org.swift.swiftpm
              mkdir -p ~/Library/Caches/org.swift.swiftpm
              rm -rf ~/Library/Developer/Xcode/DerivedData/cmux-*
              set +e
              run_unit_tests "$CHUNK_OUTPUT" "${CHUNK_ARGS[@]}"
              EXIT_CODE=$?
              set -e
              cat "$CHUNK_OUTPUT" >> "$COMBINED_OUTPUT"
              OUTPUT=$(cat "$CHUNK_OUTPUT")
            fi

            if [ "$EXIT_CODE" -ne 0 ]; then
              if echo "$OUTPUT" | grep -Eq "Program crashed|The operation was canceled|Test runner exited|Terminated due to signal|Signal [0-9]+"; then
                echo "Crash or cancellation detected during unit tests"
                exit 1
              fi
              echo "Unit test command failed"
              exit 1
            fi
          done

      - name: Run bundled Ghostty theme picker helper regression
        if: matrix.shard == 2
        run: |
          set -euo pipefail
          CMUX_SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages" \
            ./tests/test_bundled_ghostty_theme_picker_helper.sh

      - name: Setup Bun
        if: matrix.shard == 2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Run CLI no-socket regressions
        if: matrix.shard == 2
        run: |
          set -euo pipefail

          CLI_BIN="$(
            find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug/cmux" -exec stat -f '%m %N' {} \; \
              | sort -nr \
              | head -1 \
              | cut -d' ' -f2-
          )"
          if [ -z "${CLI_BIN:-}" ] || [ ! -x "$CLI_BIN" ]; then
            echo "cmux CLI binary not found in DerivedData" >&2
            exit 1
          fi

          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_version_memory_guard.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_contract_help.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_layout_focus_contract.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_socket_operation_deadline.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_omo_openagent_plugin_migration.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_socket_autodiscovery.py
          python3 tests/test_claude_wrapper_hooks.py
          python3 tests/test_shell_git_config_remote_url_parsing.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_claude_hook_stop_last_assistant.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_claude_hook_clear_running_status.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_pi_extension_install.py

  tests:
    name: tests
    runs-on: ubuntu-latest
    needs: tests-unit-shards
    if: always()
    permissions:
      contents: read
    steps:
      - name: Verify unit test shards
        run: |
          set -euo pipefail
          if [ "${{ needs.tests-unit-shards.result }}" != "success" ]; then
            echo "One or more unit test shards failed"
            exit 1
          fi
          echo "All unit test shards passed"

  tests-build-and-lag:
    # Build the full cmux scheme and run the lag regression on WarpBuild.
    # Keep lag validation separate from UI regressions so functional UI failures
    # and performance regressions stay isolated. Broader interactive UI suites
    # still run via test-e2e.yml on GitHub-hosted runners.
    runs-on: warp-macos-15-arm64-6x
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit-lag
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty') }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit-lag.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Developer/Xcode/DerivedData/cmux-*
          key: deriveddata-build-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-${{ hashFiles('cmux.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-build-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-
            deriveddata-build-

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-build-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-build-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if python3 .github/scripts/run-with-output-watchdog.py \
              --idle-timeout-seconds "${CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS:-300}" \
              --termination-grace-seconds 15 \
              --output /tmp/cmux-build-spm-resolve.txt \
              -- \
              xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Build app
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          python3 .github/scripts/run-with-output-watchdog.py \
            --idle-timeout-seconds "${CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS:-300}" \
            --termination-grace-seconds 15 \
            --output /tmp/cmux-build-output.txt \
            -- \
            xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" build

      - name: Validate Swift warning budget
        run: python3 scripts/swift_warning_budget.py --log /tmp/cmux-build-output.txt

      - name: Create virtual display
        run: |
          set -euo pipefail
          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          /tmp/create-virtual-display &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"
          sleep 3
          kill -0 "$VDISPLAY_PID"

      - name: Run CoreAnimation main-thread startup regression
        run: |
          set -euo pipefail
          APP="$(
            find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug/cmux DEV.app" -exec stat -f '%m %N' {} \; \
              | sort -nr \
              | head -1 \
              | cut -d' ' -f2-
          )"
          if [ -z "${APP:-}" ] || [ ! -d "$APP" ]; then
            echo "cmux DEV.app not found in DerivedData" >&2
            exit 1
          fi

          CMUX_ALLOW_UNTAGGED_CA_REGRESSION=1 \
          CMUX_CA_ASSERT_HOLD_SECONDS=15 \
          CMUX_CA_ASSERT_READY_TIMEOUT_SECONDS=120 \
          CMUX_TAG="ci-ca-main-thread" \
          ./scripts/verify-main-thread-ca-transactions.sh "$APP"

      - name: Run workspace churn typing-lag regression
        run: |
          set -euo pipefail

          APP="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug/cmux DEV.app" -print -quit)"
          if [ -z "${APP:-}" ] || [ ! -d "$APP" ]; then
            echo "cmux DEV.app not found in DerivedData" >&2
            exit 1
          fi

          TAG="ci-lag"
          SOCK="/tmp/cmux-debug-${TAG}.sock"
          BUNDLE_ID="$(
            /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Contents/Info.plist" 2>/dev/null \
              || echo 'com.cmuxterm.app.debug'
          )"

          pkill -x "cmux DEV" || true
          rm -f "$SOCK" "/tmp/cmux-${TAG}.sock" || true
          defaults write "$BUNDLE_ID" socketControlMode -string full >/dev/null 2>&1 || true

          CMUX_TAG="$TAG" CMUX_SOCKET_PATH="$SOCK" CMUX_UI_TEST_MODE=1 "$APP/Contents/MacOS/cmux DEV" >/tmp/cmux-ci-lag.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" >/dev/null 2>&1 || true' EXIT

          for _ in {1..240}; do
            [ -S "$SOCK" ] && break
            sleep 0.25
          done
          [ -S "$SOCK" ] || { echo "Socket not ready at $SOCK" >&2; exit 1; }

          CMUX_SOCKET_PATH="$SOCK" \
          CMUX_LAG_MAX_P95_RATIO=1.70 \
          CMUX_LAG_MAX_AVG_RATIO=1.70 \
          CMUX_LAG_MIN_BASELINE_P95_MS_FOR_RATIO=6.0 \
          CMUX_LAG_MIN_BASELINE_AVG_MS_FOR_RATIO=4.0 \
          CMUX_LAG_MAX_P95_DELTA_MS=20.0 \
          CMUX_LAG_MAX_AVG_DELTA_MS=12.0 \
          CMUX_LAG_MAX_CHURN_P95_MS=35 \
          CMUX_LAG_KEY_EVENTS=180 \
          python3 tests/test_workspace_churn_up_arrow_lag.py

      - name: Cleanup virtual display
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${VDISPLAY_PID:-}" ]; then
            kill "$VDISPLAY_PID" >/dev/null 2>&1 || true
          fi
          rm -f /tmp/create-virtual-display

  release-build:
    # Compile the same unsigned universal Release app that nightly builds before
    # signing, notarization, and publishing. This catches DEBUG/Release boundary
    # mistakes before they reach main.
    runs-on: warp-macos-26-arm64-6x
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit-release
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty') }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit-release.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build-universal
          key: deriveddata-release-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-${{ hashFiles('cmux.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-release-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-
            deriveddata-release-

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .spm-cache
          key: spm-release-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-release-
            spm-

      - name: Build universal app (Release)
        run: |
          set -euo pipefail
          python3 .github/scripts/run-with-output-watchdog.py \
            --idle-timeout-seconds "${CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS:-300}" \
            --termination-grace-seconds 15 \
            --output /tmp/cmux-release-build-output.txt \
            -- \
            xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Release -derivedDataPath build-universal \
            -destination 'generic/platform=macOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CMUX_SKIP_ZIG_BUILD=1 \
            CODE_SIGNING_ALLOWED=NO ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Nightly build

  ui-regressions:
    runs-on: warp-macos-15-arm64-6x
    permissions:
      contents: read
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Download pre-built GhosttyKit.xcframework
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-ui-regressions-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-ui-regressions-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if python3 .github/scripts/run-with-output-watchdog.py \
              --idle-timeout-seconds "${CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS:-300}" \
              --termination-grace-seconds 15 \
              --output /tmp/cmux-ui-spm-resolve.txt \
              -- \
              xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Build for testing (display resolution)
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          python3 .github/scripts/run-with-output-watchdog.py \
            --idle-timeout-seconds "${CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS:-300}" \
            --termination-grace-seconds 15 \
            --output /tmp/cmux-ui-build-for-testing-output.txt \
            -- \
            xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            build-for-testing

      - name: Run display resolution churn UI regression
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          HELPER_PATH="/tmp/create-virtual-display"
          TOKEN="$(uuidgen)"
          DIAG_PATH="/tmp/cmux-ui-test-display-churn-${TOKEN}.json"
          DISPLAY_READY="/tmp/cmux-ui-test-display-${TOKEN}.ready"
          DISPLAY_ID_PATH="/tmp/cmux-ui-test-display-${TOKEN}.id"
          DISPLAY_START="/tmp/cmux-ui-test-display-${TOKEN}.start"
          DISPLAY_DONE="/tmp/cmux-ui-test-display-${TOKEN}.done"
          HELPER_LOG="/tmp/cmux-ui-test-display-${TOKEN}-helper.log"
          HELPER_PID=""

          cleanup() {
            if [ -n "${HELPER_PID:-}" ]; then
              kill "$HELPER_PID" 2>/dev/null || true
            fi
            pkill -x "cmux DEV" 2>/dev/null || true
            rm -f "$DIAG_PATH" "$DISPLAY_READY" "$DISPLAY_ID_PATH" "$DISPLAY_START" "$DISPLAY_DONE" "$HELPER_LOG"
            rm -f /tmp/cmux-ui-test-prelaunch.json /tmp/cmux-ui-test-display-harness.json
          }
          trap cleanup EXIT

          # Build display helper
          clang -framework Foundation -framework CoreGraphics \
            -o "$HELPER_PATH" scripts/create-virtual-display.m

          # Find the app binary
          APP_BINARY=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Debug/cmux DEV.app/Contents/MacOS/cmux DEV" -print -quit 2>/dev/null || true)
          if [ -z "$APP_BINARY" ]; then
            echo "ERROR: App binary not found in DerivedData" >&2
            exit 1
          fi
          echo "App binary: $APP_BINARY"

          for attempt in 1 2; do
            cleanup 2>/dev/null || true

            # Launch display helper from shell (non-sandboxed).
            # Use --start-delay-ms instead of --start-path because the XCTest
            # runner is sandboxed and can't write to /tmp/ for the start signal.
            # 10s delay gives the test time to capture baseline render stats.
            "$HELPER_PATH" \
              --modes "1920x1080,1728x1117,1600x900,1440x810" \
              --ready-path "$DISPLAY_READY" \
              --display-id-path "$DISPLAY_ID_PATH" \
              --done-path "$DISPLAY_DONE" \
              --iterations 40 \
              --interval-ms 40 \
              --start-delay-ms 10000 \
              > "$HELPER_LOG" 2>&1 &
            HELPER_PID=$!

            # Wait for display ready
            echo "Waiting for virtual display..."
            for i in $(seq 1 24); do
              if [ -f "$DISPLAY_READY" ]; then break; fi
              sleep 0.5
            done
            if [ ! -f "$DISPLAY_READY" ]; then
              echo "ERROR: Virtual display not ready after 12s" >&2
              cat "$HELPER_LOG" 2>/dev/null || true
              kill "$HELPER_PID" 2>/dev/null || true
              if [ "$attempt" -eq 2 ]; then
                echo "Display resolution UI regression failed after 2 attempts" >&2
                exit 1
              fi
              continue
            fi
            DISPLAY_ID=$(cat "$DISPLAY_ID_PATH")
            echo "Virtual display ready: ID=$DISPLAY_ID"

            # Launch app from shell (non-sandboxed, outside XCTest sandbox)
            CMUX_UI_TEST_MODE=1 \
            CMUX_UI_TEST_DIAGNOSTICS_PATH="$DIAG_PATH" \
            CMUX_UI_TEST_DISPLAY_RENDER_STATS=1 \
            CMUX_UI_TEST_TARGET_DISPLAY_ID="$DISPLAY_ID" \
            CMUX_TAG="ui-tests-display-resolution" \
            "$APP_BINARY" > /tmp/cmux-ui-test-app.log 2>&1 &
            APP_PID=$!
            echo "App launched: PID=$APP_PID"

            # Wait for app diagnostics
            echo "Waiting for app diagnostics..."
            APP_READY=false
            for i in $(seq 1 30); do
              if [ -f "$DIAG_PATH" ]; then
                if python3 -c "import json; d=json.load(open('$DIAG_PATH')); assert d.get('pid')" 2>/dev/null; then
                  APP_READY=true
                  break
                fi
              fi
              if ! kill -0 "$APP_PID" 2>/dev/null; then
                echo "ERROR: App crashed during startup"
                cat /tmp/cmux-ui-test-app.log 2>/dev/null | tail -30 || true
                break
              fi
              sleep 0.5
            done

            if [ "$APP_READY" != "true" ]; then
              echo "Attempt $attempt: App not ready after 15s"
              pkill -x "cmux DEV" 2>/dev/null || true
              kill "$HELPER_PID" 2>/dev/null || true
              if [ "$attempt" -eq 2 ]; then
                echo "Display resolution UI regression failed after 2 attempts" >&2
                echo "--- App log ---"
                cat /tmp/cmux-ui-test-app.log 2>/dev/null | tail -50 || true
                echo "--- Helper log ---"
                cat "$HELPER_LOG" 2>/dev/null | tail -20 || true
                echo "--- Diagnostics ---"
                cat "$DIAG_PATH" 2>/dev/null || echo "(not found)"
                exit 1
              fi
              sleep 3
              continue
            fi

            echo "App started. Diagnostics:"
            cat "$DIAG_PATH"

            # Wait for render stats (terminal surface initialization)
            echo "Waiting for render stats..."
            RENDER_READY=false
            for i in $(seq 1 40); do
              if python3 -c "import json; d=json.load(open('$DIAG_PATH')); assert d.get('renderStatsAvailable') == '1'" 2>/dev/null; then
                RENDER_READY=true
                echo "Render stats available after $((i / 2))s"
                break
              fi
              sleep 0.5
            done
            if [ "$RENDER_READY" != "true" ]; then
              echo "WARNING: Render stats not available after 20s. Diagnostics:"
              cat "$DIAG_PATH" 2>/dev/null || true
              echo "--- App log ---"
              cat /tmp/cmux-ui-test-app.log 2>/dev/null | tail -30 || true
            fi

            # Write manifests so test can find the pre-launched state
            MANIFEST_PATH="/tmp/cmux-ui-test-display-harness.json"
            cat >"$MANIFEST_PATH" <<MANIFEST_EOF
          {"readyPath":"$DISPLAY_READY","displayIDPath":"$DISPLAY_ID_PATH","donePath":"$DISPLAY_DONE","logPath":"$HELPER_LOG"}
          MANIFEST_EOF

            PRELAUNCH_PATH="/tmp/cmux-ui-test-prelaunch.json"
            cat >"$PRELAUNCH_PATH" <<PRELAUNCH_EOF
          {"diagnosticsPath":"$DIAG_PATH"}
          PRELAUNCH_EOF

            # Run test — app is already launched from shell
            if python3 .github/scripts/run-with-output-watchdog.py \
              --idle-timeout-seconds "${CMUX_XCODEBUILD_IDLE_TIMEOUT_SECONDS:-300}" \
              --termination-grace-seconds 15 \
              --output "/tmp/cmux-display-ui-test-output-${attempt}.txt" \
              -- \
              xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" \
              -only-testing:cmuxUITests/DisplayResolutionRegressionUITests \
              test-without-building; then
              exit 0
            fi

            pkill -x "cmux DEV" 2>/dev/null || true
            kill "$HELPER_PID" 2>/dev/null || true

            if [ "$attempt" -eq 2 ]; then
              echo "Display resolution UI regression failed after 2 attempts" >&2
              exit 1
            fi
            echo "Attempt $attempt failed, retrying..."
            sleep 3
          done

      - name: Create persistent virtual display
        run: |
          set -euo pipefail
          HELPER_PATH="/tmp/create-virtual-display"
          clang -framework Foundation -framework CoreGraphics \
            -o "$HELPER_PATH" scripts/create-virtual-display.m

          VDISPLAY_READY="/tmp/cmux-vdisplay-persistent.ready"
          VDISPLAY_ID_PATH="/tmp/cmux-vdisplay-persistent.id"
          rm -f "$VDISPLAY_READY" "$VDISPLAY_ID_PATH"

          "$HELPER_PATH" \
            --modes "1920x1080" \
            --ready-path "$VDISPLAY_READY" \
            --display-id-path "$VDISPLAY_ID_PATH" \
            > /tmp/cmux-vdisplay-persistent.log 2>&1 &
          echo "VDISPLAY_PERSISTENT_PID=$!" >> "$GITHUB_ENV"

          echo "Waiting for persistent virtual display..."
          for i in $(seq 1 24); do
            if [ -f "$VDISPLAY_READY" ]; then break; fi
            sleep 0.5
          done
          if [ ! -f "$VDISPLAY_READY" ]; then
            echo "ERROR: Persistent virtual display not ready after 12s" >&2
            cat /tmp/cmux-vdisplay-persistent.log 2>/dev/null || true
            exit 1
          fi
          echo "Persistent virtual display ready: ID=$(cat "$VDISPLAY_ID_PATH")"

      - name: Run browser find focus UI regression
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          python3 .github/scripts/run-with-output-watchdog.py \
            --idle-timeout-seconds 120 \
            --termination-grace-seconds 15 \
            --output /tmp/cmux-browser-find-ui-test-output.txt \
            -- \
            xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            -maximum-test-execution-time-allowance 180 \
            -only-testing:cmuxUITests/BrowserPaneNavigationKeybindUITests/testCmdFOpensBrowserFindAfterCmdDCmdLNavigation \
            test-without-building

      - name: Cleanup persistent virtual display
        if: always()
        run: |
          if [ -n "${VDISPLAY_PERSISTENT_PID:-}" ]; then
            kill "$VDISPLAY_PERSISTENT_PID" >/dev/null 2>&1 || true
          fi
          rm -f /tmp/cmux-vdisplay-persistent.ready /tmp/cmux-vdisplay-persistent.id /tmp/cmux-vdisplay-persistent.log
