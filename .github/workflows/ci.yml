name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-guard-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate WarpBuild runner guards
        run: ./tests/test_ci_self_hosted_guard.sh

      - name: Validate create-dmg version pinning
        run: ./tests/test_ci_create_dmg_pinned.sh

      - name: Validate unit-test SwiftPM retry guard
        run: ./tests/test_ci_unit_test_spm_retry.sh

      - name: Validate cmux scheme test configuration
        run: ./tests/test_ci_scheme_testaction_debug.sh

      - name: Validate GhosttyKit checksum verification
        run: ./tests/test_ci_ghosttykit_checksum_verification.sh

      - name: Validate release asset guard
        run: node scripts/release_asset_guard.test.js

      - name: Validate current GhosttyKit checksum pin
        run: ./tests/test_ci_ghosttykit_checksum_present.sh

      - name: Validate Swift warning budget guard
        run: ./tests/test_ci_swift_warning_budget.sh

      - name: Validate Swift file length budget guard
        run: ./tests/test_ci_swift_file_length_budget.sh

      - name: Validate Swift file length budget
        run: python3 scripts/swift_file_length_budget.py --budget .github/swift-file-length-budget.tsv

  remote-daemon-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: daemon/remote/go.mod
          cache-dependency-path: daemon/remote/go.sum

      - name: Run remote daemon tests
        working-directory: daemon/remote
        run: go test ./...

      - name: Validate remote daemon release assets
        run: ./tests/test_remote_daemon_release_assets.sh

  web-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Web tests
        run: bun test

  web-db-migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cmux_test
          POSTGRES_PASSWORD: cmux
          POSTGRES_USER: cmux
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cmux -d cmux_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations
        env:
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: bunx drizzle-kit migrate --config drizzle.config.ts

      - name: Re-apply migrations
        env:
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: bunx drizzle-kit migrate --config drizzle.config.ts

      - name: Database behavior tests
        env:
          CMUX_DB_TEST: "1"
          DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
          DIRECT_DATABASE_URL: postgres://cmux:cmux@localhost:5432/cmux_test
        run: |
          bun test tests/db-schema.test.ts
          bun test tests/drizzle-effect.test.ts
          bun test tests/vm-db-read-model.test.ts

  swiftpm-linux-packages:
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show Swift version
        run: swift --version

      - name: Build cmux CLI
        run: swift build --package-path CLI

      - name: Test CMUXCore
        run: swift test --package-path Packages/CMUXCore

      - name: Test CMUXAuthCore
        run: swift test --package-path Packages/CMUXAuthCore

      - name: Test CMUXWorkstream
        run: swift test --package-path Packages/CMUXWorkstream

  linux-distribution-artifact:
    runs-on: ubuntu-latest
    needs: swiftpm-linux-packages
    timeout-minutes: 35
    container:
      image: swift:6.0-jammy
    env:
      PYTHONPYCACHEPREFIX: /tmp/cmux-linux-ci-pycache
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: daemon/remote/go.mod

      - name: Install packaging tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            cpio \
            curl \
            dbus-x11 \
            flatpak \
            flatpak-builder \
            gir1.2-gtk-3.0 \
            gir1.2-vte-2.91 \
            gir1.2-webkit2-4.0 \
            openssh-client \
            openssh-server \
            ostree \
            python3 \
            python3-gi \
            rpm \
            squashfs-tools \
            xauth \
            xvfb
          appimagetool_version="12"
          appimagetool_sha256="d918b4df547b388ef253f3c9e7f6529ca81a885395c31f619d9aaf7030499a13"
          curl -fsSL \
            "https://github.com/AppImage/AppImageKit/releases/download/${appimagetool_version}/appimagetool-x86_64.AppImage" \
            -o /usr/local/bin/appimagetool
          echo "${appimagetool_sha256}  /usr/local/bin/appimagetool" | sha256sum -c -
          chmod 0755 /usr/local/bin/appimagetool
          {
            echo "APPIMAGETOOL=/usr/local/bin/appimagetool"
            echo "APPIMAGE_EXTRACT_AND_RUN=1"
          } >> "$GITHUB_ENV"

      - name: Install Flatpak runtime
        run: |
          set -euo pipefail
          flatpak remote-add --if-not-exists --system flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --system flathub \
            org.gnome.Platform//46 \
            org.gnome.Sdk//46

      - name: Configure localhost SSH smoke
        run: |
          set -euo pipefail
          SSH_USER="$(id -un)"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          rm -f "$HOME/.ssh/cmux_linux_smoke" "$HOME/.ssh/cmux_linux_smoke.pub"
          ssh-keygen -t ed25519 -N "" -f "$HOME/.ssh/cmux_linux_smoke"
          cat "$HOME/.ssh/cmux_linux_smoke.pub" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          ssh-keygen -A
          mkdir -p /run/sshd
          /usr/sbin/sshd \
            -p 2222 \
            -o ListenAddress=127.0.0.1 \
            -o PasswordAuthentication=no \
            -o PubkeyAuthentication=yes \
            -o PermitRootLogin=yes \
            -o AuthorizedKeysFile=.ssh/authorized_keys \
            -E /tmp/cmux-sshd.log
          ssh -p 2222 \
            -i "$HOME/.ssh/cmux_linux_smoke" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/tmp/cmux-known-hosts \
            "$SSH_USER@127.0.0.1" true
          {
            echo "CMUX_REMOTE_SSH_SMOKE=1"
            echo "CMUX_REMOTE_SSH_DESTINATION=$SSH_USER@127.0.0.1"
            echo "CMUX_REMOTE_SSH_PORT=2222"
            echo "CMUX_REMOTE_SSH_IDENTITY_FILE=$HOME/.ssh/cmux_linux_smoke"
            echo "CMUX_REMOTE_SSH_OPTIONS=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/cmux-known-hosts"
          } >> "$GITHUB_ENV"

      - name: Validate Linux packaging sources
        run: |
          set -euo pipefail
          bash -n scripts/reload.sh
          bash -n scripts/reload-linux.sh
          bash -n linux/bin/cmux-linux
          bash -n linux/bin/cmux
          bash -n linux/package.sh
          bash -n linux/package-deb.sh
          bash -n linux/package-appimage.sh
          bash -n linux/package-rpm.sh
          bash -n linux/package-flatpak.sh
          python3 -m py_compile \
            linux/lib/cmux_linux/*.py \
            linux/tools/mock_feedback_server.py \
            linux/tools/package_manifest.py \
            linux/tools/socket_method_parity.py \
            linux/tools/socket_smoke.py \
            linux/tools/validate_linux_contract.py \
            linux/tools/validate_package.py \
            linux/tools/write_package_manifest.py
          python3 linux/tools/validate_linux_contract.py
          python3 linux/tools/socket_method_parity.py --strict --json

      - name: Build Linux CLI release
        run: swift build -c release --package-path CLI

      - name: Validate Linux auth bridge CLI
        run: |
          set -euo pipefail
          printf '{"method":"auth.status","params":{}}\n' \
            | CLI/.build/release/cmux auth-bridge \
            > /tmp/cmux-auth-bridge.json
          python3 - <<'PY'
          import json

          with open("/tmp/cmux-auth-bridge.json", encoding="utf-8") as handle:
              payload = json.load(handle)
          assert payload["backend"] == "cmux_auth_core_bridge"
          assert payload["mode"] == "bridge"
          assert payload["platform"] == "linux"
          assert "signed_in" in payload
          PY

      - name: Build remote daemon
        run: |
          set -euo pipefail
          cd daemon/remote
          CGO_ENABLED=0 go build -trimpath -buildvcs=false \
            -o "$GITHUB_WORKSPACE/daemon/remote/cmuxd-remote" \
            ./cmd/cmuxd-remote

      - name: Build Linux tarball
        run: |
          set -euo pipefail
          CMUX_LINUX_CLI_BINARY="$GITHUB_WORKSPACE/CLI/.build/release/cmux" \
          CMUX_LINUX_REMOTE_DAEMON_BINARY="$GITHUB_WORKSPACE/daemon/remote/cmuxd-remote" \
            bash linux/package.sh
          python3 linux/tools/validate_package.py \
            dist/cmux-linux-x86_64.tar.gz \
            --require-remote-daemon \
            --require-swift-cli \
            --probe-remote-daemon
          rm -rf /tmp/cmux-linux-package
          mkdir -p /tmp/cmux-linux-package
          tar -C /tmp/cmux-linux-package -xzf dist/cmux-linux-x86_64.tar.gz
          printf '{"method":"auth.status","params":{}}\n' \
            | /tmp/cmux-linux-package/cmux-linux-x86_64/bin/cmux auth-bridge \
            > /tmp/cmux-packaged-auth-bridge.json
          python3 - <<'PY'
          import json

          with open("/tmp/cmux-packaged-auth-bridge.json", encoding="utf-8") as handle:
              payload = json.load(handle)
          assert payload["backend"] == "cmux_auth_core_bridge"
          assert payload["mode"] == "bridge"
          assert payload["platform"] == "linux"
          PY

      - name: Build Linux deb
        run: |
          set -euo pipefail
          CMUX_LINUX_SKIP_TARBALL=1 bash linux/package-deb.sh
          python3 linux/tools/validate_package.py \
            dist/cmux-linux_*.deb \
            --require-remote-daemon \
            --require-swift-cli \
            --probe-remote-daemon

      - name: Build Linux AppImage
        run: |
          set -euo pipefail
          CMUX_LINUX_SKIP_TARBALL=1 bash linux/package-appimage.sh
          python3 linux/tools/validate_package.py \
            dist/cmux-linux-x86_64.AppImage \
            --require-remote-daemon \
            --require-swift-cli \
            --probe-remote-daemon

      - name: Build Linux rpm
        run: |
          set -euo pipefail
          CMUX_LINUX_SKIP_TARBALL=1 bash linux/package-rpm.sh
          python3 linux/tools/validate_package.py \
            dist/cmux-linux-*.x86_64.rpm \
            --require-remote-daemon \
            --require-swift-cli \
            --probe-remote-daemon

      - name: Build Linux Flatpak
        run: |
          set -euo pipefail
          CMUX_LINUX_SKIP_TARBALL=1 bash linux/package-flatpak.sh
          python3 linux/tools/validate_package.py \
            dist/cmux-linux-x86_64.flatpak \
            --require-remote-daemon \
            --require-swift-cli \
            --probe-remote-daemon

      - name: Smoke Linux runtime
        run: |
          xvfb-run -a bash -lc '
            set -euo pipefail
            TAG=ci-linux-smoke
            SOCKET=/tmp/cmux-linux-${TAG}.sock
            PID_FILE=/tmp/cmux-linux-${TAG}.pid
            FEEDBACK_URL_FILE="$(mktemp)"
            FEEDBACK_REQUESTS_FILE="$(mktemp)"
            FEEDBACK_PID=""
            cleanup() {
              if [ -n "${FEEDBACK_PID:-}" ]; then
                kill "$FEEDBACK_PID" >/dev/null 2>&1 || true
              fi
              if [ -f "$PID_FILE" ]; then
                pid="$(cat "$PID_FILE" 2>/dev/null || true)"
                if [ -n "$pid" ]; then
                  kill "$pid" >/dev/null 2>&1 || true
                fi
              fi
            }
            trap cleanup EXIT
            python3 linux/tools/mock_feedback_server.py \
              --url-file "$FEEDBACK_URL_FILE" \
              --requests-file "$FEEDBACK_REQUESTS_FILE" &
            FEEDBACK_PID="$!"
            for _ in $(seq 1 50); do
              if [ -s "$FEEDBACK_URL_FILE" ]; then
                break
              fi
              sleep 0.1
            done
            if [ ! -s "$FEEDBACK_URL_FILE" ]; then
              echo "feedback mock server did not start" >&2
              exit 1
            fi
            export CMUX_LINUX_FEEDBACK_ENDPOINT
            CMUX_LINUX_FEEDBACK_ENDPOINT="$(cat "$FEEDBACK_URL_FILE")"
            REMOTE_SSH_FLAGS=()
            if [ "${CMUX_REMOTE_SSH_SMOKE:-}" = "1" ]; then
              REMOTE_SSH_FLAGS+=(--remote-ssh)
            fi
            ./scripts/reload.sh --tag "$TAG" --socket "$SOCKET" --launch --no-package
            CMUX_SOCKET_PATH="$SOCKET" \
            CMUX_EXPECT_FEEDBACK_UPLOAD=1 \
            CMUX_FEEDBACK_REQUESTS_FILE="$FEEDBACK_REQUESTS_FILE" \
            python3 linux/tools/socket_smoke.py \
              --browser \
              --state \
              --require-remote-daemon \
              "${REMOTE_SSH_FLAGS[@]}" \
              --json
          '

      - name: Upload Linux tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-linux-x86_64
          path: dist/cmux-linux-x86_64.tar.gz

      - name: Upload Linux deb
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-linux-amd64-deb
          path: dist/cmux-linux_*.deb

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-linux-x86_64-appimage
          path: dist/cmux-linux-x86_64.AppImage

      - name: Upload Linux rpm
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-linux-x86_64-rpm
          path: dist/cmux-linux-*.x86_64.rpm

      - name: Upload Linux Flatpak
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-linux-x86_64-flatpak
          path: dist/cmux-linux-x86_64.flatpak

  tests:
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty') }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ZIG_REQUIRED="0.15.2"
          if command -v zig >/dev/null 2>&1 && zig version 2>/dev/null | grep -q "^${ZIG_REQUIRED}"; then
            echo "zig ${ZIG_REQUIRED} already installed"
          else
            echo "Installing zig ${ZIG_REQUIRED} from tarball"
            curl -fSL "https://ziglang.org/download/${ZIG_REQUIRED}/zig-aarch64-macos-${ZIG_REQUIRED}.tar.xz" -o /tmp/zig.tar.xz
            tar xf /tmp/zig.tar.xz -C /tmp
            sudo mkdir -p /usr/local/bin /usr/local/lib
            sudo cp -f /tmp/zig-aarch64-macos-${ZIG_REQUIRED}/zig /usr/local/bin/zig
            sudo cp -rf /tmp/zig-aarch64-macos-${ZIG_REQUIRED}/lib /usr/local/lib/zig
            export PATH="/usr/local/bin:$PATH"
            zig version
          fi

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Developer/Xcode/DerivedData/GhosttyTabs-*
          key: deriveddata-tests-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-${{ hashFiles('GhosttyTabs.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-tests-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-
            deriveddata-tests-

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run unit tests
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          run_unit_tests() {
            xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" \
              -skip-testing:cmuxTests/AppDelegateShortcutRoutingTests/testCmdWClosesWindowWhenClosingLastSurfaceInLastWorkspace \
              test 2>&1
          }

          # Stream output via tee so CI logs are visible in real time, while still
          # capturing for post-run analysis of expected vs unexpected failures.
          set +e
          run_unit_tests | tee /tmp/test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          OUTPUT=$(cat /tmp/test-output.txt)
          set -e

          # SwiftPM binary artifact resolution can occasionally fail on ephemeral
          # runners with "Could not resolve package dependencies". Retry once after
          # clearing SwiftPM/DerivedData caches to recover from transient corruption.
          if [ "$EXIT_CODE" -ne 0 ] && echo "$OUTPUT" | grep -q "Could not resolve package dependencies"; then
            echo "SwiftPM package resolution failed, clearing caches and retrying once"
            rm -rf ~/Library/Caches/org.swift.swiftpm
            mkdir -p ~/Library/Caches/org.swift.swiftpm
            rm -rf ~/Library/Developer/Xcode/DerivedData/GhosttyTabs-*
            set +e
            run_unit_tests | tee /tmp/test-output.txt
            EXIT_CODE=${PIPESTATUS[0]}
            OUTPUT=$(cat /tmp/test-output.txt)
            set -e
          fi

          if [ "$EXIT_CODE" -ne 0 ]; then
            SUMMARY=$(echo "$OUTPUT" | grep "Executed.*tests.*with.*failures" | tail -1)
            if echo "$SUMMARY" | grep -q "(0 unexpected)"; then
              echo "All failures are expected, treating as pass"
            else
              echo "Unexpected test failures detected"
              exit 1
            fi
          fi

      - name: Run bundled Ghostty theme picker helper regression
        run: |
          set -euo pipefail
          CMUX_SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages" \
            ./tests/test_bundled_ghostty_theme_picker_helper.sh

      - name: Run CLI no-socket regressions
        run: |
          set -euo pipefail

          CLI_BIN="$(
            find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug/cmux" -exec stat -f '%m %N' {} \; \
              | sort -nr \
              | head -1 \
              | cut -d' ' -f2-
          )"
          if [ -z "${CLI_BIN:-}" ] || [ ! -x "$CLI_BIN" ]; then
            echo "cmux CLI binary not found in DerivedData" >&2
            exit 1
          fi

          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_version_memory_guard.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_contract_help.py
          CMUX_CLI_BIN="$CLI_BIN" python3 tests/test_cli_socket_operation_deadline.py

  tests-build-and-lag:
    # Build the full cmux scheme and run the lag regression on WarpBuild.
    # Keep lag validation separate from UI regressions so functional UI failures
    # and performance regressions stay isolated. Broader interactive UI suites
    # still run via test-e2e.yml on GitHub-hosted runners.
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit-lag
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty') }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit-lag.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: |
          ZIG_REQUIRED="0.15.2"
          if command -v zig >/dev/null 2>&1 && zig version 2>/dev/null | grep -q "^${ZIG_REQUIRED}"; then
            echo "zig ${ZIG_REQUIRED} already installed"
          else
            echo "Installing zig ${ZIG_REQUIRED} from tarball"
            curl -fSL "https://ziglang.org/download/${ZIG_REQUIRED}/zig-aarch64-macos-${ZIG_REQUIRED}.tar.xz" -o /tmp/zig.tar.xz
            tar xf /tmp/zig.tar.xz -C /tmp
            sudo mkdir -p /usr/local/bin /usr/local/lib
            sudo cp -f /tmp/zig-aarch64-macos-${ZIG_REQUIRED}/zig /usr/local/bin/zig
            sudo cp -rf /tmp/zig-aarch64-macos-${ZIG_REQUIRED}/lib /usr/local/lib/zig
            export PATH="/usr/local/bin:$PATH"
            zig version
          fi

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Developer/Xcode/DerivedData/GhosttyTabs-*
          key: deriveddata-build-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-${{ hashFiles('GhosttyTabs.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-build-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-
            deriveddata-build-

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-build-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-build-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Build app
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" build 2>&1 | tee /tmp/cmux-build-output.txt

      - name: Validate Swift warning budget
        run: python3 scripts/swift_warning_budget.py --log /tmp/cmux-build-output.txt

      - name: Create virtual display
        run: |
          set -euo pipefail
          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          /tmp/create-virtual-display &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"
          sleep 3
          kill -0 "$VDISPLAY_PID"

      - name: Run workspace churn typing-lag regression
        run: |
          set -euo pipefail

          APP="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug/cmux DEV.app" -print -quit)"
          if [ -z "${APP:-}" ] || [ ! -d "$APP" ]; then
            echo "cmux DEV.app not found in DerivedData" >&2
            exit 1
          fi

          TAG="ci-lag"
          SOCK="/tmp/cmux-debug-${TAG}.sock"
          BUNDLE_ID="$(
            /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Contents/Info.plist" 2>/dev/null \
              || echo 'com.cmuxterm.app.debug'
          )"

          pkill -x "cmux DEV" || true
          rm -f "$SOCK" "/tmp/cmux-${TAG}.sock" || true
          defaults write "$BUNDLE_ID" socketControlMode -string full >/dev/null 2>&1 || true

          CMUX_TAG="$TAG" CMUX_SOCKET_PATH="$SOCK" CMUX_UI_TEST_MODE=1 "$APP/Contents/MacOS/cmux DEV" >/tmp/cmux-ci-lag.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" >/dev/null 2>&1 || true' EXIT

          for _ in {1..240}; do
            [ -S "$SOCK" ] && break
            sleep 0.25
          done
          [ -S "$SOCK" ] || { echo "Socket not ready at $SOCK" >&2; exit 1; }

          CMUX_SOCKET_PATH="$SOCK" \
          CMUX_LAG_MAX_P95_RATIO=1.70 \
          CMUX_LAG_MAX_AVG_RATIO=1.70 \
          CMUX_LAG_MIN_BASELINE_P95_MS_FOR_RATIO=6.0 \
          CMUX_LAG_MIN_BASELINE_AVG_MS_FOR_RATIO=4.0 \
          CMUX_LAG_MAX_P95_DELTA_MS=20.0 \
          CMUX_LAG_MAX_AVG_DELTA_MS=12.0 \
          CMUX_LAG_MAX_CHURN_P95_MS=35 \
          CMUX_LAG_KEY_EVENTS=180 \
          python3 tests/test_workspace_churn_up_arrow_lag.py

      - name: Cleanup virtual display
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${VDISPLAY_PID:-}" ]; then
            kill "$VDISPLAY_PID" >/dev/null 2>&1 || true
          fi
          rm -f /tmp/create-virtual-display

