        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Native/CommandPaletteNucleoFFI/target
          key: cargo-nucleo-${{ runner.os }}-${{ hashFiles('Native/CommandPaletteNucleoFFI/Cargo.lock') }}
          restore-keys: cargo-nucleo-${{ runner.os }}-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build-universal
          key: deriveddata-release-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}

      - name: Prune restored Xcode module caches
        run: scripts/ci/prune-deriveddata-module-cache.sh build-universal

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .spm-cache
          key: spm-release-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-release-
            spm-

      - name: Build universal app (Release)
        run: |
          set -euo pipefail
          CMUX_SKIP_ZIG_BUILD=1 xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Release -derivedDataPath build-universal \
            -destination 'generic/platform=macOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Nightly build

      - name: Download universal Ghostty CLI helper
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: cmux-ghostty-cli-helper
          path: ghostty-cli-helper

      - name: Install universal Ghostty CLI helper
        run: |
          set -euo pipefail
          ./scripts/install-prebuilt-ghostty-cli-helper.sh \
            ghostty-cli-helper/ghostty \
            build-universal/Build/Products/Release/cmux.app

      - name: Validate Release artifact slices
        run: |
          set -euo pipefail
          APP_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/MacOS/cmux"
          CLI_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/cmux"
          HELPER_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/ghostty"
          test -x "$APP_BINARY"
          test -x "$CLI_BINARY"
          test -x "$HELPER_BINARY"
          file "$APP_BINARY" "$CLI_BINARY" "$HELPER_BINARY"
          SDK_VERSION="$(otool -l "$APP_BINARY" | awk '/LC_BUILD_VERSION/ { in_version=1; next } in_version && /sdk / { print $2; exit }')"
          echo "App SDK version: $SDK_VERSION"
          lipo "$APP_BINARY" -verify_arch arm64 x86_64
          lipo "$CLI_BINARY" -verify_arch arm64 x86_64
          lipo "$HELPER_BINARY" -verify_arch arm64 x86_64
          [[ "$SDK_VERSION" == 26.* ]]

  ui-regressions:
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    # Cold builds after project/package changes have spent more than 40 minutes
    # in build-for-testing before the UI regression scripts start.
    timeout-minutes: 75
    steps:
      - name: Prepare self-hosted workspace
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            sudo -n chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          fi
          chmod -R u+rwX "$GITHUB_WORKSPACE" || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(
              find /Applications -maxdepth 1 -name 'Xcode*.app' -print 2>/dev/null \
                | sort \
                | tail -n 1 \
                || true
            )"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Prepare isolated DerivedData
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="$RUNNER_TEMP/cmux-deriveddata-ui-regressions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$DERIVED_DATA_PATH"
          echo "CMUX_DERIVED_DATA_PATH=$DERIVED_DATA_PATH" >> "$GITHUB_ENV"

      - name: Download pre-built GhosttyKit.xcframework
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Capture Ghostty revision
        id: ghostty-revision
        run: |
          echo "sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute DerivedData cache fingerprint
        id: deriveddata-fingerprint
        run: |
          echo "hash=$(./scripts/ci/deriveddata-cache-fingerprint.sh app)" >> "$GITHUB_OUTPUT"

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Cache Cargo packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Native/CommandPaletteNucleoFFI/target
          key: cargo-nucleo-${{ runner.os }}-${{ hashFiles('Native/CommandPaletteNucleoFFI/Cargo.lock') }}
          restore-keys: cargo-nucleo-${{ runner.os }}-

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-derived-data/ui-regressions
          key: deriveddata-ui-regressions-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}
          restore-keys: deriveddata-ui-regressions-${{ steps.deriveddata-fingerprint.outputs.hash }}-${{ steps.ghostty-revision.outputs.sha }}-

      - name: Prune restored Xcode module caches
        run: scripts/ci/prune-deriveddata-module-cache.sh .ci-derived-data/ui-regressions

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-ui-regressions-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-ui-regressions-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          rm -rf "$CMUX_DERIVED_DATA_PATH"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
              -derivedDataPath "$CMUX_DERIVED_DATA_PATH" \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Build for testing (display resolution)
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/ui-regressions"
          xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            build-for-testing

      - name: Run display resolution churn UI regression
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/ui-regressions"
          HELPER_PATH="/tmp/create-virtual-display"
          TOKEN="$(uuidgen)"
          DIAG_PATH="/tmp/cmux-ui-test-display-churn-${TOKEN}.json"
          DISPLAY_READY="/tmp/cmux-ui-test-display-${TOKEN}.ready"
          DISPLAY_ID_PATH="/tmp/cmux-ui-test-display-${TOKEN}.id"
          DISPLAY_START="/tmp/cmux-ui-test-display-${TOKEN}.start"
          DISPLAY_DONE="/tmp/cmux-ui-test-display-${TOKEN}.done"
          HELPER_LOG="/tmp/cmux-ui-test-display-${TOKEN}-helper.log"

          wait_for_pid_exit() {
            local pid="$1"
            local label="$2"
            for _ in $(seq 1 50); do
              if ! kill -0 "$pid" 2>/dev/null; then
                return 0
              fi
              if ps -p "$pid" -o stat= 2>/dev/null | grep -q '^Z'; then
                wait "$pid" 2>/dev/null || true
                return 0
              fi
              sleep 0.1
            done
            echo "WARNING: $label process $pid did not exit after termination" >&2
            return 1
          }

          stop_pid() {
            local pid="${1:-}"
            local label="$2"
            if [ -z "$pid" ]; then
              return 0
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              return 0
            fi
            kill "$pid" 2>/dev/null || true
            if wait_for_pid_exit "$pid" "$label"; then
              return 0
            fi
            kill -KILL "$pid" 2>/dev/null || true
            wait_for_pid_exit "$pid" "$label" || true
          }

          wait_for_cmux_dev_exit() {
            for _ in $(seq 1 50); do
              if ! pgrep -x "cmux DEV" >/dev/null 2>&1; then
                return 0
              fi
              sleep 0.1
            done
            echo "WARNING: cmux DEV processes are still running after cleanup" >&2
            return 1
          }

          cleanup() {
            pkill -x "cmux DEV" 2>/dev/null || true
            wait_for_cmux_dev_exit || pkill -9 -x "cmux DEV" 2>/dev/null || true
            wait_for_cmux_dev_exit || true
            rm -f "$DIAG_PATH" "$DISPLAY_READY" "$DISPLAY_ID_PATH" "$DISPLAY_START" "$DISPLAY_DONE" "$HELPER_LOG"
            rm -f /tmp/cmux-ui-test-prelaunch.json /tmp/cmux-ui-test-display-harness.json
          }
          trap cleanup EXIT

          run_xctest_managed_display_regression() {
            cleanup 2>/dev/null || true
            echo "Running display resolution UI regression with XCTest-managed display harness"
            printf '%s\n' "{\"helperBinaryPath\":\"$HELPER_PATH\"}" >/tmp/cmux-ui-test-display-harness.json
            CMUX_UI_TEST_DISPLAY_HELPER_BINARY_PATH="$HELPER_PATH" \
            xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" \
              -only-testing:cmuxUITests/DisplayResolutionRegressionUITests \
              test-without-building
          }

          # Build display helper
          clang -framework Foundation -framework CoreGraphics \
            -framework AppKit \
            -o "$HELPER_PATH" scripts/create-virtual-display.m

          # Find the app binary
          APP_BINARY="$DERIVED_DATA_PATH/Build/Products/Debug/cmux DEV.app/Contents/MacOS/cmux DEV"
          if [ ! -x "$APP_BINARY" ]; then
            echo "ERROR: App binary not found in DerivedData" >&2
            exit 1
          fi
          echo "App binary: $APP_BINARY"

          DISPLAY_ATTEMPTS=4
          for attempt in $(seq 1 "$DISPLAY_ATTEMPTS"); do
            cleanup 2>/dev/null || true

            # Launch display helper from shell (non-sandboxed). This waits on
            # DISPLAY_START, which the shell writes when xcodebuild reports the
            # display regression test has started. The XCTest runner is sandboxed
            # and cannot create marker files outside its container.
            "$HELPER_PATH" \
              --modes "1920x1080,1728x1117,1600x900,1440x810" \
              --ready-path "$DISPLAY_READY" \
              --display-id-path "$DISPLAY_ID_PATH" \
              --start-path "$DISPLAY_START" \
              --done-path "$DISPLAY_DONE" \
              --iterations 40 \
              --interval-ms 40 \
              > "$HELPER_LOG" 2>&1 &
            HELPER_PID=$!
            echo "VDISPLAY_PERSISTENT_PID=$HELPER_PID" >> "$GITHUB_ENV"

            # Wait for display ready
            echo "Waiting for virtual display..."
            for _ in $(seq 1 180); do
              if [ -f "$DISPLAY_READY" ]; then break; fi
              sleep 0.5
            done
            if [ ! -f "$DISPLAY_READY" ]; then
              echo "ERROR: Virtual display not ready after 90s" >&2
              cat "$HELPER_LOG" 2>/dev/null || true
              stop_pid "$HELPER_PID" "virtual display helper"
              if [ "$attempt" -eq "$DISPLAY_ATTEMPTS" ]; then
                echo "Display resolution UI regression failed to create a virtual display after $DISPLAY_ATTEMPTS attempts" >&2
                exit 1
              fi
              cleanup
              continue
            fi
            DISPLAY_ID=$(cat "$DISPLAY_ID_PATH")
            echo "Virtual display ready: ID=$DISPLAY_ID"

            # Launch app from shell (non-sandboxed, outside XCTest sandbox)
            CMUX_UI_TEST_MODE=1 \
            CMUX_UI_TEST_DIAGNOSTICS_PATH="$DIAG_PATH" \
            CMUX_UI_TEST_DISPLAY_RENDER_STATS=1 \
            CMUX_UI_TEST_TARGET_DISPLAY_ID="$DISPLAY_ID" \
            CMUX_TAG="ui-tests-display-resolution" \
            "$APP_BINARY" > /tmp/cmux-ui-test-app.log 2>&1 &
            APP_PID=$!
            echo "App launched: PID=$APP_PID"

            # Wait for app diagnostics
            echo "Waiting for app diagnostics..."
            APP_READY=false
            for i in $(seq 1 30); do
              if [ -f "$DIAG_PATH" ]; then
                if python3 -c "import json; d=json.load(open('$DIAG_PATH')); assert d.get('pid')" 2>/dev/null; then
                  APP_READY=true
                  break
                fi
              fi
              if ! kill -0 "$APP_PID" 2>/dev/null; then
                echo "ERROR: App crashed during startup"
                cat /tmp/cmux-ui-test-app.log 2>/dev/null | tail -30 || true
                break
              fi
              sleep 0.5
            done

            if [ "$APP_READY" != "true" ]; then
              echo "Attempt $attempt: App not ready after 15s"
              stop_pid "$APP_PID" "cmux DEV"
              stop_pid "$HELPER_PID" "virtual display helper"
              if [ "$attempt" -eq "$DISPLAY_ATTEMPTS" ]; then
                echo "Display resolution UI regression failed after $DISPLAY_ATTEMPTS attempts" >&2
                echo "--- App log ---"
                cat /tmp/cmux-ui-test-app.log 2>/dev/null | tail -50 || true
                echo "--- Helper log ---"
                cat "$HELPER_LOG" 2>/dev/null | tail -20 || true
                echo "--- Diagnostics ---"
                cat "$DIAG_PATH" 2>/dev/null || echo "(not found)"
                exit 1
              fi
              cleanup
              continue
            fi

            echo "App started. Diagnostics:"
            cat "$DIAG_PATH"

            # Wait for render stats (terminal surface initialization)
            echo "Waiting for render stats..."
            RENDER_READY=false
            for i in $(seq 1 40); do
              if python3 -c "import json; d=json.load(open('$DIAG_PATH')); assert d.get('renderStatsAvailable') == '1'" 2>/dev/null; then
                RENDER_READY=true
                echo "Render stats available after $((i / 2))s"
                break
              fi
              sleep 0.5
            done
            if [ "$RENDER_READY" != "true" ]; then
              echo "WARNING: Render stats not available after 20s. Diagnostics:"
              cat "$DIAG_PATH" 2>/dev/null || true
              echo "--- App log ---"
              cat /tmp/cmux-ui-test-app.log 2>/dev/null | tail -30 || true
            fi

            echo "Waiting for app window on virtual display..."
            WINDOW_READY=false
            for i in $(seq 1 50); do
              if python3 - "$DIAG_PATH" "$DISPLAY_ID" <<'PY' 2>/dev/null
          import json
          import sys

          path, display_id = sys.argv[1], sys.argv[2]
          with open(path) as fh:
              diagnostics = json.load(fh)

          assert diagnostics.get("targetDisplayPresent") == "1", diagnostics
          assert diagnostics.get("targetDisplayMoveSucceeded") == "1", diagnostics
          assert display_id in (diagnostics.get("windowScreenDisplayIDs") or ""), diagnostics
          PY
              then
                WINDOW_READY=true
                echo "App window reached virtual display after $((i / 2))s"
                break
              fi
              sleep 0.5
            done
            if [ "$WINDOW_READY" != "true" ]; then
              echo "Attempt $attempt: App window did not reach display $DISPLAY_ID"
              echo "--- Diagnostics ---"
              cat "$DIAG_PATH" 2>/dev/null || true
              echo "--- App log ---"
              cat /tmp/cmux-ui-test-app.log 2>/dev/null | tail -50 || true
              echo "--- Helper log ---"
              cat "$HELPER_LOG" 2>/dev/null | tail -30 || true
              stop_pid "$APP_PID" "cmux DEV"
              stop_pid "$HELPER_PID" "virtual display helper"
              if [ "$attempt" -eq "$DISPLAY_ATTEMPTS" ]; then
                echo "Shell-prelaunched app could not observe the helper display after $DISPLAY_ATTEMPTS attempts" >&2
                run_xctest_managed_display_regression
                exit $?
              fi
              cleanup
              continue
            fi

            # Write manifests so test can find the pre-launched state
            MANIFEST_PATH="/tmp/cmux-ui-test-display-harness.json"
            printf '%s\n' "{\"readyPath\":\"$DISPLAY_READY\",\"displayIDPath\":\"$DISPLAY_ID_PATH\",\"donePath\":\"$DISPLAY_DONE\",\"logPath\":\"$HELPER_LOG\"}" >"$MANIFEST_PATH"

            PRELAUNCH_PATH="/tmp/cmux-ui-test-prelaunch.json"
            printf '%s\n' "{\"diagnosticsPath\":\"$DIAG_PATH\"}" >"$PRELAUNCH_PATH"

            # Run test — app is already launched from shell. Start display churn
            # when the test case begins, without requiring the sandboxed XCTest
            # process to write outside its container.
            XCODE_OUTPUT="$(mktemp /tmp/cmux-display-xcodebuild.XXXXXX.log)"
            set +e
            xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" \
              -only-testing:cmuxUITests/DisplayResolutionRegressionUITests \
              test-without-building 2>&1 | tee "$XCODE_OUTPUT" | while IFS= read -r line; do
                printf '%s\n' "$line"
                if [[ "$line" == *"Test Case '-[cmuxUITests.DisplayResolutionRegressionUITests testRapidDisplayResolutionChangesKeepTerminalResponsive]' started."* ]] && [ ! -f "$DISPLAY_START" ]; then
                  printf 'start\n' > "$DISPLAY_START"
                  echo "Display churn start signal written"
                fi
              done
            xcode_status=${PIPESTATUS[0]}
            set -e
            if [ "$xcode_status" -ne 0 ]; then
              stop_pid "$APP_PID" "cmux DEV"
              stop_pid "$HELPER_PID" "virtual display helper"
              echo "Display resolution UI regression xcodebuild failed; not retrying after XCTest started" >&2
              echo "--- App log ---"
              cat /tmp/cmux-ui-test-app.log 2>/dev/null | tail -50 || true
              echo "--- Helper log ---"
              cat "$HELPER_LOG" 2>/dev/null | tail -30 || true
              exit "$xcode_status"
            fi
            if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' "$XCODE_OUTPUT"; then
              stop_pid "$APP_PID" "cmux DEV"
              stop_pid "$HELPER_PID" "virtual display helper"
              echo "Display resolution UI regression completed without executing any tests" >&2
              exit 1
            fi

            exit 0
          done

      - name: Run browser find focus UI regression
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/ui-regressions"
          XCODE_OUTPUT="$(mktemp /tmp/cmux-browser-find-xcodebuild.XXXXXX.log)"
          set +e
          xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            -maximum-test-execution-time-allowance 180 \
            -only-testing:cmuxUITests/BrowserPaneNavigationKeybindUITests/testCmdFOpensBrowserFindAfterCmdDCmdLNavigation \
            test-without-building 2>&1 | tee "$XCODE_OUTPUT"
          xcode_status=${PIPESTATUS[0]}
          set -e
          if [ "$xcode_status" -ne 0 ]; then
            exit "$xcode_status"
          fi
          if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' "$XCODE_OUTPUT"; then
            echo "Browser find focus UI regression completed without executing any tests" >&2
            exit 1
          fi

      - name: Cleanup persistent virtual display
        if: always()
        run: |
          if [ -n "${VDISPLAY_PERSISTENT_PID:-}" ]; then
            kill "$VDISPLAY_PERSISTENT_PID" >/dev/null 2>&1 || true
          fi
          rm -f /tmp/cmux-vdisplay-persistent.ready /tmp/cmux-vdisplay-persistent.id /tmp/cmux-vdisplay-persistent.log
