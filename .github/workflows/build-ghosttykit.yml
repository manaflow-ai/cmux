name: Build GhosttyKit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  classify-pr-scope:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      run_heavy_macos: ${{ steps.classify.outputs.run_heavy_macos }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify pull request scope
        id: classify
        run: |
          set -euo pipefail
          OUTPUT=$(python3 scripts/ci/classify_pr_scope.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --event-name "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha || '' }}" \
            --head "${{ github.event.pull_request.head.sha || github.sha }}")
          echo "$OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"

  build-ghosttykit:
    needs: classify-pr-scope
    if: needs.classify-pr-scope.outputs.run_heavy_macos == 'true'
    runs-on: depot-macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Get ghostty SHA
        id: ghostty-sha
        run: |
          SHA=$(git -C ghostty rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Ghostty SHA: $SHA"

      - name: Check if xcframework release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="xcframework-${{ steps.ghostty-sha.outputs.sha }}"
          if gh release view "$TAG" --repo manaflow-ai/ghostty >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG not found, will build"
          fi

      - name: Select Xcode
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | head -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Build GhosttyKit.xcframework
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          if ! command -v zig >/dev/null 2>&1; then
            if command -v brew >/dev/null 2>&1; then
              brew install zig
            else
              echo "zig is required to build GhosttyKit.xcframework. Install zig and retry." >&2
              exit 1
            fi
          fi
          cd ghostty && zig build -Demit-xcframework=true -Demit-macos-app=false -Doptimize=ReleaseFast

      - name: Package xcframework
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          rm -rf GhosttyKit.xcframework
          cp -R ghostty/macos/GhosttyKit.xcframework GhosttyKit.xcframework
          tar czf GhosttyKit.xcframework.tar.gz GhosttyKit.xcframework

      - name: Detect release upload permission
        if: steps.check-release.outputs.exists == 'false'
        id: upload-permission
        env:
          GHOSTTY_RELEASE_TOKEN: ${{ secrets.GHOSTTY_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${GHOSTTY_RELEASE_TOKEN:-}" ]; then
            echo "can_upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload xcframework release
        if: steps.check-release.outputs.exists == 'false' && steps.upload-permission.outputs.can_upload == 'true'
        env:
          GH_TOKEN: ${{ secrets.GHOSTTY_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          TAG="xcframework-${{ steps.ghostty-sha.outputs.sha }}"
          gh release create "$TAG" \
            --repo manaflow-ai/ghostty \
            --title "GhosttyKit xcframework (${{ steps.ghostty-sha.outputs.sha }})" \
            --notes "Pre-built GhosttyKit.xcframework for commit ${{ steps.ghostty-sha.outputs.sha }}" \
            GhosttyKit.xcframework.tar.gz
          echo "Published release $TAG"

      - name: Skip xcframework release upload
        if: steps.check-release.outputs.exists == 'false' && steps.upload-permission.outputs.can_upload != 'true'
        run: echo "GHOSTTY_RELEASE_TOKEN unavailable; skipping release publication for this run."
