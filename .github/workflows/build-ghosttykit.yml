name: Build GhosttyKit

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-ghosttykit:
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 20
    env:
      GHOSTTYKIT_CRASH_REPORT_SUBDIR: cmux/crash
      GHOSTTYKIT_BUILD_FLAVOR: crashsubdir-cmux-crash-v1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Get ghostty SHA
        id: ghostty-sha
        run: |
          SHA=$(git -C ghostty rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Ghostty SHA: $SHA"

      - name: Resolve GhosttyKit release tag
        id: ghosttykit
        run: |
          set -euo pipefail
          SHA="${{ steps.ghostty-sha.outputs.sha }}"
          if git -C ghostty grep -q "crash-report-subdir" HEAD -- src/build/Config.zig build.zig 2>/dev/null; then
            echo "tag=xcframework-$SHA-$GHOSTTYKIT_BUILD_FLAVOR" >> "$GITHUB_OUTPUT"
            echo "crash_args=-Dcrash-report-subdir=$GHOSTTYKIT_CRASH_REPORT_SUBDIR" >> "$GITHUB_OUTPUT"
            echo "notes=Pre-built GhosttyKit.xcframework for commit $SHA with crash-report-subdir=$GHOSTTYKIT_CRASH_REPORT_SUBDIR" >> "$GITHUB_OUTPUT"
          else
            echo "tag=xcframework-$SHA" >> "$GITHUB_OUTPUT"
            echo "crash_args=" >> "$GITHUB_OUTPUT"
            echo "notes=Pre-built GhosttyKit.xcframework for commit $SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if xcframework release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ghosttykit.outputs.tag }}"
          if gh release view "$TAG" --repo manaflow-ai/ghostty >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG not found, will build"
          fi

      - name: Select Xcode
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | head -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache Zig packages
        if: steps.check-release.outputs.exists == 'false'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Build GhosttyKit.xcframework
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          ./scripts/install-zig-ci.sh
          CRASH_ARGS="${{ steps.ghosttykit.outputs.crash_args }}"
          cd ghostty && zig build ${CRASH_ARGS:+$CRASH_ARGS} -Demit-xcframework=true -Demit-macos-app=false -Dxcframework-target=universal -Doptimize=ReleaseFast

      - name: Package xcframework
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          rm -rf GhosttyKit.xcframework
          cp -R ghostty/macos/GhosttyKit.xcframework GhosttyKit.xcframework
          COPYFILE_DISABLE=1 tar czf GhosttyKit.xcframework.tar.gz GhosttyKit.xcframework
          python3 scripts/validate-xcframework-archive.py GhosttyKit.xcframework.tar.gz

      - name: Upload xcframework release
        if: steps.check-release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GHOSTTY_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GHOSTTY_RELEASE_TOKEN not available (fork PR), skipping upload"
            exit 0
          fi
          TAG="${{ steps.ghosttykit.outputs.tag }}"
          gh release create "$TAG" \
            --repo manaflow-ai/ghostty \
            --target "${{ steps.ghostty-sha.outputs.sha }}" \
            --title "GhosttyKit xcframework (${{ steps.ghostty-sha.outputs.sha }})" \
            --notes "${{ steps.ghosttykit.outputs.notes }}" \
            GhosttyKit.xcframework.tar.gz
          echo "Published release $TAG"
