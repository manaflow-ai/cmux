name: Secret scan

on:
  pull_request_target:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request_target' }}

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Pinned to the version the allowlist (.gitleaks.toml) was validated against.
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
    steps:
      - name: Checkout pull request merge
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This job only reads code; don't persist the token in git config.
          persist-credentials: false
          # Run base-controlled workflow code while scanning the PR merge tree.
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          # PR scans inspect the commit range, including secrets added and removed
          # before merge; fetch history so the base SHA is available.
          fetch-depth: 0
          # Scan cmux's own source only; the ghostty submodule is a separate
          # upstream repo with its own scanning.
          submodules: false

      - name: Checkout push head
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This job only reads code; don't persist the token in git config.
          persist-credentials: false
          fetch-depth: 0
          # Scan cmux's own source only; the ghostty submodule is a separate
          # upstream repo with its own scanning.
          submodules: false

      - name: Install gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "$url" -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run secret scan
        env:
          BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          config_path=".gitleaks.toml"
          candidate_config_path=".gitleaks.toml"
          validate_candidate_config=false
          ignore_path="${RUNNER_TEMP}/cmux-empty.gitleaksignore"
          log_opts=""
          : > "$ignore_path"

          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            log_opts="${PR_BASE_SHA}..HEAD"
            # Enforce PRs with the base-branch config so a PR cannot hide a
            # committed secret by relaxing its own allowlist. This bootstrap PR
            # adds the first config, so it falls back to the candidate file only
            # when the base branch has no .gitleaks.toml yet.
            if git cat-file -e "${PR_BASE_SHA}:.gitleaks.toml" 2>/dev/null; then
              config_path="${RUNNER_TEMP}/cmux-base.gitleaks.toml"
              git show "${PR_BASE_SHA}:.gitleaks.toml" > "$config_path"
              if ! cmp -s "$candidate_config_path" "$config_path"; then
                validate_candidate_config=true
              fi
            fi
          elif [ "${{ github.event_name }}" = "push" ] &&
               [ -n "${BEFORE_SHA:-}" ] &&
               [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            log_opts="${BEFORE_SHA}..${GITHUB_SHA}"
          fi

          if [ -n "$log_opts" ]; then
            echo "==> Scanning git history (${log_opts}) with gitleaks ..."
            gitleaks git \
              --config "$config_path" \
              --redact \
              --verbose \
              --no-banner \
              --ignore-gitleaks-allow \
              --gitleaks-ignore-path "$ignore_path" \
              --log-opts "$log_opts" \
              "$GITHUB_WORKSPACE"
          else
            echo "==> Scanning working tree with gitleaks ..."
            gitleaks dir \
              --config "$config_path" \
              --redact \
              --verbose \
              --no-banner \
              --ignore-gitleaks-allow \
              --gitleaks-ignore-path "$ignore_path" \
              "$GITHUB_WORKSPACE"
          fi

          if [ "$validate_candidate_config" = true ]; then
            echo "==> Validating candidate .gitleaks.toml with gitleaks ..."
            gitleaks git \
              --config "$candidate_config_path" \
              --redact \
              --verbose \
              --no-banner \
              --ignore-gitleaks-allow \
              --gitleaks-ignore-path "$ignore_path" \
              --log-opts "$log_opts" \
              "$GITHUB_WORKSPACE"
          fi
