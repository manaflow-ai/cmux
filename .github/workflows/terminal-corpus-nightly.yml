name: terminal corpus nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terminal-nightly:
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    timeout-minutes: 30
    steps:
      - name: Prepare self-hosted workspace
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            sudo -n chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          fi
          chmod -R u+rwX "$GITHUB_WORKSPACE" || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(
              find /Applications -maxdepth 1 -name 'Xcode*.app' -print 2>/dev/null \
                | sort \
                | tail -n 1 \
                || true
            )"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty/**') }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        run: ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: ./scripts/install-rust-ci.sh

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: terminal-corpus-spm-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: terminal-corpus-spm-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"
          xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -resolvePackageDependencies

      - name: Run terminal corpus unit tests
        env:
          CMUX_REQUIRE_LIVE_GHOSTTY_SURFACE: "1"
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          set +e
          OUTPUT=$(scripts/ci/xcodebuild_noninteractive.py \
            xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -disableAutomaticPackageResolution \
              -destination "platform=macOS" \
              -only-testing:cmuxTests/GhosttyCommandShiftForwardingTests \
              -only-testing:cmuxTests/GhosttyTerminalStartupEnvironmentTests \
              -only-testing:cmuxTests/CmuxConfigNamedColorTests \
              -only-testing:cmuxTests/SessionPersistenceTests \
              test 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"

          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

          if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' <<<"$OUTPUT"; then
            echo "Terminal corpus unit tests completed without executing any tests" >&2
            exit 1
          fi

          if grep -Eq 'GhosttyCommandShiftForwardingTests.*skipped|Ghostty surface failed to initialize' <<<"$OUTPUT"; then
            echo "Terminal corpus unit tests skipped GhosttyCommandShiftForwardingTests live-surface coverage" >&2
            exit 1
          fi
