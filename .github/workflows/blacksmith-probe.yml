name: Blacksmith macOS capacity probe

# Temporary probe to check whether Blacksmith macOS runners have capacity
# before re-attempting the WarpBuild -> Blacksmith migration (#4902 / reverted
# by #4926). Scoped to this branch via push trigger so it never affects main.
# Delete before merging.

on:
  push:
    branches:
      - feat-blacksmith-runners-retry

permissions:
  contents: read

jobs:
  probe:
    name: probe ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - blacksmith-6vcpu-macos-15
          - blacksmith-6vcpu-macos-26
          - blacksmith-6vcpu-macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - name: Report pickup
        run: |
          echo "runner=${{ matrix.runner }}"
          echo "started=$(date -u +%FT%TZ)"
          sw_vers || true
          uname -a
