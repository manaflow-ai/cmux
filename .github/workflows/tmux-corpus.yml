name: tmux corpus

on:
  pull_request:
    paths:
      - ".github/workflows/tmux-corpus.yml"
      - "daemon/remote/**"
  schedule:
    - cron: "47 10 * * *"
  workflow_dispatch:
    inputs:
      fuzztime:
        description: Time per Go fuzz target
        required: false
        default: 2m

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  remote-daemon-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: daemon/remote/go.mod
          cache-dependency-path: daemon/remote/go.sum

      - name: Run deterministic tmux corpus tests
        working-directory: daemon/remote
        run: go test ./...

      - name: Run tmux corpus fuzz targets
        working-directory: daemon/remote
        env:
          FUZZTIME: ${{ github.event_name == 'pull_request' && '30s' || github.event.inputs.fuzztime || '2m' }}
        run: |
          set -euo pipefail
          for target in \
            FuzzTmuxCompatArgParser \
            FuzzTmuxRenderFormatSupportedSubset \
            FuzzTmuxSendKeysTokens \
            FuzzConsumeWebSocketLease \
            FuzzNormalizePTYSize \
            FuzzWebSocketPTYControlFrame
          do
            go test ./cmd/cmuxd-remote -run '^$' -fuzz "^${target}$" -fuzztime "$FUZZTIME"
          done
