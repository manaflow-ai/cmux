name: Deploy docs channel reusable

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
    secrets:
      vercel_org_id:
        required: true
      vercel_project_id:
        required: true
      vercel_token:
        required: true

jobs:
  deploy:
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@735343b667d3e6f658f2770b6acb544c95b55c72 # v2.0.0
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: |
          mkdir -p web/.vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > web/.vercel/project.json
          bunx vercel deploy --prod --yes --token "$VERCEL_TOKEN" --build-env "CMUX_DOCS_CHANNEL=${{ inputs.channel }}" --build-env "CMUX_RELEASE_DOCS_ORIGIN=https://docs.cmux.com" --build-env "CMUX_NIGHTLY_DOCS_ORIGIN=https://nightly-docs.cmux.com"
        working-directory: web
        env:
          VERCEL_ORG_ID: ${{ secrets.vercel_org_id }}
          VERCEL_PROJECT_ID: ${{ secrets.vercel_project_id }}
          VERCEL_TOKEN: ${{ secrets.vercel_token }}
