name: Run tests on Depot

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      skip_unit_tests:
        description: Skip unit tests (run only UI tests)
        required: false
        default: false
        type: boolean
      skip_ui_tests:
        description: Skip UI tests (run only unit tests)
        required: false
        default: false
        type: boolean
      test_filter:
        description: "Run specific UI test class (e.g. UpdatePillUITests) or empty for all"
        required: false
        default: ""
      test_timeout:
        description: "Per-test timeout in seconds (default: 120)"
        required: false
        default: "120"

jobs:
  tests:
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    timeout-minutes: 75
    steps:
      - name: Validate suite selection
        run: |
          set -euo pipefail
          if [ "${{ inputs.skip_unit_tests }}" = "true" ] && [ "${{ inputs.skip_ui_tests }}" = "true" ]; then
            echo "skip_unit_tests and skip_ui_tests cannot both be true; that would execute no tests" >&2
            exit 1
          fi

      - name: Prepare self-hosted workspace
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            sudo -n chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"
          fi
          chmod -R u+rwX "$GITHUB_WORKSPACE" || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: false

      - name: Initialize submodules with retry
        run: ./scripts/ci/init-submodules-with-retry.sh

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(
              find /Applications -maxdepth 1 -name 'Xcode*.app' -print 2>/dev/null \
                | sort \
                | tail -n 1 \
                || true
            )"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Download pre-built GhosttyKit.xcframework
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GHOSTTY_SHA=$(git -C ghostty rev-parse HEAD)
          BUILD_FLAVOR="crashsubdir-cmux-crash-v1"
          TAG="xcframework-$GHOSTTY_SHA-$BUILD_FLAVOR"
          URL="https://github.com/manaflow-ai/ghostty/releases/download/$TAG/GhosttyKit.xcframework.tar.gz"
          echo "Downloading xcframework for ghostty $GHOSTTY_SHA"
          MAX_RETRIES=30
          RETRY_DELAY=20
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -fSL -o GhosttyKit.xcframework.tar.gz "$URL"; then
              echo "Download succeeded on attempt $i"
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Failed to download xcframework after $MAX_RETRIES attempts" >&2
              exit 1
            fi
            echo "Attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          tar xzf GhosttyKit.xcframework.tar.gz
          rm GhosttyKit.xcframework.tar.gz
          test -d GhosttyKit.xcframework

      - name: Install zig
        run: |
          ./scripts/install-zig-ci.sh

      - name: Install Rust
        run: |
          ./scripts/install-rust-ci.sh

      - name: Create virtual display
        run: |
          set -euo pipefail
          echo "=== Display before ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(none)"
          echo ""
          clang -framework Foundation -framework CoreGraphics \
            -framework AppKit \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          VDISPLAY_COMMAND=(/tmp/create-virtual-display)
          CURRENT_USER="$(id -un)"
          CURRENT_UID="$(id -u)"
          GUI_USER="$(stat -f %Su /dev/console 2>/dev/null || true)"
          if [ -n "$GUI_USER" ] &&
             [ "$GUI_USER" != "root" ] &&
             GUI_UID="$(id -u "$GUI_USER" 2>/dev/null)" &&
             command -v sudo >/dev/null 2>&1 &&
             sudo -n true 2>/dev/null; then
            echo "Launching virtual display helper in console GUI bootstrap for $GUI_USER ($GUI_UID); current user: $CURRENT_USER"
            VDISPLAY_COMMAND=(sudo -n launchctl asuser "$GUI_UID" sudo -n -H -u "$GUI_USER" /usr/bin/env /tmp/create-virtual-display)
          elif launchctl print "gui/$CURRENT_UID" >/dev/null 2>&1; then
            echo "Launching virtual display helper in current user GUI bootstrap for $CURRENT_USER ($CURRENT_UID)"
            VDISPLAY_COMMAND=(launchctl asuser "$CURRENT_UID" /usr/bin/env /tmp/create-virtual-display)
          else
            echo "Launching virtual display helper in current bootstrap"
          fi
          VDISPLAY_READY="$RUNNER_TEMP/cmux-virtual-display.ready"
          VDISPLAY_ID_PATH="$RUNNER_TEMP/cmux-virtual-display.id"
          VDISPLAY_LOG="$RUNNER_TEMP/cmux-virtual-display.log"
          rm -f "$VDISPLAY_READY" "$VDISPLAY_ID_PATH" "$VDISPLAY_LOG"

          "${VDISPLAY_COMMAND[@]}" \
            --ready-path "$VDISPLAY_READY" \
            --display-id-path "$VDISPLAY_ID_PATH" \
            >"$VDISPLAY_LOG" 2>&1 &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"

          for _ in $(seq 1 900); do
            if [ -s "$VDISPLAY_READY" ] && [ -s "$VDISPLAY_ID_PATH" ]; then
              break
            fi
            if ! kill -0 "$VDISPLAY_PID" 2>/dev/null; then
              echo "Virtual display helper exited before readiness" >&2
              cat "$VDISPLAY_LOG" >&2 || true
              exit 1
            fi
            sleep 0.1
          done
          if [ ! -s "$VDISPLAY_READY" ] || [ ! -s "$VDISPLAY_ID_PATH" ]; then
            echo "Timed out waiting for virtual display readiness after 90s" >&2
            cat "$VDISPLAY_LOG" >&2 || true
            exit 1
          fi
          echo "Virtual display ready: $(tr -d '\n' < "$VDISPLAY_ID_PATH")"
          cat "$VDISPLAY_LOG"
          echo "=== Display after ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(none)"

      - name: Clean DerivedData
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/cmux-*

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          rm -rf "$SOURCE_PACKAGES_DIR"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild -project cmux.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run unit tests
        if: ${{ !inputs.skip_unit_tests }}
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$PWD/.ci-derived-data/tests"
          run_unit_tests() {
            SOURCE_PACKAGES_DIR="$SOURCE_PACKAGES_DIR" \
              DERIVED_DATA_PATH="$DERIVED_DATA_PATH" \
              scripts/ci/run-cmux-unit-tests-isolated.sh
          }

          set +e
          OUTPUT=$(run_unit_tests)
          EXIT_CODE=$?
          set -e

          # SwiftPM binary artifact resolution can occasionally fail with
          # "Could not resolve package dependencies". Retry once after clearing
          # SwiftPM/DerivedData caches to recover from transient corruption.
          if [ "$EXIT_CODE" -ne 0 ] && grep -q "Could not resolve package dependencies" <<<"$OUTPUT"; then
            echo "SwiftPM package resolution failed, clearing caches and retrying once"
            rm -rf ~/Library/Caches/org.swift.swiftpm
            rm -rf "$DERIVED_DATA_PATH"
            set +e
            OUTPUT=$(run_unit_tests)
            EXIT_CODE=$?
            set -e
          fi

          echo "$OUTPUT"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Unit tests failed"
            exit "$EXIT_CODE"
          fi
          if ! grep -Eq 'All [1-9][0-9]* selected cmuxTests XCTestCase classes and Swift Testing suites passed in shard-.* batches' <<<"$OUTPUT"; then
            echo "Unit test workflow completed without executing any tests" >&2
            exit 1
          fi

      - name: Run UI tests
        if: ${{ !inputs.skip_ui_tests }}
        env:
          TEST_FILTER: ${{ inputs.test_filter }}
          TEST_TIMEOUT: ${{ inputs.test_timeout || '120' }}
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"

          # Build the -only-testing argument
          if [ -n "$TEST_FILTER" ]; then
            ONLY_TESTING="-only-testing:cmuxUITests/$TEST_FILTER"
          else
            ONLY_TESTING="-only-testing:cmuxUITests"
          fi

          set +e
          OUTPUT=$(scripts/ci/xcodebuild_noninteractive.py \
            xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            -maximum-test-execution-time-allowance "$TEST_TIMEOUT" \
            "$ONLY_TESTING" test 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "UI tests failed"
            exit "$EXIT_CODE"
          fi
          if ! grep -Eq 'Executed [1-9][0-9]* test,|Executed [1-9][0-9]* tests|Test run with [1-9][0-9]* tests' <<<"$OUTPUT"; then
            echo "UI test workflow completed without executing any tests" >&2
            exit 1
          fi
