name: Desktop CMX UI tests

on:
  push:
    branches:
      - feat-desktop-cmx-backend
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      only_testing:
        description: Space-separated cmuxUITests filters
        required: false
        default: "BonsplitTabDragUITests/testCmxBackendMinimalModeKeepsTabReorderWorking BonsplitTabDragUITests/testCmxBackendMinimalModeDragToSplitCreatesPane"
      runner:
        description: Runner OS
        required: false
        default: "depot-macos-latest"
        type: choice
        options:
          - depot-macos-latest
          - depot-macos-14

jobs:
  cmx-ui:
    runs-on: ${{ inputs.runner || 'depot-macos-latest' }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Capture SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | head -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Download pre-built GhosttyKit.xcframework
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GHOSTTY_SHA=$(git -C ghostty rev-parse HEAD)
          TAG="xcframework-$GHOSTTY_SHA"
          URL="https://github.com/manaflow-ai/ghostty/releases/download/$TAG/GhosttyKit.xcframework.tar.gz"
          echo "Downloading xcframework for ghostty $GHOSTTY_SHA"
          MAX_RETRIES=30
          RETRY_DELAY=20
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -fSL -o GhosttyKit.xcframework.tar.gz "$URL"; then
              echo "Download succeeded on attempt $i"
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Failed to download xcframework after $MAX_RETRIES attempts" >&2
              exit 1
            fi
            echo "Attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done
          tar xzf GhosttyKit.xcframework.tar.gz
          rm GhosttyKit.xcframework.tar.gz
          test -d GhosttyKit.xcframework

      - name: Install zig
        run: ./scripts/install-zig-ci.sh 0.15.2

      - name: Create virtual display
        run: |
          set -euo pipefail
          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m
          /tmp/create-virtual-display &
          VDISPLAY_PID=$!
          echo "VDISPLAY_PID=$VDISPLAY_PID" >> "$GITHUB_ENV"
          sleep 3
          kill -0 "$VDISPLAY_PID"

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ci-source-packages
          key: spm-${{ inputs.runner || 'depot-macos-latest' }}-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ inputs.runner || 'depot-macos-latest' }}-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"
          for attempt in 1 2 3; do
            if xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux-unit -configuration Debug \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to resolve Swift packages after 3 attempts" >&2
              exit 1
            fi
            echo "Package resolution failed on attempt $attempt, retrying..."
            sleep $((attempt * 5))
          done

      - name: Run CMX-backed Bonsplit UI tests
        env:
          ONLY_TESTING: ${{ inputs.only_testing || 'BonsplitTabDragUITests/testCmxBackendMinimalModeKeepsTabReorderWorking BonsplitTabDragUITests/testCmxBackendMinimalModeDragToSplitCreatesPane' }}
          RESULT_BUNDLE: /tmp/desktop-cmx-ui.xcresult
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          DERIVED_DATA_PATH="$RUNNER_TEMP/desktop-cmx-ui-derived-data"
          rm -rf "$RESULT_BUNDLE"

          ONLY_TESTING_ARGS=()
          read -r -a TEST_FILTERS <<< "$ONLY_TESTING"
          for filter in "${TEST_FILTERS[@]}"; do
            ONLY_TESTING_ARGS+=("-only-testing:cmuxUITests/$filter")
          done
          if [ "${#ONLY_TESTING_ARGS[@]}" -eq 0 ]; then
            echo "No cmuxUITests filters were provided" >&2
            exit 1
          fi

          if ! command -v cargo >/dev/null 2>&1; then
            echo "cargo is required for CMX-backed UI tests" >&2
            exit 1
          fi
          (cd rust/cmux-cli && cargo build -p cmx)
          export CMUX_UI_TEST_CMX_EXECUTABLE="$PWD/rust/cmux-cli/target/debug/cmx"
          export CMUX_UI_TEST_REPO_ROOT="$PWD"

          xcodebuild \
            -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$RESULT_BUNDLE" \
            "${ONLY_TESTING_ARGS[@]}" \
            test

      - name: Upload result bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-cmx-ui-xcresult
          path: /tmp/desktop-cmx-ui.xcresult
          if-no-files-found: warn

      - name: Upload CMX UI diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-cmx-ui-diagnostics
          path: |
            /tmp/cmux-debug-ui-bonsplit-cmx-*.log
            /tmp/cmux-cmx-ui-bonsplit-cmx-*
            /tmp/cmux-last-debug-log-path
            /tmp/cmux-last-socket-path
          if-no-files-found: warn

      - name: Cleanup virtual display
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${VDISPLAY_PID:-}" ]; then
            kill "$VDISPLAY_PID" >/dev/null 2>&1 || true
          fi
          rm -f /tmp/create-virtual-display
