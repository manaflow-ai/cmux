name: iOS streamed-screenshot CI validation

# Validates the REAL Mac-streamed screenshot pipeline headless on a Blacksmith
# macOS runner: stand up the dev web backend (local Postgres + Next.js), build +
# run the desktop cmux Mac app, pair an iOS simulator to it, and capture the live
# streamed terminal. Proves the pipeline works in CI before wiring it into the
# App Store screenshot flow.
#
# Backend: the DEBUG build signs into localhost:3000 + the dev Stack project, so
# we run the dev web app locally on the runner (no prod, no email verification).
# The dev secret bundle (Stack keys etc., dogfood creds swapped to a DEDICATED CI
# test account) is provided as CMUXTERM_DEV_ENV_B64.
on:
  workflow_dispatch:
    inputs:
      ref: { description: Branch or SHA, required: false, default: "" }
  push:
    branches: [feat-ios-appstore-prod-lane]
    paths: [".github/workflows/ios-streamed-validate.yml"]

permissions:
  contents: read

jobs:
  validate:
    # Blacksmith macOS-26 (Xcode 26 / iOS 26 sims). Pinned directly rather than
    # via vars.MACOS_RUNNER_IOS: that repo var currently routes the iOS lane to a
    # Depot macOS image whose default Xcode is 16.4, under which cmux's iOS
    # targets fail to compile (Swift 6 actor-isolation + interpolation errors)
    # and the iPhone 17 sim does not exist. Blacksmith macos-26 ships Xcode 26.
    runs-on: blacksmith-6vcpu-macos-26
    timeout-minutes: 120
    env:
      CMUX_PORT: "3000"
      # GhosttyKit comes prebuilt; skip the ghostty CLI helper zig build.
      CMUX_SKIP_ZIG_BUILD: "1"
      SWIFT_BACKTRACE: "interactive=no,timeout=0s,symbolicate=off,color=no"
      # Web env required by web/app/env.ts but unused by sign-in/pairing.
      RESEND_API_KEY: "ci-dummy"
      CMUX_FEEDBACK_FROM_EMAIL: "ci@cmux.com"
      CMUX_FEEDBACK_RATE_LIMIT_ID: "ci-dummy"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
          submodules: recursive

      - name: Select Xcode
        # Canonical fleet selector: ranks by macOS SDK version (picks 26.x over
        # the old /Applications/Xcode.app 16.x symlink) and aligns the
        # xcode-select default. cmux's iOS + macOS targets need the Xcode 26
        # toolchain.
        run: ./scripts/select-ci-xcode.sh

      - name: Install zig
        run: ./scripts/install-zig-ci.sh

      - name: Ensure iOS simulator runtime
        run: xcrun simctl list runtimes available | grep -Eq '\biOS\b' || xcodebuild -downloadPlatform iOS

      - name: Provision GhosttyKit
        # Prefer the SHA-pinned prebuilt xcframework (the path ci.yml/reload-build
        # use); fall back to a local build only if the prebuilt is unavailable.
        run: ./scripts/download-prebuilt-ghosttykit.sh || ./scripts/ensure-ghosttykit.sh

      - name: Install tools (bun, idb, postgres)
        run: |
          set -euo pipefail
          command -v bun >/dev/null 2>&1 || curl -fsSL https://bun.sh/install | bash
          command -v postgres >/dev/null 2>&1 || brew install postgresql@16 || true
          command -v idb_companion >/dev/null 2>&1 || brew install idb-companion || true
          # fb-idb (the `idb` CLI) needs a Python it supports; the runner's default
          # python3 may be too new (3.14). Install it into a dedicated venv on a
          # pinned Python and put that venv's bin on PATH for later steps, so `idb`
          # resolves deterministically regardless of the system python.
          brew install python@3.12 || true
          PY312="$(brew --prefix python@3.12 2>/dev/null)/bin/python3.12"
          [ -x "$PY312" ] || PY312="$(command -v python3.12 || true)"
          [ -x "$PY312" ] || PY312="$(command -v python3.11 || true)"
          [ -x "$PY312" ] || PY312="python3"
          echo "using python for fb-idb: $PY312 ($($PY312 --version 2>&1))"
          "$PY312" -m venv /tmp/idbvenv
          /tmp/idbvenv/bin/pip install --quiet --upgrade pip
          /tmp/idbvenv/bin/pip install --quiet fb-idb
          echo "/tmp/idbvenv/bin" >> "$GITHUB_PATH"
          /tmp/idbvenv/bin/idb --version || true

      - name: Materialize dev secret bundle
        env:
          CMUXTERM_DEV_ENV_B64: ${{ secrets.CMUXTERM_DEV_ENV_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${CMUXTERM_DEV_ENV_B64:-}" ]; then
            echo "::error::CMUXTERM_DEV_ENV_B64 secret missing (dev Stack bundle + dedicated CI account)." >&2; exit 1
          fi
          mkdir -p "$HOME/.secrets"
          printf '%s' "$CMUXTERM_DEV_ENV_B64" | base64 --decode > "$HOME/.secrets/cmuxterm-dev.env"
          chmod 600 "$HOME/.secrets/cmuxterm-dev.env"

      - name: Stand up dev web backend (native Postgres + Next.js)
        run: |
          set -euo pipefail
          export PATH="$HOME/.bun/bin:/opt/homebrew/opt/postgresql@16/bin:$PATH"
          # Blacksmith macOS runners have no Docker, so run NATIVE Postgres on the
          # port/user/db db-local.sh would use (cmux:cmux@localhost:13000/cmux for
          # CMUX_PORT=3000 + offset 10000), then apply migrations with drizzle.
          export PGDATA=/tmp/cmuxpg PGPORT=13000
          rm -rf "$PGDATA"; mkdir -p "$PGDATA"
          initdb -U cmux -A trust "$PGDATA" >/dev/null
          pg_ctl -D "$PGDATA" -o "-p $PGPORT" -l /tmp/pg.log -w start
          createdb -h localhost -p "$PGPORT" -U cmux cmux
          export DATABASE_URL="postgres://cmux:cmux@localhost:${PGPORT}/cmux"
          export DIRECT_DATABASE_URL="$DATABASE_URL"
          cd web && bun install
          bunx drizzle-kit migrate --config drizzle.config.ts
          # load dev secrets (Stack keys + dedicated CI account); keep our DB url
          set -a; source scripts/load-dev-env.sh; set +a
          export DATABASE_URL="postgres://cmux:cmux@localhost:${PGPORT}/cmux"
          export DIRECT_DATABASE_URL="$DATABASE_URL"
          # Run next dev directly (NOT `bun dev`/dev-local.sh, which call the
          # Docker db-local.sh). Detach with nohup + disown (macOS has no setsid)
          # so the server survives into later steps.
          nohup bunx next dev --port 3000 > /tmp/webdev.log 2>&1 < /dev/null &
          disown || true
          for i in $(seq 1 90); do curl -fsS http://localhost:3000/ >/dev/null 2>&1 && break; sleep 4; done
          curl -fsS http://localhost:3000/handler/sign-in >/dev/null || { echo "=== webdev.log ==="; cat /tmp/webdev.log; exit 1; }

      - name: Build desktop Mac app (tag cistream)
        # --swift-frontend-workaround disables AArch64 GlobalISel (the codegen
        # path that produces the "undefined symbol: _abort/_free/..." link
        # failure under Xcode 26); this is exactly how reload-build.yml builds the
        # tagged dev app on the Blacksmith fleet.
        run: ./scripts/reload.sh --tag cistream --swift-frontend-workaround

      - name: Build + install iOS sim app (tag cistream)
        # Same GlobalISel workaround as the Mac build: the iOS sim build forces
        # -O/wholemodule, which hits the Xcode 26 codegen bug without it.
        run: ./ios/scripts/reload.sh --tag cistream --simulator "iPhone 17 Pro Max" --no-attach --swift-frontend-workaround

      - name: Pair simulator + capture one streamed terminal
        env:
          # Dedicated CI screenshot account (NOT a personal account). dev-secrets
          # resolution reads CMUX_DOGFOOD_STACK_* from the environment first, so
          # mobile-dev-launch signs the device in with this account.
          CMUX_DOGFOOD_STACK_EMAIL: ${{ secrets.CMUX_DOGFOOD_STACK_EMAIL }}
          CMUX_DOGFOOD_STACK_PASSWORD: ${{ secrets.CMUX_DOGFOOD_STACK_PASSWORD }}
        run: |
          set -euo pipefail
          export PATH="/tmp/idbvenv/bin:$HOME/.bun/bin:$PATH"
          # Prereqs: idb on PATH + the web backend still serving sign-in/pairing.
          command -v idb >/dev/null || { echo "::error::idb not on PATH"; exit 1; }
          idb --version || true
          curl -fsS http://localhost:3000/handler/sign-in >/dev/null || {
            echo "::error::web backend not reachable from capture step"; cat /tmp/webdev.log || true; exit 1; }
          SIM_ID="$(xcrun simctl list devices booted -j | python3 -c 'import sys,json;d=json.load(sys.stdin);print(next(x["udid"] for r in d["devices"].values() for x in r if "Pro Max" in x["name"]))')"
          echo "sim: $SIM_ID"
          xcrun simctl ui "$SIM_ID" appearance dark || true
          # Launch the tagged Mac app FIRST: mobile-dev-launch --ensure-mac mints
          # the pairing ticket from the running Mac app's pairing host, so it must
          # already be up or the device lands signed-in-only (never paired, no
          # workspaces to stream).
          MAC_APP="$(ls -d "$HOME/Library/Developer/Xcode/DerivedData/cmux-cistream/Build/Products/Debug/"*.app 2>/dev/null | head -1)"
          [ -n "$MAC_APP" ] || { echo "::error::tagged Mac app not found"; exit 1; }
          open "$MAC_APP"
          for i in $(seq 1 60); do CMUX_TAG=cistream ./scripts/cmux-debug-cli.sh identify >/dev/null 2>&1 && break; sleep 2; done
          CMUX_TAG=cistream ./scripts/cmux-debug-cli.sh identify >/dev/null 2>&1 || { echo "::error::tagged Mac app debug socket never came up"; exit 1; }
          # Sign in + pair the device to the tagged Mac. --detach returns after
          # launch (no --console-pty stdio attach, which would block the step).
          ./scripts/mobile-dev-launch.sh --tag cistream --simulator-id "$SIM_ID" --ensure-mac --detach
          # Let sign-in + pairing + the first stream frames settle.
          sleep 45
          mkdir -p /tmp/streamed-ci
          python3 ios/scripts/capture-streamed.py --tag cistream --sim-id "$SIM_ID" --agents opencode --out /tmp/streamed-ci
          echo "=== captured files ==="; ls -la /tmp/streamed-ci || true
          ls /tmp/streamed-ci/*.png >/dev/null 2>&1 || { echo "::error::no streamed screenshot was captured"; exit 1; }

      - name: Upload validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-streamed-validation
          path: |
            /tmp/streamed-ci
            /tmp/webdev.log
          if-no-files-found: warn
          retention-days: 7
