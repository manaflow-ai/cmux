name: cmux-tui build package

on:
  workflow_call:
    inputs:
      version:
        description: "npm package version, or the shared stable X.Y.Z version"
        required: true
        type: string
      pypi_version:
        description: "PyPI package version; defaults to version"
        required: false
        default: ""
        type: string
      package_npm:
        description: "Build and upload npm package directory artifacts"
        required: false
        default: true
        type: boolean
      package_pypi:
        description: "Build and upload PyPI wheel artifacts"
        required: false
        default: true
        type: boolean
      include_windows:
        description: "Also build and upload the experimental Windows artifact"
        required: false
        default: false
        type: boolean
      checkout_ref:
        description: "Optional git ref to build instead of the caller ref"
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            build_target: aarch64-apple-darwin
            runner: ${{ vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15' }}
            cross: false
            ext: ""
          - target: x86_64-apple-darwin
            build_target: x86_64-apple-darwin
            runner: ${{ vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15' }}
            cross: true
            ext: ""
          - target: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.28
            runner: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
            cross: true
            ext: ""
          - target: aarch64-unknown-linux-gnu
            build_target: aarch64-unknown-linux-gnu.2.28
            runner: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
            cross: true
            ext: ""
    steps:
      - name: Checkout caller ref
        if: inputs.checkout_ref == ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout requested ref
        if: inputs.checkout_ref != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref }}

      - name: Init ghostty submodule
        run: git submodule update --init --depth 1 ghostty

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils clang libclang-dev pkg-config

      - name: Install zig
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v2.0.5
        with:
          version: 0.15.2

      - name: Install Rust target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.cross == true
        shell: bash
        run: cargo install --locked cargo-zigbuild@0.20.0

      - name: Build cmux-tui (native)
        if: matrix.cross == false
        working-directory: cmux-tui
        shell: bash
        run: |
          # Package artifacts must build and stamp the checked-out submodule,
          # independent of any self-hosted runner source override.
          unset CMUX_GHOSTTY_SRC
          CMUX_TUI_BUILD_COMMIT="$(git -C .. rev-parse HEAD)"
          CMUX_TUI_GHOSTTY_COMMIT="$(git -C ../ghostty rev-parse HEAD)"
          CMUX_TUI_DISTRIBUTION_VERSION="${{ inputs.version }}"
          export CMUX_TUI_BUILD_COMMIT CMUX_TUI_GHOSTTY_COMMIT CMUX_TUI_DISTRIBUTION_VERSION
          if [[ "${{ inputs.package_npm }}" == "true" ]]; then
            CMUX_TUI_NPM_BOOTSTRAP_VERSION="${{ inputs.version }}"
            export CMUX_TUI_NPM_BOOTSTRAP_VERSION
          fi
          cargo build -p cmux-tui --bin cmux-tui --release --locked --target ${{ matrix.build_target }}
          cargo build -p cmux-relay --bin cmux-relay --release --locked --target ${{ matrix.build_target }}

      - name: Build cmux-tui (cross)
        if: matrix.cross == true
        working-directory: cmux-tui
        shell: bash
        run: |
          # Package artifacts must build and stamp the checked-out submodule,
          # independent of any self-hosted runner source override.
          unset CMUX_GHOSTTY_SRC
          CMUX_TUI_BUILD_COMMIT="$(git -C .. rev-parse HEAD)"
          CMUX_TUI_GHOSTTY_COMMIT="$(git -C ../ghostty rev-parse HEAD)"
          CMUX_TUI_DISTRIBUTION_VERSION="${{ inputs.version }}"
          export CMUX_TUI_BUILD_COMMIT CMUX_TUI_GHOSTTY_COMMIT CMUX_TUI_DISTRIBUTION_VERSION
          if [[ "${{ inputs.package_npm }}" == "true" ]]; then
            CMUX_TUI_NPM_BOOTSTRAP_VERSION="${{ inputs.version }}"
            export CMUX_TUI_NPM_BOOTSTRAP_VERSION
          fi
          cargo zigbuild -p cmux-tui --bin cmux-tui --release --locked --target ${{ matrix.build_target }}
          cargo zigbuild -p cmux-relay --bin cmux-relay --release --locked --target ${{ matrix.build_target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "cmux-tui/target/${{ matrix.target }}/release/cmux-tui${{ matrix.ext }}" "dist/cmux-tui-${{ matrix.target }}${{ matrix.ext }}"
          cp "cmux-tui/target/${{ matrix.target }}/release/cmux-relay${{ matrix.ext }}" "dist/cmux-relay-${{ matrix.target }}${{ matrix.ext }}"
          ls -la dist

      - name: Verify Linux glibc 2.28 compatibility
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python3 - \
            "dist/cmux-tui-${{ matrix.target }}${{ matrix.ext }}" \
            "dist/cmux-relay-${{ matrix.target }}${{ matrix.ext }}" <<'PY'
          import re
          import subprocess
          import sys

          baseline = (2, 28, 0)
          pattern = re.compile(r"GLIBC_(\d+)\.(\d+)(?:\.(\d+))?")
          for binary in sys.argv[1:]:
              output = subprocess.check_output(
                  ["readelf", "--wide", "--version-info", binary], text=True
              )
              versions = {
                  tuple(int(component or 0) for component in match.groups())
                  for match in pattern.finditer(output)
              }
              incompatible = sorted(version for version in versions if version > baseline)
              if incompatible:
                  formatted = ", ".join(".".join(map(str, version)) for version in incompatible)
                  raise SystemExit(f"{binary} requires glibc newer than 2.28: {formatted}")
              detected = ", ".join(".".join(map(str, version)) for version in sorted(versions))
              print(f"{binary}: glibc requirements [{detected}]")
          PY

      - name: Verify non-npm binaries disable SSH auto-install
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu' && inputs.package_npm == false
        shell: bash
        run: |
          CMUX_TUI_PROBE="$(dist/cmux-tui-${{ matrix.target }} remote-probe --json)"
          export CMUX_TUI_PROBE
          python3 - <<'PY'
          import json
          import os

          probe = json.loads(os.environ["CMUX_TUI_PROBE"])
          if probe.get("npm_bootstrap_version") is not None:
              raise SystemExit(
                  "non-npm binary unexpectedly advertises npm bootstrap version "
                  f"{probe.get('npm_bootstrap_version')!r}"
              )
          PY

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-tui-${{ matrix.target }}
          path: dist/cmux-tui-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

      - name: Upload relay binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-relay-${{ matrix.target }}
          path: dist/cmux-relay-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

  cloudflare-relay:
    name: Cloudflare Durable Object relay
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 30
    env:
      RUSTUP_TOOLCHAIN: "1.88.0"
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cmux-tui/relays/cloudflare-do
    steps:
      - name: Checkout caller ref
        if: inputs.checkout_ref == ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout requested ref
        if: inputs.checkout_ref != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: cmux-tui/relays/cloudflare-do/package-lock.json

      - name: Install pinned Rust toolchain and Worker builder
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component clippy --target wasm32-unknown-unknown
          cargo install --locked worker-build@0.8.5

      - name: Install pinned npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Test and lint relay
        run: |
          cargo test --locked
          cargo clippy --locked --all-targets -- -D warnings

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Build Worker
        run: npm run build

      - name: Validate Wrangler deployment bundle
        run: npx --no-install wrangler deploy --dry-run --outdir "$RUNNER_TEMP/cmux-cloudflare-relay"

  build-windows:
    name: build x86_64-pc-windows-gnu
    if: inputs.include_windows
    runs-on: ${{ vars.WINDOWS_RUNNER || 'windows-latest' }}
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout caller ref
        if: inputs.checkout_ref == ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout requested ref
        if: inputs.checkout_ref != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref }}

      - name: Init ghostty submodule
        run: git submodule update --init --depth 1 ghostty

      - name: Install zig
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v2.0.5
        with:
          version: 0.15.2

      - name: Install Rust target
        shell: bash
        run: |
          rustup target add x86_64-pc-windows-gnu
          printf '%s\n' 'C:\msys64\mingw64\bin' >> "$GITHUB_PATH"

      - name: Build libghostty-vt + cmux-tui (Windows GNU)
        shell: bash
        run: |
          # Keep the manual Zig build and Cargo's build script on the same
          # checked-out Ghostty source whose revision is stamped below.
          unset CMUX_GHOSTTY_SRC
          CMUX_TUI_BUILD_COMMIT="$(git rev-parse HEAD)"
          CMUX_TUI_GHOSTTY_COMMIT="$(git -C ghostty rev-parse HEAD)"
          CMUX_TUI_DISTRIBUTION_VERSION="${{ inputs.version }}"
          export CMUX_TUI_BUILD_COMMIT CMUX_TUI_GHOSTTY_COMMIT CMUX_TUI_DISTRIBUTION_VERSION
          if [[ "${{ inputs.package_npm }}" == "true" ]]; then
            CMUX_TUI_NPM_BOOTSTRAP_VERSION="${{ inputs.version }}"
            export CMUX_TUI_NPM_BOOTSTRAP_VERSION
          fi
          cd ghostty
          zig build -Demit-lib-vt=true -Demit-xcframework=false -Doptimize=ReleaseFast -Dtarget=x86_64-windows-gnu --prefix "$RUNNER_TEMP/ghostty-vt-win-gnu"
          cd ../cmux-tui
          cargo build -p cmux-tui --bin cmux-tui --release --locked --target x86_64-pc-windows-gnu

      - name: Verify remote commands fail clearly on Windows
        shell: bash
        run: |
          set +e
          output="$(cmux-tui/target/x86_64-pc-windows-gnu/release/cmux-tui.exe remote-probe --json 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          test "$status" -eq 1
          grep -F "remote daemon commands require Unix sockets" <<<"$output"

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "cmux-tui/target/x86_64-pc-windows-gnu/release/cmux-tui.exe" "dist/cmux-tui-x86_64-pc-windows-gnu.exe"
          ls -la dist

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-tui-x86_64-pc-windows-gnu
          path: dist/cmux-tui-x86_64-pc-windows-gnu.exe
          if-no-files-found: error

  package:
    name: package distributions
    needs: build
    if: inputs.package_npm || inputs.package_pypi
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      NPM_VERSION: ${{ inputs.version }}
      PYPI_VERSION: ${{ inputs.pypi_version != '' && inputs.pypi_version || inputs.version }}
    steps:
      - name: Checkout caller ref
        if: inputs.checkout_ref == ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout requested ref
        if: inputs.checkout_ref != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref }}

      - name: Download darwin arm64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: cmux-tui-aarch64-apple-darwin
          path: dist/binaries

      - name: Download darwin x64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: cmux-tui-x86_64-apple-darwin
          path: dist/binaries

      - name: Download linux x64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: cmux-tui-x86_64-unknown-linux-gnu
          path: dist/binaries

      - name: Download linux arm64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: cmux-tui-aarch64-unknown-linux-gnu
          path: dist/binaries

      - name: Build npm package directories
        if: inputs.package_npm
        run: |
          python3 cmux-tui/dist/scripts/package_npm.py \
            --binaries-dir dist/binaries \
            --version "$NPM_VERSION" \
            --out dist/npm-packages

      - name: Build PyPI wheels
        if: inputs.package_pypi
        run: |
          python3 cmux-tui/dist/scripts/package_pypi.py \
            --binaries-dir dist/binaries \
            --version "$PYPI_VERSION" \
            --out dist/pypi-wheels

      - name: Smoke verify npm packages
        if: inputs.package_npm
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import stat
          import sys

          version = os.environ["NPM_VERSION"]
          root = pathlib.Path("dist/npm-packages")
          platforms = {
              "cmux-tui-darwin-arm64": ("darwin", "arm64"),
              "cmux-tui-darwin-x64": ("darwin", "x64"),
              "cmux-tui-linux-x64": ("linux", "x64"),
              "cmux-tui-linux-arm64": ("linux", "arm64"),
          }
          launcher = json.loads((root / "cmux" / "package.json").read_text())
          deps = launcher.get("optionalDependencies", {})
          if deps != {name: version for name in platforms}:
              print(f"optionalDependencies mismatch: {deps}", file=sys.stderr)
              raise SystemExit(1)
          for name, (os_name, cpu) in platforms.items():
              package_json = json.loads((root / name / "package.json").read_text())
              if package_json["version"] != version:
                  raise SystemExit(f"{name}: version mismatch")
              if package_json["os"] != [os_name] or package_json["cpu"] != [cpu]:
                  raise SystemExit(f"{name}: os/cpu mismatch")
              binary = root / name / "bin" / "cmux-tui"
              if not binary.stat().st_mode & stat.S_IXUSR:
                  raise SystemExit(f"{binary} is not executable")
          PY
          chmod +x dist/binaries/cmux-tui-x86_64-unknown-linux-gnu
          dist/binaries/cmux-tui-x86_64-unknown-linux-gnu --version >/tmp/cmux-tui-version.txt 2>&1 || \
            dist/binaries/cmux-tui-x86_64-unknown-linux-gnu --help >/tmp/cmux-tui-version.txt 2>&1
          CMUX_TUI_PROBE="$(dist/binaries/cmux-tui-x86_64-unknown-linux-gnu remote-probe --json)"
          export CMUX_TUI_PROBE
          python3 - <<'PY'
          import json
          import os

          probe = json.loads(os.environ["CMUX_TUI_PROBE"])
          expected = os.environ["NPM_VERSION"]
          if probe.get("distribution_version") != expected:
              raise SystemExit(
                  f"binary distribution version {probe.get('distribution_version')!r} != {expected!r}"
              )
          if probe.get("npm_bootstrap_version") != expected:
              raise SystemExit(
                  f"binary npm bootstrap version {probe.get('npm_bootstrap_version')!r} != {expected!r}"
              )
          PY

      - name: Archive npm package directories with executable modes
        if: inputs.package_npm
        run: |
          python3 cmux-tui/dist/scripts/package_npm_artifact.py create \
            --packages-dir dist/npm-packages \
            --archive dist/npm-packages.tar.gz

      - name: Smoke verify PyPI wheels
        if: inputs.package_pypi
        run: |
          set -euo pipefail
          for wheel in dist/pypi-wheels/*.whl; do
            python3 -m zipfile -l "$wheel" >"/tmp/$(basename "$wheel").list"
          done
          chmod +x dist/binaries/cmux-tui-x86_64-unknown-linux-gnu
          dist/binaries/cmux-tui-x86_64-unknown-linux-gnu --version >/tmp/cmux-tui-version.txt 2>&1 || \
            dist/binaries/cmux-tui-x86_64-unknown-linux-gnu --help >/tmp/cmux-tui-version.txt 2>&1
          python3 -m venv /tmp/cmux-tui-wheel-smoke
          /tmp/cmux-tui-wheel-smoke/bin/python -m pip install --no-index --find-links dist/pypi-wheels cmux=="$PYPI_VERSION"
          /tmp/cmux-tui-wheel-smoke/bin/cmux --help >/tmp/cmux-help.txt
          grep -i usage /tmp/cmux-help.txt

      - name: Upload npm package directories
        if: inputs.package_npm
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-packages
          path: dist/npm-packages.tar.gz
          if-no-files-found: error

      - name: Upload PyPI wheels
        if: inputs.package_pypi
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pypi-wheels
          path: dist/pypi-wheels/*.whl
          if-no-files-found: error
