name: Cloud VM env audit

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA containing audit script
        required: false
        default: ""
      target:
        description: Audit target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      strict:
        description: Fail when required keys are missing or forbidden keys are present
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    environment: cloud-vm-${{ inputs.target }}
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Guard Vercel token
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::Missing cloud-vm-${{ inputs.target }} secret VERCEL_TOKEN"
            exit 1
          fi

      - name: Audit target env
        run: |
          set -euo pipefail
          args=("${{ inputs.target }}")
          if [ "${{ inputs.strict }}" = "true" ]; then
            args+=("--strict")
          fi
          bun run cloud-vm:env:audit -- "${args[@]}"
