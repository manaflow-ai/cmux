name: Release candidate macOS app

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable version to prepare, for example 0.64.0
        required: true
        type: string
      rc_number:
        description: Release candidate number, for example 1
        required: true
        default: "1"
        type: string
      candidate_ref:
        description: Commit SHA, tag, or branch to freeze
        required: true
        default: main
        type: string
      publish:
        description: Publish the RC prerelease and RC appcast
        required: true
        default: true
        type: boolean

concurrency:
  group: release-candidate-${{ inputs.version }}-${{ inputs.rc_number }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CREATE_DMG_VERSION: 8.0.0

jobs:
  build-sign-notarize-rc:
    runs-on: warp-macos-26-arm64-6x
    timeout-minutes: 35
    steps:
      - name: Checkout candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.candidate_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Validate release candidate inputs
        id: vars
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RC_NUMBER: ${{ inputs.rc_number }}
          INPUT_CANDIDATE_REF: ${{ inputs.candidate_ref }}
        run: |
          set -euo pipefail
          VERSION="$INPUT_VERSION"
          RC_NUMBER="$INPUT_RC_NUMBER"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must look like 0.64.0, got: $VERSION" >&2
            exit 1
          fi
          if ! [[ "$RC_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "rc_number must be an integer, got: $RC_NUMBER" >&2
            exit 1
          fi

          CANDIDATE_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          STABLE_TAG="v${VERSION}"
          RC_TAG="v${VERSION}-rc.${RC_NUMBER}"
          RUN_ATTEMPT="$(printf '%02d' "${GITHUB_RUN_ATTEMPT:-1}")"
          RC_BUILD="${GITHUB_RUN_ID}${RUN_ATTEMPT}"
          RC_MARKETING_VERSION="${VERSION}-rc.${RC_NUMBER}"

          {
            echo "VERSION=$VERSION"
            echo "RC_NUMBER=$RC_NUMBER"
            echo "CANDIDATE_SHA=$CANDIDATE_SHA"
            echo "SHORT_SHA=$SHORT_SHA"
            echo "STABLE_TAG=$STABLE_TAG"
            echo "RC_TAG=$RC_TAG"
            echo "RC_BUILD=$RC_BUILD"
            echo "RC_MARKETING_VERSION=$RC_MARKETING_VERSION"
          } >> "$GITHUB_ENV"
          {
            echo "version=$VERSION"
            echo "rc_number=$RC_NUMBER"
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "short_sha=$SHORT_SHA"
            echo "stable_tag=$STABLE_TAG"
            echo "rc_tag=$RC_TAG"
            echo "rc_build=$RC_BUILD"
            echo "rc_marketing_version=$RC_MARKETING_VERSION"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Release candidate"
            echo
            echo "- candidate ref: \`$INPUT_CANDIDATE_REF\`"
            echo "- candidate sha: \`$CANDIDATE_SHA\`"
            echo "- stable tag: \`$STABLE_TAG\`"
            echo "- rc tag: \`$RC_TAG\`"
            echo "- rc build: \`$RC_BUILD\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Guard existing RC tag and assets
        id: guard_rc_assets
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CANDIDATE_SHA: ${{ steps.vars.outputs.candidate_sha }}
          RC_TAG: ${{ steps.vars.outputs.rc_tag }}
          PUBLISH: ${{ inputs.publish }}
        with:
          script: |
            const { evaluateReleaseAssetGuard } = require('./scripts/release_asset_guard');
            const { owner, repo } = context.repo;
            const rcTag = process.env.RC_TAG;
            const candidateSha = process.env.CANDIDATE_SHA;
            const publish = process.env.PUBLISH === 'true';
            const immutableAssets = [
              'cmux-rc-macos.dmg',
              'appcast.xml',
              'cmuxd-remote-darwin-arm64',
              'cmuxd-remote-darwin-amd64',
              'cmuxd-remote-linux-arm64',
              'cmuxd-remote-linux-amd64',
              'cmuxd-remote-checksums.txt',
              'cmuxd-remote-manifest.json',
              'stable-candidate-cmux-macos.dmg',
              'stable-candidate-appcast.xml',
              'stable-candidate-cmuxd-remote-darwin-arm64',
              'stable-candidate-cmuxd-remote-darwin-amd64',
              'stable-candidate-cmuxd-remote-linux-arm64',
              'stable-candidate-cmuxd-remote-linux-amd64',
              'stable-candidate-cmuxd-remote-checksums.txt',
              'stable-candidate-cmuxd-remote-manifest.json',
            ];

            core.setOutput('skip_all', 'false');
            core.setOutput('skip_upload', publish ? 'false' : 'true');
            core.setOutput('appcast_source', 'build');

            try {
              const tagRef = await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${rcTag}`,
              });
              let tagSha = tagRef.data.object.sha;
              if (tagRef.data.object.type === 'tag') {
                const tagObject = await github.rest.git.getTag({
                  owner,
                  repo,
                  tag_sha: tagSha,
                });
                tagSha = tagObject.data.object.sha;
              }
              if (tagSha !== candidateSha) {
                core.setFailed(`Tag ${rcTag} already points to ${tagSha}, not ${candidateSha}. Cut a new RC number.`);
                return;
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (!publish) {
              core.notice('publish=false, release asset guard is in dry-run mode.');
              return;
            }

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: rcTag,
              });
              const existingAssetNames = (release.data.assets || []).map((asset) => asset.name);
              const {
                conflicts,
                missingImmutableAssets,
                guardState,
                hasPartialConflict,
                shouldSkipBuildAndUpload,
              } = evaluateReleaseAssetGuard({
                existingAssetNames,
                immutableAssetNames: immutableAssets,
              });

              if (hasPartialConflict) {
                core.setFailed(
                  `RC ${rcTag} has partial immutable assets. Existing: ${conflicts.join(', ')}. ` +
                  `Missing: ${missingImmutableAssets.join(', ')}. Resolve the prerelease assets manually.`
                );
                return;
              }

              if (shouldSkipBuildAndUpload) {
                core.notice(`RC ${rcTag} already has complete immutable assets. Reusing release appcast for R2 upload.`);
                core.setOutput('skip_all', 'true');
                core.setOutput('appcast_source', 'release');
                return;
              }

              core.notice(`RC ${rcTag} release exists with guard state ${guardState}; continuing.`);
            } catch (error) {
              if (error.status === 404) {
                core.notice(`RC ${rcTag} release does not exist yet; safe to build and publish.`);
                return;
              }
              throw error;
            }

      - name: Select Xcode
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort | tail -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Verify stable Sparkle build number
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: tests/test_ci_sparkle_build_monotonic.sh

      - name: Install build deps
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: |
          ./scripts/install-rust-ci.sh
          ./scripts/install-zig-ci.sh
          npm install --global "create-dmg@${CREATE_DMG_VERSION}"

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Cache Swift packages
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .spm-cache
          key: spm-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Setup Go
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: daemon/remote/go.mod
          cache-dependency-path: daemon/remote/go.sum

      - name: Derive Sparkle public key from private key
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Missing SPARKLE_PRIVATE_KEY secret" >&2
            exit 1
          fi
          DERIVED_PUBLIC_KEY=$(swift scripts/derive_sparkle_public_key.swift "$SPARKLE_PRIVATE_KEY")
          echo "SPARKLE_PUBLIC_KEY=$DERIVED_PUBLIC_KEY" >> "$GITHUB_ENV"

      - name: Build universal stable app payload
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: |
          xcodebuild -scheme cmux -configuration Release -derivedDataPath build-universal \
            -destination 'generic/platform=macOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO build

      - name: Verify binary architectures and version
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: |
          set -euo pipefail
          APP_PATH="build-universal/Build/Products/Release/cmux.app"
          APP_BINARY="$APP_PATH/Contents/MacOS/cmux"
          CLI_BINARY="$APP_PATH/Contents/Resources/bin/cmux"
          HELPER_BINARY="$APP_PATH/Contents/Resources/bin/ghostty"
          APP_ARCHS="$(lipo -archs "$APP_BINARY")"
          CLI_ARCHS="$(lipo -archs "$CLI_BINARY")"
          HELPER_ARCHS="$(lipo -archs "$HELPER_BINARY")"
          echo "App binary architectures: $APP_ARCHS"
          echo "CLI binary architectures: $CLI_ARCHS"
          echo "Ghostty helper architectures: $HELPER_ARCHS"
          [[ "$APP_ARCHS" == *arm64* && "$APP_ARCHS" == *x86_64* ]]
          [[ "$CLI_ARCHS" == *arm64* && "$CLI_ARCHS" == *x86_64* ]]
          [[ "$HELPER_ARCHS" == *arm64* && "$HELPER_ARCHS" == *x86_64* ]]

          APP_PLIST="$APP_PATH/Contents/Info.plist"
          BUILT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PLIST")
          if [ "$BUILT_VERSION" != "$VERSION" ]; then
            echo "Built app version $BUILT_VERSION does not match requested stable version $VERSION" >&2
            echo "Run ./scripts/bump-version.sh before cutting this RC." >&2
            exit 1
          fi

      - name: Prepare stable and RC app metadata
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: |
          set -euo pipefail
          APP_DIR="build-universal/Build/Products/Release"
          STABLE_APP="$APP_DIR/cmux.app"
          RC_APP="$APP_DIR/cmux RC.app"

          inject_sparkle() {
            local plist="$1"
            local feed_url="$2"
            /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "$plist" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Delete :SUFeedURL" "$plist" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Add :SUPublicEDKey string ${SPARKLE_PUBLIC_KEY}" "$plist"
            /usr/libexec/PlistBuddy -c "Add :SUFeedURL string ${feed_url}" "$plist"
            /usr/libexec/PlistBuddy -c "Delete :CMUXCommit" "$plist" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Add :CMUXCommit string ${SHORT_SHA}" "$plist"
          }

          inject_sparkle \
            "$STABLE_APP/Contents/Info.plist" \
            "https://github.com/manaflow-ai/cmux/releases/latest/download/appcast.xml"

          rm -rf "$RC_APP"
          ditto "$STABLE_APP" "$RC_APP"
          RC_PLIST="$RC_APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName cmux RC" "$RC_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName cmux RC" "$RC_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.cmuxterm.app.rc" "$RC_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${RC_MARKETING_VERSION}" "$RC_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${RC_BUILD}" "$RC_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon-RC" "$RC_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon-RC" "$RC_PLIST"

          url_type_name="$(/usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes:1:CFBundleURLName" "$RC_PLIST")"
          if [[ "$url_type_name" != *.auth ]]; then
            echo "Expected CFBundleURLTypes[1] to be the auth URL type, found: $url_type_name" >&2
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleURLTypes:1:CFBundleURLSchemes:0 cmux-rc" "$RC_PLIST"
          ./scripts/compile-app-icon-icns.sh \
            Assets.xcassets/AppIcon-RC.appiconset \
            "$RC_APP/Contents/Resources/AppIcon-RC.icns"
          inject_sparkle "$RC_PLIST" "https://files.cmux.com/rc/appcast.xml"

          ./scripts/verify-app-bundle-channel-metadata.sh "$STABLE_APP" stable
          ./scripts/verify-app-bundle-channel-metadata.sh "$RC_APP" rc

      - name: Build remote daemon assets and inject manifests
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: |
          set -euo pipefail
          ./scripts/build_remote_daemon_release_assets.sh \
            --version "$VERSION" \
            --release-tag "$STABLE_TAG" \
            --repo "manaflow-ai/cmux" \
            --output-dir "remote-daemon-assets-stable"
          STABLE_MANIFEST_JSON="$(python3 -c 'import json,sys; print(json.dumps(json.load(open(sys.argv[1], encoding="utf-8")), separators=(",",":")))' remote-daemon-assets-stable/cmuxd-remote-manifest.json)"
          STABLE_PLIST="build-universal/Build/Products/Release/cmux.app/Contents/Info.plist"
          plutil -remove CMUXRemoteDaemonManifestJSON "$STABLE_PLIST" >/dev/null 2>&1 || true
          plutil -insert CMUXRemoteDaemonManifestJSON -string "$STABLE_MANIFEST_JSON" "$STABLE_PLIST"

          ./scripts/build_remote_daemon_release_assets.sh \
            --version "$RC_MARKETING_VERSION" \
            --release-tag "$RC_TAG" \
            --repo "manaflow-ai/cmux" \
            --output-dir "remote-daemon-assets-rc"
          RC_MANIFEST_JSON="$(python3 -c 'import json,sys; print(json.dumps(json.load(open(sys.argv[1], encoding="utf-8")), separators=(",",":")))' remote-daemon-assets-rc/cmuxd-remote-manifest.json)"
          RC_PLIST="build-universal/Build/Products/Release/cmux RC.app/Contents/Info.plist"
          plutil -remove CMUXRemoteDaemonManifestJSON "$RC_PLIST" >/dev/null 2>&1 || true
          plutil -insert CMUXRemoteDaemonManifestJSON -string "$RC_MANIFEST_JSON" "$RC_PLIST"

      - name: Run CLI version memory guard regression
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: |
          set -euo pipefail
          CLI_BINARY="build-universal/Build/Products/Release/cmux.app/Contents/Resources/bin/cmux"
          [ -x "$CLI_BINARY" ] || { echo "cmux CLI binary not found at $CLI_BINARY" >&2; exit 1; }
          CMUX_CLI_BIN="$CLI_BINARY" python3 tests/test_cli_version_memory_guard.py

      - name: Import signing cert
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "Missing APPLE_CERTIFICATE_BASE64 secret" >&2
            exit 1
          fi
          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "Missing APPLE_CERTIFICATE_PASSWORD secret" >&2
            exit 1
          fi
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Embed stable provisioning profile
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        env:
          APPLE_RELEASE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_RELEASE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_RELEASE_PROVISIONING_PROFILE_BASE64" ]; then
            echo "Missing APPLE_RELEASE_PROVISIONING_PROFILE_BASE64 secret" >&2
            exit 1
          fi
          APP_PATH="build-universal/Build/Products/Release/cmux.app"
          PROFILE_PATH="$APP_PATH/Contents/embedded.provisionprofile"
          TMP_PROFILE="$(mktemp /tmp/cmux-release-profile.XXXXXX)"
          TMP_PLIST="$(mktemp /tmp/cmux-release-profile.XXXXXX.plist)"
          trap 'rm -f "$TMP_PROFILE" "$TMP_PLIST"' EXIT
          echo "$APPLE_RELEASE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$TMP_PROFILE"
          security cms -D -i "$TMP_PROFILE" > "$TMP_PLIST"
          APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.application-identifier" "$TMP_PLIST")"
          if [ "$APP_ID" != "7WLXT3NR37.com.cmuxterm.app" ]; then
            echo "Release provisioning profile targets unexpected app ID: $APP_ID" >&2
            exit 1
          fi
          WEBAUTHN_ENTITLEMENT="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.web-browser.public-key-credential" "$TMP_PLIST")"
          if [ "$WEBAUTHN_ENTITLEMENT" != "true" ]; then
            echo "Release provisioning profile missing WebAuthn browser entitlement" >&2
            exit 1
          fi
          PROVISIONS_ALL_DEVICES="$(/usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" "$TMP_PLIST")"
          if [ "$PROVISIONS_ALL_DEVICES" != "true" ]; then
            echo "Release provisioning profile is not a Developer ID all-devices profile" >&2
            exit 1
          fi
          cp "$TMP_PROFILE" "$PROFILE_PATH"

      - name: Embed RC provisioning profile
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        env:
          APPLE_RC_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_RC_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_RC_PROVISIONING_PROFILE_BASE64" ]; then
            echo "Missing APPLE_RC_PROVISIONING_PROFILE_BASE64 secret" >&2
            exit 1
          fi
          APP_PATH="build-universal/Build/Products/Release/cmux RC.app"
          PROFILE_PATH="$APP_PATH/Contents/embedded.provisionprofile"
          TMP_PROFILE="$(mktemp /tmp/cmux-rc-profile.XXXXXX)"
          TMP_PLIST="$(mktemp /tmp/cmux-rc-profile.XXXXXX.plist)"
          trap 'rm -f "$TMP_PROFILE" "$TMP_PLIST"' EXIT
          echo "$APPLE_RC_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$TMP_PROFILE"
          security cms -D -i "$TMP_PROFILE" > "$TMP_PLIST"
          APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.application-identifier" "$TMP_PLIST")"
          if [ "$APP_ID" != "7WLXT3NR37.com.cmuxterm.app.rc" ]; then
            echo "RC provisioning profile targets unexpected app ID: $APP_ID" >&2
            exit 1
          fi
          WEBAUTHN_ENTITLEMENT="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.web-browser.public-key-credential" "$TMP_PLIST")"
          if [ "$WEBAUTHN_ENTITLEMENT" != "true" ]; then
            echo "RC provisioning profile is missing WebAuthn browser entitlement" >&2
            exit 1
          fi
          PROVISIONS_ALL_DEVICES="$(/usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" "$TMP_PLIST")"
          if [ "$PROVISIONS_ALL_DEVICES" != "true" ]; then
            echo "RC provisioning profile is not a Developer ID all-devices profile" >&2
            exit 1
          fi
          cp "$TMP_PROFILE" "$PROFILE_PATH"

      - name: Codesign apps
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Missing APPLE_SIGNING_IDENTITY secret" >&2
            exit 1
          fi
          ./scripts/sign-cmux-bundle.sh \
            "build-universal/Build/Products/Release/cmux.app" \
            cmux.release.entitlements \
            "$APPLE_SIGNING_IDENTITY"
          ./scripts/sign-cmux-bundle.sh \
            "build-universal/Build/Products/Release/cmux RC.app" \
            cmux.rc.entitlements \
            "$APPLE_SIGNING_IDENTITY"

      - name: Notarize apps and create DMGs
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Missing notarization secrets (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID)" >&2
            exit 1
          fi

          notarize_and_package() {
            local app_path="$1"
            local channel="$2"
            local dmg_release="$3"
            local zip_submit="${dmg_release%.dmg}-notary.zip"
            local dmg_tmp_dir
            local created_dmg

            ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_submit"
            APP_SUBMIT_JSON="$(xcrun notarytool submit "$zip_submit" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)"
            APP_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$APP_SUBMIT_JSON")"
            APP_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$APP_SUBMIT_JSON")"
            if [ "$APP_STATUS" != "Accepted" ]; then
              echo "App notarization failed for $app_path with status: $APP_STATUS" >&2
              xcrun notarytool log "$APP_SUBMIT_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi
            xcrun stapler staple "$app_path"
            xcrun stapler validate "$app_path"
            spctl -a -vv --type execute "$app_path"
            ./scripts/smoke-launch-macos-app.sh "$app_path"
            ./scripts/verify-app-bundle-channel-metadata.sh "$app_path" "$channel"
            rm -f "$zip_submit"

            dmg_tmp_dir="$(mktemp -d)"
            create-dmg \
              --identity="$APPLE_SIGNING_IDENTITY" \
              "$app_path" \
              "$dmg_tmp_dir"
            created_dmg="$(find "$dmg_tmp_dir" -maxdepth 1 -name '*.dmg' | head -n 1)"
            if [ -z "$created_dmg" ]; then
              echo "Failed to locate created DMG for $app_path" >&2
              exit 1
            fi
            mv "$created_dmg" "$dmg_release"
            rm -rf "$dmg_tmp_dir"

            DMG_SUBMIT_JSON="$(xcrun notarytool submit "$dmg_release" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)"
            DMG_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$DMG_SUBMIT_JSON")"
            DMG_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$DMG_SUBMIT_JSON")"
            if [ "$DMG_STATUS" != "Accepted" ]; then
              echo "DMG notarization failed for $dmg_release with status: $DMG_STATUS" >&2
              xcrun notarytool log "$DMG_SUBMIT_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi
            xcrun stapler staple "$dmg_release"
            xcrun stapler validate "$dmg_release"
          }

          notarize_and_package \
            "build-universal/Build/Products/Release/cmux.app" \
            stable \
            "cmux-macos.dmg"
          notarize_and_package \
            "build-universal/Build/Products/Release/cmux RC.app" \
            rc \
            "cmux-rc-macos.dmg"

      - name: Upload dSYMs to Sentry
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: manaflow
          SENTRY_PROJECT: cmuxterm-macos
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set, skipping dSYM upload"
            exit 0
          fi
          brew install getsentry/tools/sentry-cli || true
          sentry-cli debug-files upload --include-sources build-universal/Build/Products/Release/

      - name: Generate Sparkle appcasts
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Missing SPARKLE_PRIVATE_KEY secret" >&2
            exit 1
          fi
          ./scripts/sparkle_generate_appcast.sh cmux-rc-macos.dmg "$RC_TAG" appcast.xml
          ./scripts/sparkle_generate_appcast.sh cmux-macos.dmg "$STABLE_TAG" appcast-stable.xml

      - name: Prepare stable candidate release asset copies
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        run: |
          set -euo pipefail
          mkdir -p stable-candidate-assets
          cp cmux-macos.dmg stable-candidate-assets/stable-candidate-cmux-macos.dmg
          cp appcast-stable.xml stable-candidate-assets/stable-candidate-appcast.xml
          for asset in remote-daemon-assets-stable/cmuxd-remote-*; do
            cp "$asset" "stable-candidate-assets/stable-candidate-$(basename "$asset")"
          done

      - name: Attest remote daemon assets
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            remote-daemon-assets-rc/cmuxd-remote-darwin-arm64
            remote-daemon-assets-rc/cmuxd-remote-darwin-amd64
            remote-daemon-assets-rc/cmuxd-remote-linux-arm64
            remote-daemon-assets-rc/cmuxd-remote-linux-amd64
            remote-daemon-assets-rc/cmuxd-remote-checksums.txt
            remote-daemon-assets-rc/cmuxd-remote-manifest.json
            remote-daemon-assets-stable/cmuxd-remote-darwin-arm64
            remote-daemon-assets-stable/cmuxd-remote-darwin-amd64
            remote-daemon-assets-stable/cmuxd-remote-linux-arm64
            remote-daemon-assets-stable/cmuxd-remote-linux-amd64
            remote-daemon-assets-stable/cmuxd-remote-checksums.txt
            remote-daemon-assets-stable/cmuxd-remote-manifest.json

      - name: Upload workflow artifacts
        if: steps.guard_rc_assets.outputs.skip_all != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cmux-rc-${{ steps.vars.outputs.version }}-rc-${{ steps.vars.outputs.rc_number }}
          path: |
            cmux-rc-macos.dmg
            appcast.xml
            remote-daemon-assets-rc/cmuxd-remote-*
            cmux-macos.dmg
            appcast-stable.xml
            remote-daemon-assets-stable/cmuxd-remote-*
            stable-candidate-assets/stable-candidate-*
          if-no-files-found: error

      - name: Create or verify RC tag
        if: steps.guard_rc_assets.outputs.skip_upload != 'true'
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RC_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RC_TAG:refs/tags/$RC_TAG" --force
            TAG_SHA="$(git rev-list -n 1 "$RC_TAG")"
            if [ "$TAG_SHA" != "$CANDIDATE_SHA" ]; then
              echo "Tag $RC_TAG points to $TAG_SHA, not $CANDIDATE_SHA" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$RC_TAG" "$CANDIDATE_SHA"
            git push origin "refs/tags/$RC_TAG"
          fi

      - name: Publish RC prerelease assets
        if: steps.guard_rc_assets.outputs.skip_all != 'true' && steps.guard_rc_assets.outputs.skip_upload != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.vars.outputs.rc_tag }}
          target_commitish: ${{ steps.vars.outputs.candidate_sha }}
          name: cmux ${{ steps.vars.outputs.version }} RC ${{ steps.vars.outputs.rc_number }}
          prerelease: true
          make_latest: false
          body: |
            Release candidate for `${{ steps.vars.outputs.stable_tag }}` built from `${{ steps.vars.outputs.candidate_sha }}`.

            **cmux RC**
            - bundle ID `com.cmuxterm.app.rc`
            - appcast feed `https://files.cmux.com/rc/appcast.xml`
            - download `cmux-rc-macos.dmg`

            **Stable candidate**
            - built, signed, and notarized in this same workflow run
            - stored as `stable-candidate-*` assets for promotion without rebuild
          files: |
            cmux-rc-macos.dmg
            appcast.xml
            remote-daemon-assets-rc/cmuxd-remote-*
            stable-candidate-assets/stable-candidate-*
          overwrite_files: false

      - name: Upload RC appcast to R2
        if: steps.guard_rc_assets.outputs.skip_upload != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: "https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          APPCAST_SOURCE: ${{ steps.guard_rc_assets.outputs.appcast_source }}
        run: |
          set -euo pipefail
          command -v aws >/dev/null 2>&1 || { echo "Installing AWS CLI..."; brew install awscli; }
          if [ "${APPCAST_SOURCE:-build}" = "release" ]; then
            rm -f appcast.xml
            gh release download "$RC_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern appcast.xml \
              --dir .
          fi
          test -s appcast.xml
          RC_RELEASE_TAGS="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --exclude-drafts \
            --json tagName,isPrerelease -q '.[] | select(.isPrerelease) | .tagName')"
          LATEST_RC="$(printf '%s\n' "$RC_RELEASE_TAGS" \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' \
            | sort -V \
            | tail -1 || true)"
          if [ -n "$LATEST_RC" ] && [ "$LATEST_RC" != "$RC_TAG" ]; then
            echo "Skipping RC appcast upload: $RC_TAG is not the latest RC release ($LATEST_RC)"
            exit 0
          fi

          aws s3 cp appcast.xml \
            "s3://cmux-binaries/rc/appcast.xml" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache, no-store, must-revalidate"
          echo "R2 appcast upload complete: https://files.cmux.com/rc/appcast.xml"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          rm -f /tmp/cert.p12
