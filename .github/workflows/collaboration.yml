# CI/CD for the cmux Multiplayer collaboration relay (workers/collaboration).
#
# PRs touching the service run typecheck + unit tests + a wrangler dry-run
# build. Pushes to main additionally deploy to Cloudflare. `wrangler deploy`
# applies the Durable Object migrations declared in wrangler.toml atomically
# with the code upload, so the service's schema can never lag a deploy.
#
# Required repository secrets (deploy job):
#   CLOUDFLARE_API_TOKEN   API token with Workers Scripts:Edit on the account
#   CLOUDFLARE_ACCOUNT_ID  the Cloudflare account id

name: collaboration

on:
  pull_request:
    paths:
      - "workers/collaboration/**"
      - ".github/workflows/collaboration.yml"
  push:
    branches: [main]
    paths:
      - "workers/collaboration/**"
      - ".github/workflows/collaboration.yml"
  workflow_dispatch:
    inputs:
      relay_url:
        description: "Relay URL to smoke-test"
        required: false
        default: "https://collaboration.cmux.dev"

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Wrangler requires Node >= 22; the Blacksmith ubuntu-2404 image ships
      # Node 20, so pin it explicitly instead of relying on the runner's
      # ambient version.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --cwd workers/collaboration --frozen-lockfile

      - name: Typecheck
        run: bun run --cwd workers/collaboration typecheck

      - name: Unit tests
        run: bun run --cwd workers/collaboration test

      - name: Wrangler dry-run build
        run: bun run --cwd workers/collaboration check

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    concurrency:
      group: collaboration-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --cwd workers/collaboration --frozen-lockfile

      - name: Check Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=()
          [ -n "$CLOUDFLARE_API_TOKEN" ] || missing+=(CLOUDFLARE_API_TOKEN)
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || missing+=(CLOUDFLARE_ACCOUNT_ID)
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Collaboration deploy needs repository secrets ${missing[*]}." \
              "Create an API token with Workers Scripts:Edit on the Cloudflare account" \
              "and add both secrets in repo Settings -> Secrets and variables -> Actions" \
              "(see workers/collaboration/README.md, Deploy)."
            exit 1
          fi

      - name: Deploy (applies DO migrations atomically)
        run: bun run --cwd workers/collaboration deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke production relay create/connect
        run: bun run --cwd workers/collaboration smoke:relay
        env:
          CMUX_COLLABORATION_RELAY_URL: https://collaboration.cmux.dev

  live-smoke:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --cwd workers/collaboration --frozen-lockfile

      - name: Smoke relay create/connect
        run: bun run --cwd workers/collaboration smoke:relay
        env:
          CMUX_COLLABORATION_RELAY_URL: ${{ inputs.relay_url }}
