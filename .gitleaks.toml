# gitleaks configuration for the cmux repository.
#
# Why this exists (https://github.com/manaflow-ai/cmux/issues/5978):
# the Sentry-scrubber test suites and one doc-comment example deliberately embed
# token-shaped strings (PEM blocks, ghp_/sk-/JWT/AWS samples) so the scrubber can
# prove it redacts them. Those are fixtures, not leaks. Left unannotated they
# dominate a secret scan and make a *real* leak hard to spot, which defeats the
# point of scanning.
#
# This config EXTENDS gitleaks' default rule set (so real secrets still fail) and
# adds a narrow, individually-justified allowlist. Every entry is scoped to a
# specific file — and, for non-fixture source files, to the specific known-public
# value — so it can never blanket-ignore an entire language or test tree.
#
# gitleaks auto-loads this file when it sits at the scan root, so external review
# tools that run `gitleaks` over the checkout honor it automatically.
#
# Reproduce locally:  ./scripts/secret-scan.sh   (see docs/secret-scanning.md)

title = "cmux gitleaks config"

[extend]
# Inherit every built-in rule so real credentials still fail the scan.
useDefault = true

# ---------------------------------------------------------------------------
# Scan scope. Vendored, generated, and submodule trees are not cmux source:
# the ghostty submodule is a separate upstream repo with its own scanning, and
# node_modules / .build / DerivedData / vendor are third-party or generated.
# Excluding them keeps the scan about code we actually own.
# ---------------------------------------------------------------------------
[[allowlists]]
description = "Vendored, generated, and submodule trees (not cmux source)"
paths = [
  '''(^|/)ghostty/''',
  '''(^|/)node_modules/''',
  '''(^|/)\.build/''',
  '''(^|/)DerivedData/''',
  '''(^|/)vendor/''',
]

# This config necessarily embeds the very token-shaped literals it allowlists
# (the `token=sk-...` doc placeholder, the publishable keys). `gitleaks dir`
# scans the working tree, and a run that does NOT load this file as its config
# (e.g. an external tool with its own config) would otherwise flag those literals
# here. Allowlist the config by path so the scan never depends on default rules
# happening not to match its own contents; by construction it holds only
# synthetic / public-by-design values.
[[allowlists]]
description = "The gitleaks config itself (holds only synthetic/public allowlisted literals)"
paths = ['''(^|/)\.gitleaks\.toml$''']

# ---------------------------------------------------------------------------
# issue #5978 — intentional Sentry-scrubber redaction fixtures.
# These files exist solely to feed token-shaped inputs through the scrubber and
# assert the output is redacted. Every "secret" in them is a deliberate sample.
# ---------------------------------------------------------------------------
[[allowlists]]
description = "Sentry-scrubber redaction test fixtures (issue #5978)"
paths = [
  '''Packages/CmuxFoundation/Tests/CmuxFoundationTests/ScrubberDenylistsTests\.swift''',
  '''Packages/CmuxFoundation/Tests/CmuxFoundationTests/SentryScrubberTests\.swift''',
  '''cmuxTests/SentryEventScrubberTests\.swift''',
]

# The scrubber's own doc-comment shows a `token=sk-...` redaction example. Scope
# to that one source file AND the exact placeholder, so a *real* key added to
# this file would still fail the scan.
[[allowlists]]
description = "SentryScrubber doc-comment example token (issue #5978)"
condition = "AND"
regexTarget = "line"
paths = ['''Packages/CmuxFoundation/Sources/CmuxFoundation/SentryScrubber\.swift''']
regexes = ['''token=sk-abc123def456ghij''']

# ---------------------------------------------------------------------------
# Other intentional, synthetic test-only tokens (not real credentials):
#   - attach-ticket JSON coding round-trip fixture
#   - diff-viewer URL token (a UUID) exercised by DiffComments tests
#   - websocket-lease fuzz seed corpus (a sha256 hex literal)
#   - command-palette focus probe marker
#   - relay CLI token hex (an obviously-synthetic incrementing hex literal)
# ---------------------------------------------------------------------------
[[allowlists]]
description = "Synthetic test-only tokens (attach-ticket / diff-viewer / fuzz seed / focus probe / relay token)"
paths = [
  '''Packages/CMUXMobileCore/Tests/CMUXMobileCoreTests/CmxAttachTicketCompactCoderTests\.swift''',
  '''cmuxTests/DiffCommentStoreTests\.swift''',
  '''daemon/remote/cmd/cmuxd-remote/ws_pty_fuzz_test\.go''',
  '''tests_v2/test_command_palette_focus\.py''',
  '''Packages/CmuxRemoteWorkspace/Tests/CmuxRemoteWorkspaceTests/RemoteCLIRelayServerTests\.swift''',
]

# ---------------------------------------------------------------------------
# Embedded public/publishable keys and non-secret env references. These ship in
# clients by design (publishable keys) or are plain variable references, not
# hardcoded secrets. Each is scoped to the exact file AND value, so a real
# secret added to the same file is still caught.
# ---------------------------------------------------------------------------
# Both the dev and prod publishable keys appear in BOTH files (AuthConfig.swift
# and AuthEnvironment.swift each define dev + prod), so this AND block covers all
# four (file x key) occurrences by design. A real, *non-publishable* secret added
# to either file still fails, because it won't match these exact public values.
[[allowlists]]
description = "Stack Auth publishable client keys (public by design)"
condition = "AND"
regexTarget = "line"
paths = [
  '''Packages/CmuxAuthRuntime/Sources/CmuxAuthRuntime/Coordinator/AuthConfig\.swift''',
  '''Sources/Auth/AuthEnvironment\.swift''',
]
regexes = [
  '''pck_xb63160bwe9699vtxfzfj6emmxpafg5mkjrtp6ehzxv5g''',
  '''pck_kzj80gx4mh2jrzn1cx6y5e8jk0kwa01vkevh2p9zd4twr''',
]

[[allowlists]]
description = "PostHog project API key (public, intentionally embedded in the client)"
condition = "AND"
regexTarget = "line"
paths = ['''Sources/PostHogAnalytics\.swift''']
regexes = ['''phc_opOVu7oFzR9wD3I6ZahFGOV2h3mqGpl5EHyQvmHciDP''']

[[allowlists]]
description = "APNs key env-var reference (not a hardcoded secret)"
condition = "AND"
regexTarget = "line"
paths = ['''web/app/api/notifications/push/route\.ts''']
regexes = ['''env\.CMUX_APNS_KEY_P8''']
