version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@1

jobs:
  classify-ci-trust:
    executor: continuation/default
    steps:
      - checkout
      - run:
          name: Decide CircleCI approval gate
          command: ./scripts/circleci-trust-parameters.sh /tmp/continue-params.json
          environment:
            CIRCLECI_PIPELINE_BRANCH: "<< pipeline.git.branch >>"
            CIRCLECI_PIPELINE_SENDER_LOGIN: "<< pipeline.event.github.sender.login >>"
            CIRCLECI_TRUSTED_GITHUB_ORG: manaflow-ai
            CIRCLECI_TRUSTED_GITHUB_USERS: lawrencecchen,austyinywang
      - continuation/continue:
          configuration_path: .circleci/continue_config.yml
          parameters: /tmp/continue-params.json

workflows:
  setup:
    jobs:
      - classify-ci-trust
