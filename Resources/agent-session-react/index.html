<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>cmux Agent Session</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <style>
:root {
  color-scheme: dark;
  font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  color: var(--agent-text, #f1f0e8);
  background: transparent;
  --agent-page-bg: transparent;
  --agent-surface: rgba(28, 31, 27, 0.34);
  --agent-surface-elevated: rgba(28, 31, 27, 0.48);
  --agent-input-bg: rgba(8, 10, 8, 0.36);
  --agent-border: rgba(233, 231, 216, 0.12);
  --agent-border-strong: rgba(233, 231, 216, 0.22);
  --agent-text: #f1f0e8;
  --agent-muted: rgba(241, 240, 232, 0.58);
  --agent-soft: rgba(241, 240, 232, 0.78);
  --agent-accent: #8ab4f8;
  --agent-accent-soft: rgba(138, 180, 248, 0.2);
  --agent-danger: #ff8d7e;
  --agent-shadow: rgba(0, 0, 0, 0.2);
  --agent-card: color-mix(in srgb, var(--agent-surface) 86%, transparent);
  --agent-card-hover: color-mix(in srgb, var(--agent-surface-elevated) 82%, transparent);
  --agent-control: color-mix(in srgb, var(--agent-input-bg) 72%, transparent);
  --agent-control-hover: color-mix(in srgb, var(--agent-input-bg) 88%, transparent);
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  height: 100%;
  background: transparent;
}

body {
  margin: 0;
  min-width: 0;
  overflow: hidden;
  color: var(--agent-text);
}

button,
select,
textarea {
  font: inherit;
}

button,
select {
  cursor: default;
}

.agent-shell {
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  height: 100%;
  min-height: 100%;
  padding: 14px 16px;
  color: var(--agent-text);
  background: var(--agent-page-bg);
}

.log {
  overflow: auto;
  min-height: 0;
  width: min(100%, 52rem);
  margin: 0 auto;
  padding: 6px 2px 18px;
  background: transparent;
  scrollbar-width: thin;
}

.log-line {
  display: grid;
  grid-template-columns: 4.5rem minmax(0, 1fr);
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--agent-border) 55%, transparent);
  color: var(--agent-soft);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 12px;
  line-height: 1.5;
}

.log-line:last-child {
  border-bottom-color: transparent;
}

.log-label {
  overflow: hidden;
  color: var(--agent-muted);
  text-overflow: ellipsis;
  text-transform: uppercase;
}

.log-line.stdout .log-label {
  color: var(--agent-accent);
}

.log-line.stderr .log-label,
.log-line.error .log-label {
  color: var(--agent-danger);
}

.log-text {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
  word-break: normal;
}

.composer-stack {
  display: grid;
  gap: 6px;
  width: min(100%, 52rem);
  margin: 0 auto;
}

.composer {
  width: 100%;
  min-width: 0;
  margin: 0;
}

.composer-frame {
  width: 100%;
  padding: 1px;
  border-radius: 22px;
  background:
    linear-gradient(
      180deg,
      color-mix(in srgb, var(--agent-border-strong) 82%, transparent),
      color-mix(in srgb, var(--agent-border) 72%, transparent)
    );
  box-shadow: 0 18px 48px color-mix(in srgb, var(--agent-shadow) 75%, transparent);
}

.composer-surface {
  display: grid;
  min-height: 132px;
  border: 1px solid color-mix(in srgb, var(--agent-border) 82%, transparent);
  border-radius: 20px;
  color: var(--agent-text);
  background: var(--agent-card);
  -webkit-backdrop-filter: blur(22px) saturate(1.18);
  backdrop-filter: blur(22px) saturate(1.18);
  transition:
    border-color 160ms ease,
    background-color 160ms ease;
}

.composer-surface:focus-within {
  border-color: color-mix(in srgb, var(--agent-accent) 42%, var(--agent-border-strong));
  background: var(--agent-card-hover);
}

.composer-body {
  min-width: 0;
  padding: 14px 16px 8px;
}

.prompt-input {
  display: block;
  width: 100%;
  min-height: 72px;
  max-height: 176px;
  resize: none;
  padding: 0;
  border: 0;
  outline: none;
  color: var(--agent-text);
  background: transparent;
  font-size: 14px;
  line-height: 1.55;
}

.prompt-input::placeholder {
  color: color-mix(in srgb, var(--agent-muted) 72%, transparent);
}

.composer-footer,
.codex-left-rail,
.codex-right-rail,
.model-picker,
.rate-line {
  display: flex;
  align-items: center;
}

.composer-footer {
  min-width: 0;
  justify-content: space-between;
  gap: 8px;
  padding: 0 10px 10px;
}

.codex-left-rail {
  min-width: 0;
  flex: 1 1 auto;
  gap: 4px;
  overflow-x: auto;
  padding: 1px;
  scrollbar-width: none;
}

.codex-left-rail::-webkit-scrollbar {
  display: none;
}

.codex-right-rail {
  flex: 0 0 auto;
  justify-content: flex-end;
  gap: 6px;
}

.model-picker,
.codex-tool,
.codex-action {
  position: relative;
  display: inline-flex;
  flex: 0 0 auto;
  align-items: center;
  justify-content: center;
  height: 32px;
  border: 1px solid transparent;
  border-radius: 9px;
  outline: none;
  color: color-mix(in srgb, var(--agent-muted) 92%, transparent);
  background: transparent;
}

.codex-tool,
.codex-action {
  width: 32px;
  padding: 0;
  font-size: 14px;
  line-height: 1;
}

.model-picker {
  min-width: 118px;
  max-width: 220px;
  gap: 7px;
  padding: 0 8px 0 7px;
  color: var(--agent-soft);
  font-size: 13px;
  font-weight: 650;
  letter-spacing: 0;
  white-space: nowrap;
}

.model-icon {
  display: inline-flex;
  width: 20px;
  height: 20px;
  flex: 0 0 auto;
  align-items: center;
  justify-content: center;
  border: 1px solid color-mix(in srgb, var(--agent-border-strong) 70%, transparent);
  border-radius: 999px;
  color: var(--agent-text);
  background: var(--agent-control);
  font-size: 10px;
  font-weight: 750;
  line-height: 1;
}

.model-label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.model-chevron {
  flex: 0 0 auto;
  color: var(--agent-muted);
  font-size: 14px;
  line-height: 1;
}

.provider-select {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  outline: none;
}

.composer-separator {
  width: 1px;
  height: 18px;
  margin: 0 3px;
  flex: 0 0 auto;
  background: color-mix(in srgb, var(--agent-border-strong) 72%, transparent);
}

.codex-start {
  width: auto;
  min-width: 56px;
  padding: 0 12px;
  border-color: color-mix(in srgb, var(--agent-border) 76%, transparent);
  color: var(--agent-soft);
  background: var(--agent-control);
  font-size: 12px;
  font-weight: 650;
}

.codex-circle-action::before {
  width: 13px;
  height: 13px;
  border: 2px solid currentColor;
  border-radius: 999px;
  content: "";
}

.codex-mic {
  font-size: 18px;
}

.send-button {
  border-radius: 999px;
  color: var(--agent-text);
  background: color-mix(in srgb, var(--agent-accent-soft) 72%, var(--agent-control));
  font-size: 20px;
  font-weight: 650;
}

.model-picker:focus-within,
.codex-action:not(:disabled):hover,
.codex-tool:not(:disabled):hover {
  border-color: color-mix(in srgb, var(--agent-border-strong) 70%, transparent);
  color: var(--agent-text);
  background: var(--agent-control-hover);
}

.codex-action:disabled,
.codex-tool:disabled,
.provider-select:disabled {
  opacity: 0.56;
}

.send-button:disabled {
  color: var(--agent-muted);
  background: var(--agent-control);
  opacity: 0.5;
}

.rate-line {
  min-width: 0;
  gap: 7px;
  padding: 0 2px;
  color: color-mix(in srgb, var(--agent-muted) 88%, transparent);
  font-size: 11px;
  font-weight: 600;
  line-height: 1.35;
  white-space: nowrap;
}

.rate-line span:nth-child(2) {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rate-dot {
  color: color-mix(in srgb, var(--agent-accent) 78%, transparent);
}

.status-dot {
  flex: 0 0 auto;
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--agent-muted);
}

.status-dot.running {
  background: var(--agent-accent);
}

.status-dot.failed {
  background: var(--agent-danger);
}

@media (max-width: 720px) {
  .agent-shell {
    padding: 10px;
  }

  .composer-surface {
    min-height: 122px;
  }

  .composer-body {
    padding: 12px 13px 7px;
  }

  .prompt-input {
    min-height: 62px;
  }

  .composer-footer {
    flex-wrap: wrap;
    gap: 7px;
    padding: 0 8px 8px;
  }

  .codex-left-rail {
    min-width: 12rem;
  }

  .codex-right-rail {
    margin-left: auto;
  }
}

@media (max-width: 520px) {
  .log-line {
    grid-template-columns: 1fr;
    gap: 2px;
  }

  .model-picker {
    min-width: 104px;
    max-width: 168px;
  }

  .codex-tool-skill,
  .codex-mic,
  .rate-dot,
  .rate-line span:last-child {
    display: none;
  }
}

    </style>
