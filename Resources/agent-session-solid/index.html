<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>cmux Agent Session</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <style>
:root {
  color-scheme: dark;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
  background: #171916;
  color: #f1f0e8;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 720px;
  background: #171916;
}

button,
select,
textarea {
  font: inherit;
}

.agent-shell {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  background: #171916;
}

.toolbar {
  display: grid;
  grid-template-columns: auto minmax(160px, 240px) auto auto 1fr auto;
  gap: 10px;
  align-items: center;
  min-height: 56px;
  padding: 10px 14px;
  border-bottom: 1px solid #393c35;
  background: #20231e;
}

.renderer-mark {
  color: #a7c8a3;
  font-weight: 700;
  letter-spacing: 0;
}

.provider-select,
.prompt-input {
  color: #f1f0e8;
  background: #131511;
  border: 1px solid #4a4d45;
  border-radius: 6px;
}

.provider-select {
  min-height: 34px;
  padding: 0 28px 0 10px;
}

.status-pill {
  min-width: 84px;
  padding: 5px 9px;
  border: 1px solid #4a4d45;
  border-radius: 999px;
  color: #d8d6c8;
  text-align: center;
  background: #151713;
}

.status-pill.running {
  color: #c7f0c0;
  border-color: #3e7b45;
  background: #172516;
}

.status-pill.failed {
  color: #ffb5a8;
  border-color: #8d3f35;
  background: #2b1714;
}

.toolbar-button,
.send-button {
  min-height: 34px;
  padding: 0 12px;
  border: 1px solid #4a4d45;
  border-radius: 6px;
  color: #f1f0e8;
  background: #30342d;
}

.toolbar-button:disabled,
.send-button:disabled {
  color: #7f8178;
  background: #22241f;
}

.transport {
  color: #94978b;
  font-size: 12px;
  text-align: right;
}

.log {
  overflow: auto;
  padding: 12px 14px;
  background: #171916;
}

.log-line {
  display: grid;
  grid-template-columns: 76px 1fr;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 12px;
  line-height: 1.45;
}

.log-label {
  color: #989b8f;
  text-transform: uppercase;
}

.log-line.stdout .log-label {
  color: #96d894;
}

.log-line.stderr .log-label,
.log-line.error .log-label {
  color: #ff9a8d;
}

.log-text {
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: normal;
}

.composer {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  padding: 12px 14px;
  border-top: 1px solid #393c35;
  background: #20231e;
}

.prompt-input {
  min-height: 44px;
  max-height: 140px;
  resize: vertical;
  padding: 10px 12px;
}

.send-button {
  min-width: 82px;
}

    </style>
  </head>
