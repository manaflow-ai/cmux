<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cmux Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: var(--editor-bg, #1f1f1f); }
        :root { --editor-bg: #1f1f1f; --editor-fg: #cccccc; }
        #editor-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="editor-container"></div>
    <!-- Monaco CSS and loader injected by Swift via monacoCSSPath/monacoLoaderPath -->
    <script src="editor.js"></script>
</body>
</html>
